
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NikWe|智者，人生</title>
    <!-- 环境加载 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { initializeFirestore, collection, addDoc, onSnapshot, query, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.FB = {
            initializeApp, initializeFirestore, collection, addDoc, onSnapshot,
            query, doc, setDoc, getAuth, signInAnonymously,
            signInWithCustomToken, onAuthStateChanged
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;900&family=Noto+Sans+SC:wght@100;400;900&family=Noto+Serif+SC:wght@400;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&family=Long+Cang&family=JetBrains+Mono&display=swap');

        body, html { margin: 0; padding: 0; height: 100vh; height: 100dvh; width: 100%; background: #0f172a; font-family: 'Inter', 'Noto Sans SC', sans-serif; color: #334155; -webkit-tap-highlight-color: transparent; overflow: hidden; position: fixed; }

        #wallpaper-layer { position: fixed; inset: 0; background-size: cover; background-position: center; z-index: 0; transition: background-image 1s ease-in-out; }
        #wallpaper-layer::after { content: ""; position: absolute; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(25px); }

        .brand-logo-text { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1; pointer-events: none; font-size: 8vw; font-weight: 900; color: rgba(255,255,255,0.02); text-transform: uppercase; letter-spacing: -0.02em; text-align: center; }

        .top-info-bar { position: fixed; top: 40px; left: 0; right: 0; padding: 12px 24px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 40; pointer-events: none; }
        .top-info-text { font-size: 10px; font-weight: 900; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.2em; }

        .news-ticker { position: fixed; top: 0; left: 0; right: 0; height: 32px; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); z-index: 100000; overflow: hidden; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .news-wrapper { display: flex; flex-direction: column; animation: ticker-scroll-vertical 40s linear infinite; }
        .news-ticker:hover .news-wrapper { animation-play-state: paused; }
        .news-item { height: 32px; min-height: 32px; color: rgba(255,255,255,0.6); font-size: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center; white-space: nowrap; padding: 0 40px; }
        @keyframes ticker-scroll-vertical { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }

        .editor-view:empty:before { content: "在此记录思考..."; color: #94a3b8; pointer-events: none; }
        .editor-view h1 { font-size: 2.2em; font-weight: 900; margin: 0.8em 0 0.4em; color: #1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

        .tool-bar-wrap { display: flex; flex-wrap: nowrap; gap: 4px; padding: 10px; background: #fff; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; }
        .tool-btn { height: 32px; min-width: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 10px; font-weight: 900; color: #475569; transition: 0.2s; cursor: pointer; background: rgba(255,255,255,0.98); border: 1px solid #e2e8f0; flex-shrink: 0; padding: 0 4px; }
        .tool-btn:hover { background: #1e293b !important; color: #fff !important; }

        .float-dock-btn { width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); color: rgba(255,255,255,0.6); border-radius: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(12px); position: relative; }
        .float-dock-btn:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.12); color: #fff; }

        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(60px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 40px 100px rgba(15, 23, 42, 0.3); }
        .tile-widget { flex: 1; min-width: 180px; max-width: 400px; height: 140px; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.08); display: flex; flex-direction: column; padding: 1.5rem; border-radius: 24px; background: rgba(255, 255, 255, 0.04); color: white; }
        @media (max-width: 768px) { .tile-widget { flex: none; min-width: unset; width: calc(100vw - 48px); max-width: calc(100vw - 48px); height: 90px; padding: 1rem 1.25rem; border-radius: 16px; } }

        .badge { @apply absolute -top-1 -right-1 bg-red-500 text-white text-[8px] font-black w-4 h-4 rounded-full flex items-center justify-center border border-slate-900/50; }

        .chat-bubble { @apply p-4 rounded-2xl max-w-[85%] text-[11px] font-bold leading-relaxed mb-4; }
        .chat-user { @apply self-end bg-slate-800 text-white ml-auto; }
        .chat-target { @apply self-start bg-white border border-slate-900/5 text-slate-800; }

        .login-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.15); color: #fff; @apply w-full h-12 rounded-2xl outline-none focus:bg-white/10 transition-all text-center placeholder-white/20 font-bold text-sm tracking-wider; }

        @media (max-width: 768px) {
            .glass-panel:not(.login-panel):not(.floating-panel) { width: 100vw !important; height: calc(100vh - 32px) !important; border-radius: 0 !important; margin: 0 !important; inset: 32px 0 0 0 !important; position: fixed !important; }
            .login-panel { width: 85vw !important; max-width: 340px !important; border-radius: 40px !important; position: relative !important; margin: auto !important; z-index: 100005 !important; }
            .floating-panel { width: 95vw !important; right: 2.5vw !important; left: 2.5vw !important; top: 40px !important; bottom: 80px !important; }
            .search-box-panel { width: 90vw !important; position: fixed !important; top: 70px !important; bottom: auto !important; left: 50% !important; transform: translateX(-50%) !important; border-radius: 18px !important; z-index: 1000000 !important; background: rgba(15, 23, 42, 0.9) !important; backdrop-filter: blur(20px) !important; border: 1px solid rgba(255,255,255,0.1) !important; padding: 8px !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const STICKY_COLORS = [
            { id: 'y', bg: '#fffbeb', border: '#fef3c7' },
            { id: 'b', bg: '#eff6ff', border: '#dbeafe' },
            { id: 'g', bg: '#f0fdf4', border: '#dcfce7' },
            { id: 'p', bg: '#fdf2f8', border: '#fce7f3' },
            { id: 'v', bg: '#faf5ff', border: '#f3e8ff' }
        ];

        const MOODS = [
            { icon: "Focus", emoji: "🎯" },
            { icon: "Work", emoji: "💼" },
            { icon: "Creative", emoji: "💡" },
            { icon: "Relax", emoji: "☕" },
            { icon: "Alert", emoji: "⚠️" }
        ];

        const PRESET_WALLS = ["https://images.unsplash.com/photo-1506744038136-46273834b3fb", "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b", "https://images.unsplash.com/photo-1501785888041-af3ef285b470", "https://images.unsplash.com/photo-1470770841072-f978cf4d019e"];
        const FONTS = [{ label: "思源黑体", value: "Noto Sans SC" }, { label: "思源宋体", value: "Noto Serif SC" }, { label: "马善政楷", value: "Ma Shan Zheng" }, { label: "智莽行书", value: "Zhi Mang Xing" }, { label: "Inter Pro", value: "Inter" }, { label: "JetBrains Mono", value: "JetBrains Mono" }];

        const ICONS = {
            plus: "M12 5v14M5 12h14", close: "M18 6L6 18M6 6l12 12", external: "M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6 M15 3h6v6 M10 14L21 3",
            send: "M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z", image: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M17 8l-5-5-5 5 M12 3v12",
            link: "M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71", table: "M3 3h18v18H3z M3 9h18 M3 15h18",
            trash: "M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 1 2-2h4a2 2 0 0 1 2 2v2",
            undo: "M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6", redo: "M21 10H11a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6",
            book: "M4 19.5A2.5 2.5 0 0 1 6.5 17H20 M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15",
            eye: "M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0 M12 5c7 0 10 7 10 7s-3 7-10 7s-10-7-10-7s3-7 10-7z",
            engine: "M12 15a3 3 0 100-6 3 3 0 000 6z", lab: "M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2z",
            pin: "M12 2v8m0 0l-4 4m4-4l4 4M5 20h14", bird: "M16 3H8L2 12l6 9h8l6-9-6-9z M2 12h20",
            menu: "M3 12h18M3 6h18M3 18h18", back: "M19 12H5M12 19l-7-7 7-7", lock: "M7 11V7a5 5 0 0110 0v4M5 11h14a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2z",
            calendar: "M19 4H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z M16 2v4 M8 2v4 M3 10h18",
            indent: "M10 12h10M10 18h10M10 6h10M3 12l4 4M3 12l4-4", list: "M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01",
            check: "M20 6L9 17l-5-5", upload: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12",
            alignLeft: "M17 10H3M21 6H3M17 14H3M21 18H3", alignCenter: "M18 10H6M21 6H3M18 14H6M21 18H3", alignRight: "M21 10H7M21 6H3M21 14H7M21 18H3", alignFull: "M21 10H3M21 6H3M21 14H3M21 18H3",
            mail: "M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1-.9-2 2-2z M22 6l-10 7L2 6", sparkles: "M12 3v3m0 12v3m9-9h-3M6 12H3m15.364-6.364l-2.121 2.121M7.757 16.243l-2.121 2.121m12.728 0l-2.121-2.121M7.757 7.757L5.636 5.636",
            volume2: "M11 5L6 9H2v6h4l5 4V5z M19.07 4.93a10 10 0 0 1 0 14.14 M15.54 8.46a5 5 0 0 1 0 7.07",
            mic: "M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z M19 10v1a7 7 0 0 1-14 0v-1 M12 18v4 M8 22h8"
        };

        const Icon = ({ name, size = 14, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className={className} strokeLinecap="round" strokeLinejoin="round"><path d={ICONS[name] || ICONS.plus} /></svg>
        );

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(() => !!localStorage.getItem('NikAuth_V200'));
            const [view, setView] = useState(isLoggedIn ? 'desktop' : 'login');
            const [time, setTime] = useState('--:--');
            const [date, setDate] = useState('...');
            const [location, setLocation] = useState('定位中...');
            const [weather, setWeather] = useState('...');
            const [isAiOpen, setIsAiOpen] = useState(false);
            const [isCommOpen, setIsCommOpen] = useState(false);
            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");
            const [toast, setToast] = useState("");
            const [activePlugin, setActivePlugin] = useState({ name: 'Nik 互通', type: 'mail' });
            const [showNoteSidebar, setShowNoteSidebar] = useState(window.innerWidth > 768);
            const [showLabSidebar, setShowLabSidebar] = useState(window.innerWidth > 768);
            const [mobileChatActive, setMobileChatActive] = useState(false);
            const [commType, setCommType] = useState('personal');
            const [activeStickySchedulePicker, setActiveStickySchedulePicker] = useState(null);
            const [news, setNews] = useState(["智者，当于变幻中寻求宁静", "记录是思考的延续"]);

            const [config, setConfig] = useState(() => JSON.parse(localStorage.getItem('NikWe_Master_Config_V200_Stable') || JSON.stringify({
                username: "智者", wallpaper: PRESET_WALLS[0],
                aiBaseUrl: "https://api.deepseek.com/v1/chat/completions", aiKey: "", aiModel: "deepseek-chat",
                localBaseUrl: "http://localhost:11434/v1/chat/completions", localModel: "llama3",
                mailApi: "", plugins: [], apps: [],
                webdavUrl: "https://dav.jianguoyun.com/dav/", webdavUser: "", webdavPass: ""
            })));

            const [notes, setNotes] = useState(() => JSON.parse(localStorage.getItem('NikData_Notes_V200_Stable') || '[{"id":1,"title":"智者指南","content":"","pinned":true}]'));
            const [activeNoteId, setActiveNoteId] = useState(notes[0]?.id || 1);
            const [schedules, setSchedules] = useState(() => JSON.parse(localStorage.getItem('NikData_Schedules_V200_Stable') || '[]'));
            const [stickies, setStickies] = useState(() => JSON.parse(localStorage.getItem('NikData_Stickies_V200_Stable') || '[{"id":1,"text":"记录瞬间灵感...","mood":"Focus","color":"y","onTile":true}]'));
            const [contacts, setContacts] = useState(() => JSON.parse(localStorage.getItem('NikData_Contacts_V200_Stable') || JSON.stringify([{ id: 'p1', name: "老张", avatar: "Z", msgs: [], unread: 0 }])));
            const [groups, setGroups] = useState(() => JSON.parse(localStorage.getItem('NikData_Groups_V200_Stable') || JSON.stringify([{ id: 'g1', name: "决策群", avatar: "H", msgs: [] }])));
            const [activeTargetId, setActiveTargetId] = useState('p1');
            const [nikEmails, setNikEmails] = useState([]);
            const [aiHistory, setAiHistory] = useState(() => JSON.parse(localStorage.getItem('NikData_AiHistory_V200') || '[]'));
            const [mailCompose, setMailCompose] = useState(false);
            const [mailForm, setMailForm] = useState({ to: "", subject: "", body: "", attachments: [] });

            const [selectedRef, setSelectedRef] = useState(null);
            const [showRefPicker, setShowRefPicker] = useState(false);
            const [isListening, setIsListening] = useState(false);

            const editorRef = useRef(null);
            const totalUnread = useMemo(() => contacts.reduce((a,b)=>a+(b.unread||0), 0), [contacts]);
            const [user, setUser] = useState(null);
            const dbRef = useRef(null);

            const upcomingSchedules = useMemo(() => {
                return [...schedules].filter(s => !s.done).sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time)).slice(0, 3);
            }, [schedules]);

            const localSearchResults = useMemo(() => {
                if (!searchTerm.trim()) return [];
                const term = searchTerm.toLowerCase();
                return notes.filter(n => n.title.toLowerCase().includes(term)).map(n => ({ type: 'DOC', label: n.title, action: () => { setView('note'); setActiveNoteId(n.id); }}));
            }, [searchTerm, notes]);

            const handleEditorInput = () => { if (editorRef.current) saveNotes(notes.map(n => n.id === activeNoteId ? {...n, content:editorRef.current.innerHTML} : n)); };

            const startVoiceInput = () => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) { showFeedback("环境不支持语音识别"); return; }
                const recognition = new SpeechRecognition();
                recognition.onstart = () => setIsListening(true);
                recognition.onend = () => setIsListening(false);
                recognition.onresult = (e) => { const t = e.results[0][0].transcript; const input = document.getElementById('ai-input'); if (input) input.value = t; };
                recognition.start();
            };

            const handleMailFile = (e) => {
                const f = e.target.files[0]; if(!f) return;
                const r = new FileReader(); r.onload = (v) => setMailForm({...mailForm, attachments: [...mailForm.attachments, {name: f.name, type: f.type, data: v.target.result}]}); r.readAsDataURL(f);
            };

            const handleSendEmail = async () => {
                if(!mailForm.to || !mailForm.subject) return;
                try {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'nikwe-default';
                    await FB.addDoc(FB.collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'emails'), {
                        ...mailForm, from: config.username, timestamp: Date.now(), date: new Date().toLocaleString()
                    });
                    setMailCompose(false);
                    setMailForm({to:"", subject:"", body:"", attachments:[]});
                    showFeedback("信号已发出");
                } catch(e) { showFeedback("发送失败"); }
            };

            const webdavAction = async (method, path = "nikwe_notes.json", body = null) => {
                if (!config.webdavUser || !config.webdavPass) return null;
                const url = config.webdavUrl.endsWith('/') ? config.webdavUrl + path : config.webdavUrl + '/' + path;
                const auth = btoa(`${config.webdavUser}:${config.webdavPass}`);
                try {
                    const res = await fetch(url, { method, headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' }, body: body ? JSON.stringify(body) : null });
                    if (method === 'GET') return res.ok ? await res.json() : null;
                    return res.ok;
                } catch (e) { return null; }
            };

            const pullFromCloud = async () => {
                const cloudData = await webdavAction('GET');
                if (cloudData && Array.isArray(cloudData)) {
                    setNotes(cloudData);
                    localStorage.setItem('NikData_Notes_V200_Stable', JSON.stringify(cloudData));
                    showFeedback("已同步云端文档");
                }
            };

            const pushToCloud = async (currentNotes) => { await webdavAction('PUT', "nikwe_notes.json", currentNotes); };

            useEffect(() => {
                if (isLoggedIn) pullFromCloud();
                const fetchContent = async () => {
                    try {
                        const items = [];
                        for(let i=0; i<8; i++) {
                            const r = await fetch('https://v1.hitokoto.cn/?c=d&c=i&c=k');
                            const d = await r.json();
                            items.push(`${d.hitokoto} -- ${d.from_who || ''}《${d.from}》`);
                        }
                        if (items.length > 0) setNews([...items, ...items]);
                    } catch (e) {}
                };
                fetchContent();
            }, [isLoggedIn]);

            useEffect(() => {
                const initFB = async () => {
                    try {
                        const cfg = JSON.parse(__firebase_config);
                        const app = FB.initializeApp(cfg);
                        dbRef.current = FB.initializeFirestore(app, { experimentalForceLongPolling: true });
                        const auth = FB.getAuth(app);
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) { await FB.signInWithCustomToken(auth, __initial_auth_token); }
                        else { await FB.signInAnonymously(auth); }
                        FB.onAuthStateChanged(auth, (u) => setUser(u));
                    } catch (err) {}
                };
                initFB();
                const timer = setInterval(() => {
                    const now = new Date(); setTime(now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false })); setDate(now.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' }) + ' ' + now.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase());
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                const fetchL = async () => {
                    try {
                        const r = await fetch('https://ipapi.co/json/');
                        const d = await r.json();
                        if(d.city) {
                            setLocation(d.city.toUpperCase());
                            const wr = await fetch(`https://wttr.in/${d.city}?format=%C+%t`);
                            const wt = await wr.text();
                            setWeather(wt);
                        }
                    } catch (e) {
                        fetch('https://ip-api.com/json').then(res=>res.json()).then(d2=>{
                            if(d2.city) setLocation(d2.city.toUpperCase());
                        });
                    }
                };
                fetchL();
            }, []);

            useEffect(() => {
                if (!user || !dbRef.current) return;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'nikwe-default';
                const q = FB.collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'emails');
                const unsubscribe = FB.onSnapshot(q, (snapshot) => {
                    const all = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    setNikEmails(all.filter(m => m.to === config.username || m.from === config.username).sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0)));
                }, (err) => {});
                return () => unsubscribe();
            }, [user, config.username]);

            const showFeedback = (msg = "数据已同步") => { setToast(msg); setTimeout(() => setToast(""), 2000); };
            const saveConfig = (next) => { setConfig(next); localStorage.setItem('NikWe_Master_Config_V200_Stable', JSON.stringify(next)); showFeedback(); };
            const saveNotes = (n) => { setNotes(n); localStorage.setItem('NikData_Notes_V200_Stable', JSON.stringify(n)); showFeedback(); if (syncTimer.current) clearTimeout(syncTimer.current); syncTimer.current = setTimeout(() => pushToCloud(n), 3000); };
            const saveSchedules = (s) => { setSchedules(s); localStorage.setItem('NikData_Schedules_V200_Stable', JSON.stringify(s)); showFeedback(); };
            const saveStickies = (st) => { setStickies(st); localStorage.setItem('NikData_Stickies_V200_Stable', JSON.stringify(st)); showFeedback(); };

            const callAiApi = async (userInput, context = "") => {
                if (!userInput.trim()) return;
                const newMessage = { role: 'user', text: userInput, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
                const nextHistory = [...aiHistory, newMessage];
                saveAiHistory(nextHistory);
                if (!config.aiKey) { saveAiHistory([...nextHistory, { role: 'assistant', text: "智者先治己，请配置 AI KEY。", time: newMessage.time }]); return; }
                const personalityHint = "【Nik人设说明：1. 闲聊温和睿智；2. 办公学术中立、无幻觉；3. 支持命令 [PLAN: 内容, 日期, 时间] 或 [STICKY: 内容]。】";
                try {
                    const response = await fetch(config.aiBaseUrl, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.aiKey.trim()}` }, body: JSON.stringify({ model: config.aiModel, messages: [{ role: 'user', content: personalityHint + (context ? "上下文："+context : "") + " 指令：" + userInput }] }) });
                    const data = await response.json();
                    const aiText = data.choices?.[0]?.message?.content || "响应中断";
                    let curSchedules = [...schedules], curStickies = [...stickies], updated = false;
                    const planRegex = /\[PLAN:\s*(.*?),\s*(.*?),\s*(.*?)\]/g;
                    let pMatch;
                    while ((pMatch = planRegex.exec(aiText)) !== null) { curSchedules = [{ id: Date.now()+Math.random(), text: pMatch[1], date: pMatch[2], time: pMatch[3], done: false }, ...curSchedules]; updated = true; }
                    const stickyRegex = /\[STICKY:\s*(.*?)\]/g;
                    let sMatch;
                    while ((sMatch = stickyRegex.exec(aiText)) !== null) { curStickies = [{ id: Date.now()+Math.random(), text: sMatch[1], mood: 'Focus', color: 'y', onTile: true }, ...curStickies]; updated = true; }
                    if (updated) { saveSchedules(curSchedules); saveStickies(curStickies); showFeedback("已同步识别项"); }
                    saveAiHistory([...nextHistory, { role: 'assistant', text: aiText, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) }]);

btn !bg-slate-800 !text-white !w-14 gap-1 animate-pulse font-black"><Icon name="sparkles" size={12}/>@AI</button>

                                        <div className="absolute bottom-20 left-4 right-4 bg-white shadow-2xl p-3 rounded-2xl border z-[99999] max-h-32 overflow-y-auto animate-in fade-in slide-in-from-bottom-2">
                                            {notes.map(n => (
                                                <div key={n.id} onClick={()=> {setSelectedRef({label:n.title, id:n.id}); setShowRefPicker(false);}} className="p-2.5 border-b border-slate-50 last:border-0 text-[10px] truncate cursor-pointer hover:bg-slate-50 rounded-lg">{n.title}</div>
                                            ))}
                                        </div>
                                    )}
                                    <div className="flex-1 relative">
                                        <input id="ai-input" className="w-full bg-slate-100 p-3.5 pr-11 rounded-xl outline-none text-xs focus:ring-2 focus:ring-slate-300 transition-all" placeholder="输入消息..." onKeyDown={e=>{if(e.key==='Enter'){callAiApi(e.target.value, selectedRef?.label); e.target.value=''}}} />
                                        <button onClick={startVoiceInput} className={`absolute right-2.5 top-1/2 -translate-y-1/2 w-7 h-7 rounded-lg flex items-center justify-center transition-all ${isListening?'bg-red-500 text-white animate-pulse':'text-slate-400 hover:text-slate-600'}`}><Icon name="mic" size={14}/></button>
                                    </div>
                                    <button onClick={()=>{const i=document.getElementById('ai-input'); if(i.value.trim()){callAiApi(i.value, selectedRef?.label); i.value=''}}} className="w-10 h-10 bg-slate-800 text-white rounded-xl flex items-center justify-center shadow-lg active:scale-95 transition-transform shrink-0"><Icon name="send" size={16}/></button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className={`fixed right-6 bottom-24 md:right-10 md:bottom-32 w-14 h-14 bg-slate-800 border border-white/20 rounded-full flex items-center justify-center cursor-pointer z-[80000] shadow-2xl active:scale-90 transition-transform no-print font-black ${view === 'note' ? 'hidden' : ''}`} onClick={()=>setIsAiOpen(!isAiOpen)}><div className="w-1.5 h-1.5 bg-white rounded-full animate-pulse"></div></div>

                    {/* Dock and Search */}
                    <div className="fixed bottom-0 w-full flex justify-center gap-2 md:gap-10 px-4 md:px-8 pb-8 pt-4 no-print z-[200] font-black font-black font-black font-black">
                        <div className="flex items-center justify-center gap-2 md:gap-6 bg-transparent relative font-black font-black font-black font-black">
                            <div onClick={()=>setView('note')} className="float-dock-btn font-black font-black font-black font-black"><Icon name="book" size={20} /></div>
                            <div onClick={()=>setView('schedule')} className="float-dock-btn font-black font-black font-black font-black font-black"><Icon name="calendar" size={20} /></div>
                            <div onClick={()=>setView('sticky')} className="float-dock-btn font-black font-black font-black font-black font-black font-black"><Icon name="pin" size={20} /></div>
                            <div onClick={()=>setView('lab')} className="float-dock-btn font-black font-black font-black font-black font-black font-black font-black"><Icon name="lab" size={20} /></div>
                            <div onClick={()=>setView('settings')} className="float-dock-btn font-black font-black font-black font-black font-black font-black font-black font-black"><Icon name="engine" size={20} /></div>
                            <div className="relative font-black font-black font-black font-black font-black font-black">
                                {isSearchOpen && ( <div className="search-box-panel flex flex-col gap-2 animate-in fade-in slide-in-from-top-4 duration-300 font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black"><div className="flex items-center gap-2 bg-white/10 p-1.5 rounded-xl border border-white/10 font-black font-black font-black font-black font-black font-black font-black font-black font-black"><input autoFocus className="flex-1 bg-transparent border-0 px-2 text-xs text-white font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black outline-none h-8 placeholder-white/30 font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black" placeholder="检索..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} onKeyDown={e=>{if(e.key==='Enter') handleGlobalSearch(searchTerm)}} /><button onClick={()=>handleGlobalSearch(searchTerm)} className="w-8 h-8 rounded-lg bg-white/20 text-white flex items-center justify-center hover:bg-white/40 transition-all font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black"><Icon name="external" size={14}/></button><button onClick={()=>setIsSearchOpen(false)} className="w-8 h-8 rounded-lg text-white/40 flex items-center justify-center hover:bg-red-500/20 transition-all font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black"><Icon name="close" size={14}/></button></div>{localSearchResults.length > 0 && ( <div className="bg-slate-900/90 backdrop-blur-2xl border border-white/10 rounded-xl overflow-hidden max-h-40 overflow-y-auto custom-scrollbar shadow-2xl font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">{localSearchResults.map((res, i) => ( <div key={i} onClick={()=>{res.action(); setIsSearchOpen(false); setSearchTerm("");}} className="p-2.5 hover:bg-white/10 flex justify-between items-center cursor-pointer border-b border-white/5 last:border-0 transition-colors font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black"><div className="flex items-center gap-2 font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black"><Icon name={res.type === 'DOC' ? 'book' : 'sparkles'} size={10} className="text-white/20 font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black"/><span className="text-[10px] text-white/70 font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black truncate max-w-[140px] font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">{res.label}</span></div><span className="text-[7px] text-white/30 font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black uppercase px-1.5 py-0.5 border border-white/5 rounded-md font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black">{res.type}</span></div> ))}</div> )}</div> )}
                                <div onClick={()=>setIsSearchOpen(!isSearchOpen)} className={`float-dock-btn font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black ${isSearchOpen?'bg-slate-800 text-white font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black':''}`}><Icon name="eye" size={20} /></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
