
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NikO · 随心而记</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231a2a6c'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='Georgia,serif' font-size='18' font-weight='bold' fill='%23b21f1f'%3EN%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --text-primary: #1a1a1a;
  --text-secondary: #555;
  --text-muted: #999;
  --accent: #8b7355;
  --border: rgba(0,0,0,0.07);
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-md: 0 8px 32px rgba(0,0,0,0.1);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.14);
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --font-display: 'Cormorant Garamond', 'Noto Serif SC', serif;
  --font-zh: 'Noto Serif SC', serif;
  --font-body: 'Noto Sans SC', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  min-height: 100%;
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: var(--text-primary);
  overflow-x: hidden;
}

/* 登录页 */
.login-page {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  background: #f8f6f3;
  background-image:
    radial-gradient(ellipse at 20% 80%, rgba(139,115,85,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(139,115,85,0.06) 0%, transparent 50%);
}

.login-card {
  background: rgba(255,255,255,0.95);
  border-radius: var(--radius-lg);
  padding: 3rem 2.5rem;
  width: 360px;
  box-shadow: var(--shadow-lg);
  text-align: center;
  animation: floatIn 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}

.login-logo {
  font-family: var(--font-display);
  font-size: 3.2rem;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 0.12em;
  line-height: 1;
  margin-bottom: 0.4rem;
}

.login-slogan {
  font-family: var(--font-zh);
  font-size: 0.85rem;
  color: var(--text-muted);
  letter-spacing: 0.5em;
  margin-bottom: 2.5rem;
}

.login-input {
  width: 100%;
  padding: 0.9rem 1.2rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1rem;
  font-family: var(--font-body);
  outline: none;
  background: #fafaf8;
  text-align: center;
  letter-spacing: 0.3em;
  transition: all 0.3s;
}
.login-input:focus {
  border-color: var(--accent);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(139,115,85,0.1);
}

.login-btn {
  width: 100%;
  padding: 0.95rem;
  margin-top: 1rem;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--text-primary);
  color: #fff;
  font-size: 0.95rem;
  font-family: var(--font-body);
  cursor: pointer;
  letter-spacing: 0.3em;
  transition: all 0.3s;
}
.login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.18); }
.login-error { color: #c44; font-size: 0.82rem; margin-top: 0.75rem; height: 1.2em; transition: opacity 0.3s; }

/* 首次设置页 */
.setup-page {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  background: #f8f6f3;
  background-image:
    radial-gradient(ellipse at 20% 80%, rgba(139,115,85,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(139,115,85,0.06) 0%, transparent 50%);
}
.setup-page.active { display: flex; }

.setup-card {
  background: rgba(255,255,255,0.95);
  border-radius: var(--radius-lg);
  padding: 3rem 2.5rem;
  width: 380px;
  box-shadow: var(--shadow-lg);
  animation: floatIn 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}
.setup-card h2 { font-family: var(--font-display); font-size: 1.5rem; font-weight: 600; margin-bottom: 2rem; text-align: center; }

.field-group { margin-bottom: 1.25rem; }
.field-group label { display: block; font-size: 0.82rem; color: var(--text-muted); margin-bottom: 0.5rem; }
.field-group input {
  width: 100%; padding: 0.85rem 1rem; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); font-size: 1rem; font-family: var(--font-body);
  outline: none; transition: all 0.3s; background: #fafaf8;
}
.field-group input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(139,115,85,0.1); }

.setup-btn {
  width: 100%; padding: 0.95rem; margin-top: 1rem; border: none; border-radius: var(--radius-sm);
  background: var(--text-primary); color: #fff; font-size: 0.95rem; font-family: var(--font-body);
  cursor: pointer; letter-spacing: 0.2em; transition: all 0.3s;
}
.setup-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.18); }

/* 主应用 */
.app-page { display: none; min-height: 100vh; padding: 0; }
.app-page.active { display: block; }

.main-content {
  max-width: 800px;
  margin: 0 auto;
  padding: 1.5rem 1.5rem 5rem;
}

/* 顶栏 */
.app-topbar {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 0.5rem 0 1.5rem;
  animation: fadeDown 0.5s ease;
}
.topbar-left { display: flex; flex-direction: column; gap: 0.15rem; }
.topbar-location { font-size: 0.78rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.3rem; }
.topbar-weather { font-size: 0.8rem; color: var(--text-secondary); display: flex; align-items: center; gap: 0.4rem; margin-top: 0.15rem; }
.topbar-right { text-align: right; }
.topbar-logo { font-family: var(--font-display); font-size: 1.8rem; font-weight: 600; color: var(--text-primary); letter-spacing: 0.1em; line-height: 1; }
.topbar-slogan { font-family: var(--font-zh); font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.4em; margin-top: 0.3rem; }

/* 时间区 */
.app-datetime {
  text-align: center;
  padding: 1.5rem 0 1.5rem;
  animation: fadeIn 0.6s ease 0.1s both;
}
.datetime-time { font-family: var(--font-display); font-size: 5rem; font-weight: 400; color: var(--text-primary); letter-spacing: -0.02em; line-height: 1; margin-bottom: 0.5rem; }
.datetime-date { font-size: 0.95rem; color: var(--text-muted); font-weight: 300; letter-spacing: 0.05em; }

/* 磁贴 */
.tiles-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin: 1rem 0;
  animation: fadeUp 0.5s ease 0.2s both;
}

.tile-card {
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 1.75rem 1.5rem;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
  overflow: hidden;
  min-height: 180px;
}
.tile-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.tile-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); background: rgba(255,255,255,0.9); }
.tile-card:hover::before { opacity: 1; }

.tile-sym {
  font-size: 1.3rem;
  margin-bottom: 1rem;
  opacity: 0.6;
}

.tile-items { display: flex; flex-direction: column; gap: 0.5rem; }

.tile-item {
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  padding: 0.4rem 0;
  border-bottom: 1px solid rgba(0,0,0,0.04);
}
.tile-item:last-child { border-bottom: none; }

.tile-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--accent);
  flex-shrink: 0; margin-top: 0.45rem;
}
.tile-dot-g { background: #ccc; }

.tile-text {
  font-size: 0.85rem;
  color: var(--text-primary);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
}
.tile-meta { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.1rem; }

.tile-empty {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-top: 0.5rem;
}

/* 操作按钮 */
.actions-row {
  display: flex;
  gap: 0.6rem;
  justify-content: center;
  margin: 1.25rem 0;
  animation: fadeUp 0.5s ease 0.3s both;
}

.action-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.35rem;
  padding: 0.8rem 0.9rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(10px);
  cursor: pointer;
  transition: all 0.3s;
  min-width: 72px;
}
.action-btn:hover { background: rgba(255,255,255,0.95); transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--accent); }
.action-btn .icon { font-size: 1.2rem; line-height: 1; }
.action-btn .label { font-size: 0.72rem; color: var(--text-muted); font-family: var(--font-body); white-space: nowrap; }

/* 安全退出 */
.logout-btn {
  position: fixed;
  top: 1.25rem;
  right: 1.25rem;
  padding: 0.45rem 0.9rem;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.75rem;
  color: var(--text-muted);
  transition: all 0.3s;
  z-index: 100;
  font-family: var(--font-body);
}
.logout-btn:hover { background: rgba(255,255,255,0.95); color: #c44; border-color: #c44; }

/* 动画 */
@keyframes floatIn { from { opacity: 0; transform: translateY(30px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes fadeDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

/* 模态框 */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 500;
  display: none;
  align-items: flex-end;
  justify-content: center;
  animation: fadeIn 0.25s ease;
}
.modal-overlay.active { display: flex; }

.modal {
  background: #fff;
  width: 100%;
  max-width: 560px;
  max-height: 88vh;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 1.75rem 1.75rem calc(1.75rem + env(safe-area-inset-bottom));
  overflow-y: auto;
  animation: slideUp 0.35s cubic-bezier(0.22, 1, 0.36, 1);
}
.modal-overlay.center-modal { align-items: center; }
.modal-overlay.center-modal .modal { border-radius: var(--radius-lg); animation: floatIn 0.35s cubic-bezier(0.22, 1, 0.36, 1); max-height: 85vh; }

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
.modal-title { font-family: var(--font-display); font-size: 1.3rem; font-weight: 600; }
.modal-close {
  width: 34px; height: 34px; border: none; background: #f5f5f5; border-radius: 50%;
  cursor: pointer; font-size: 1.1rem; color: var(--text-secondary); transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.modal-close:hover { background: #eee; color: var(--text-primary); }

/* 表单 */
.form-group { margin-bottom: 1.25rem; }
.form-group label { display: block; font-size: 0.82rem; color: var(--text-muted); margin-bottom: 0.5rem; }
.form-group input,
.form-group textarea,
.form-group select {
  width: 100%; padding: 0.85rem 1rem; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-size: 1rem; font-family: var(--font-body); outline: none; transition: all 0.3s; background: #fafaf8; color: var(--text-primary);
}
.form-group input:focus,
.form-group textarea:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(139,115,85,0.1); }
.form-group textarea { resize: none; min-height: 100px; }

.form-actions { display: flex; gap: 0.6rem; margin-top: 1.5rem; flex-wrap: wrap; }
.btn {
  flex: 1; min-width: 70px; padding: 0.85rem 1rem; border: none; border-radius: var(--radius-sm);
  font-size: 0.9rem; font-family: var(--font-body); cursor: pointer; transition: all 0.3s; text-align: center;
}
.btn-primary { background: var(--text-primary); color: #fff; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
.btn-secondary { background: #f0f0ee; color: var(--text-secondary); }
.btn-secondary:hover { background: #e5e5e3; }
.btn-danger { background: #fff0f0; color: #c44; }
.btn-danger:hover { background: #ffe0e0; }
.btn-success { background: #f0fff4; color: #2a9; }
.btn-success:hover { background: #e0ffec; }

/* 标签切换 */
.list-tabs { display: flex; gap: 0.4rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
.list-tab {
  padding: 0.45rem 1rem; border: none; background: #f0f0ee; border-radius: 20px;
  font-size: 0.82rem; cursor: pointer; transition: all 0.3s; color: var(--text-secondary); font-family: var(--font-body);
}
.list-tab.active { background: var(--text-primary); color: #fff; }

/* 列表 */
.list-empty { text-align: center; padding: 2.5rem 1rem; color: var(--text-muted); }
.list-empty .icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.3; }

.list-item {
  background: #fafaf8; border-radius: var(--radius-md); padding: 1rem 1.25rem; margin-bottom: 0.65rem;
  cursor: pointer; transition: all 0.3s; border: 1px solid transparent;
}
.list-item:hover { background: #fff; border-color: var(--border); box-shadow: var(--shadow-sm); }
.list-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.4rem; }
.list-item-title { font-weight: 500; color: var(--text-primary); flex: 1; font-size: 0.95rem; }
.list-item-time { font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; margin-left: 0.75rem; }
.list-item-content { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.list-item-actions {
  display: flex; gap: 0.4rem; margin-top: 0.7rem; padding-top: 0.7rem; border-top: 1px solid var(--border); flex-wrap: wrap;
}
.list-item-actions button {
  padding: 0.38rem 0.7rem; border: none; border-radius: 6px; font-size: 0.75rem; cursor: pointer;
  transition: all 0.2s; background: #f0f0ee; color: var(--text-secondary); font-family: var(--font-body);
}
.list-item-actions button:hover { background: #e5e5e3; }
.list-item-actions button.edit-btn:hover { background: #e8f4ff; color: #4a8; }
.list-item-actions button.del-btn:hover { background: #ffe0e0; color: #c44; }
.list-item-actions button.done-btn:hover { background: #e0ffec; color: #2a9; }
.list-item-actions button.pin-btn:hover { background: #fff8e0; color: #a80; }
.list-item-actions button.pin-btn.pinned { background: #fff8e0; color: #a80; }

/* 颜色/心情 */
.color-picker, .mood-picker { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
.color-option {
  width: 34px; height: 34px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.3s;
}
.color-option:hover, .color-option.selected { transform: scale(1.15); border-color: var(--accent); }
.mood-option {
  padding: 0.4rem 0.8rem; border-radius: 20px; cursor: pointer; border: 1.5px solid var(--border);
  transition: all 0.3s; font-size: 0.82rem; display: flex; align-items: center; gap: 0.4rem;
  background: #fafaf8; color: var(--text-secondary); font-family: var(--font-body);
}
.mood-option:hover, .mood-option.selected { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }

/* 便签列表卡片 */
.note-card {
  border-radius: var(--radius-md); padding: 1.1rem 1.25rem; margin-bottom: 0.65rem;
  cursor: pointer; transition: all 0.3s; position: relative;
}
.note-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.note-card-content { font-size: 0.9rem; line-height: 1.65; color: var(--text-primary); margin-bottom: 0.75rem; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
.note-card-footer { display: flex; justify-content: space-between; align-items: center; }
.note-card-mood { font-size: 0.75rem; padding: 0.25rem 0.6rem; border-radius: 10px; background: rgba(0,0,0,0.06); color: var(--text-muted); display: flex; align-items: center; gap: 0.3rem; }
.note-card-time { font-size: 0.72rem; color: var(--text-muted); }
.note-card-actions {
  position: absolute; top: 0.6rem; right: 0.6rem; display: flex; gap: 0.3rem; opacity: 0; transition: opacity 0.2s;
}
.note-card:hover .note-card-actions { opacity: 1; }
.note-card-actions button {
  width: 28px; height: 28px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.75rem;
  background: rgba(255,255,255,0.9); color: var(--text-secondary); transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.note-card-actions button:hover { background: #fff; }
.note-card-actions button.del:hover { background: #ffe0e0; color: #c44; }

/* 搜索 */
.search-wrap { position: relative; margin-bottom: 1.25rem; }
.search-wrap input {
  width: 100%; padding: 0.9rem 1rem 0.9rem 2.75rem; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); font-size: 1rem; font-family: var(--font-body); outline: none;
  background: #fafaf8; transition: all 0.3s;
}
.search-wrap input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(139,115,85,0.1); }
.search-wrap .icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); font-size: 1rem; color: var(--text-muted); }
.search-type-tag { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 4px; background: #f0f0ee; color: var(--text-muted); margin-left: 0.5rem; }

/* 设置 */
.settings-section { margin-bottom: 2rem; }
.settings-section-title { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.85rem; }
.settings-item {
  display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.25rem;
  background: #fafaf8; border-radius: var(--radius-sm); margin-bottom: 0.5rem; cursor: pointer;
  transition: all 0.3s; border: 1px solid transparent;
}
.settings-item:hover { background: #fff; border-color: var(--border); box-shadow: var(--shadow-sm); }
.settings-item-label { font-size: 0.95rem; color: var(--text-primary); }
.settings-item-value { font-size: 0.85rem; color: var(--text-muted); }

/* 背景图选择 */
.bg-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-top: 0.85rem; }
.bg-option {
  aspect-ratio: 16/10; border-radius: var(--radius-sm); cursor: pointer; border: 3px solid transparent;
  transition: all 0.3s; background-size: cover; background-position: center; min-height: 60px;
}
.bg-option:hover, .bg-option.selected { border-color: var(--accent); transform: scale(1.03); }
.bg-upload {
  aspect-ratio: 16/10; border-radius: var(--radius-sm); border: 2px dashed var(--border);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.3s; color: var(--text-muted); font-size: 0.72rem; gap: 0.3rem; min-height: 60px;
}
.bg-upload:hover { border-color: var(--accent); color: var(--accent); }
.bg-upload input { display: none; }

/* 随手记颜色/字体 */
.note-style-section { margin-bottom: 1.5rem; }
.note-style-row { display: flex; gap: 1rem; margin-top: 0.5rem; }
.note-style-row > div { flex: 1; }

.font-option {
  padding: 0.5rem 0.75rem; border-radius: 8px; cursor: pointer; border: 1.5px solid var(--border);
  font-size: 0.82rem; text-align: center; transition: all 0.2s; background: #fafafa; color: var(--text-secondary);
}
.font-option:hover, .font-option.selected { border-color: var(--accent); background: #fff; color: var(--text-primary); }
.font-option.selected { box-shadow: 0 0 0 2px rgba(139,115,85,0.2); }

.bg-color-option {
  width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.3s;
}
.bg-color-option:hover, .bg-color-option.selected { transform: scale(1.15); border-color: var(--accent); }

/* 心情SVG */
.mood-svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

/* 确认删除 */
.confirm-dialog {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 600;
  display: none; align-items: center; justify-content: center; animation: fadeIn 0.2s;
}
.confirm-dialog.active { display: flex; }
.confirm-box { background: #fff; border-radius: var(--radius-md); padding: 2rem; max-width: 300px; text-align: center; animation: floatIn 0.3s; }
.confirm-box h3 { font-family: var(--font-display); font-size: 1.2rem; margin-bottom: 0.75rem; }
.confirm-box p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; }
.confirm-actions { display: flex; gap: 0.75rem; }

/* 响应式：手机端 */
@media (max-width: 599px) {
  .tiles-grid { grid-template-columns: 1fr 1fr; gap: 0.4rem; padding: 0; width: 100%; box-sizing: border-box; }
  .tile-card { padding: 0.5rem 0.35rem; background: rgba(255,252,245,0.72); box-shadow: none; }
  .tile-sym { font-size: 0.82rem; margin-bottom: 0.28rem; }
  .tile-items { gap: 0.1rem; }
  .tile-item { padding: 0.1rem 0; }
  .tile-text { font-size: 0.72rem; -webkit-line-clamp: 2; }
  .tile-meta { font-size: 0.58rem; }
  .tile-empty { font-size: 0.6rem; }
  .tile-dot { width: 3px; height: 3px; margin-top: 0.18rem; }

  .datetime-time { font-size: 3.4rem; }
  .datetime-date { font-size: 0.72rem; }
  .main-content { padding: 0.5rem 0.6rem 5rem; }

  .app-topbar { padding: 0.3rem 0 0.6rem; }
  .topbar-logo { font-size: 1.3rem; }
  .topbar-slogan { font-size: 0.6rem; }
  .topbar-location { font-size: 0.68rem; }
  .topbar-weather { font-size: 0.68rem; }
  .app-datetime { padding: 0.5rem 0; }

  .logout-btn { display: none; }

  .actions-row {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    gap: 0;
    justify-content: center;
    padding: 0.6rem 1rem calc(0.6rem + env(safe-area-inset-bottom));
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid rgba(0,0,0,0.06);
    z-index: 50;
    margin: 0;
  }
  .action-btn {
    background: transparent;
    border: none;
    box-shadow: none;
    padding: 0.5rem 1.2rem;
    min-width: unset;
    border-radius: 0;
    flex: 1;
    max-width: 90px;
  }
  .action-btn:hover { background: transparent; transform: none; box-shadow: none; }
  .action-btn:active { transform: scale(0.94); }
  .action-btn .icon { font-size: 1.25rem; color: #444; }
  .action-btn .label { display: none; }

  .modal { padding: 1.25rem 1rem calc(1.25rem + env(safe-area-inset-bottom)); }
}

@media (max-width: 380px) {
  .datetime-time { font-size: 2.7rem; }
}
.toggle-switch{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:20px;transition:.25s}
.toggle-slider::before{position:absolute;content:'';height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle-switch input:checked+.toggle-slider{background:#555}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(16px)}
</style>
</head>
<body>

<!-- 登录页 -->
<div class="login-page" id="loginPage">
  <div class="login-card">
    <div class="login-logo">NikO</div>
    <div class="login-slogan">随心而记</div>
    <input type="password" class="login-input" id="loginKey" placeholder="密钥" maxlength="20">
    <button class="login-btn" onclick="doLogin()">进入</button>
    <div class="login-error" id="loginError">密钥错误</div>
  </div>
</div>

<!-- 首次设置页 -->
<div class="setup-page" id="setupPage">

    <div class="field-group">
      <label>给自己起个名字</label>
      <input type="text" id="setupName" placeholder="你的名字" maxlength="10">
    </div>
    <div class="field-group">
      <label>设置密钥（进入的密码）</label>
      <input type="password" id="setupKey" placeholder="密钥" maxlength="20">
    </div>
    <button class="setup-btn" onclick="doSetup()">开始使用</button>
  </div>
</div>

<!-- 主应用 -->
<div class="app-page" id="appPage">
  <button class="logout-btn" onclick="doLogout()">安全退出</button>
  
  <div class="main-content">
    <!-- 顶栏 -->
    <div class="app-topbar">
      <div class="topbar-left">
        <div class="topbar-location">
          <span>📍</span><span id="locationText">定位中...</span>
        </div>
        <div class="topbar-weather">
          <span id="weatherIcon">🌤</span>
          <span id="weatherText">--°C</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-logo">NikO</div>
        <div class="topbar-slogan">随心而记</div>
      </div>
    </div>

    <!-- 时间 -->
    <div class="app-datetime">
      <div class="datetime-time" id="currentTime">--:--</div>
      <div class="datetime-date" id="currentDate">----年--月--日</div>
    </div>

    <!-- 磁贴 -->
    <div class="tiles-grid">
      <!-- 日程磁贴 -->
      <div class="tile-card" onclick="openSchedule()">
        <div class="tile-sym">📅</div>
        <div class="tile-items" id="scheduleTileItems">
          <div class="tile-empty">暂无日程</div>
        </div>
      </div>
      <!-- 便签磁贴 -->
      <div class="tile-card" onclick="openNotes()">
        <div class="tile-sym">📝</div>
        <div class="tile-items" id="noteTileItems">
          <div class="tile-empty">暂无便签</div>
        </div>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="actions-row">
      <button class="action-btn" onclick="openRecord()">
        <span class="icon">✎</span>
        <span class="label">随手记</span>
      </button>
      <button class="action-btn" onclick="openSearch()">
        <span class="icon">⌕</span>
        <span class="label">搜索</span>
      </button>
      <button class="action-btn" onclick="openSettings()">
        <span class="icon">⚙</span>
        <span class="label">设置</span>
      </button>
    </div>
  </div>
</div>

<!-- 日程模态框 -->
<div class="modal-overlay" id="scheduleModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">日程</span>
      <button class="modal-close" onclick="closeModal('scheduleModal')">✕</button>
    </div>
    <div class="list-tabs">
      <button class="list-tab active" onclick="switchScheduleTab('upcoming')">即将到来</button>
      <button class="list-tab" onclick="switchScheduleTab('done')">已完成</button>
      <button class="list-tab" onclick="switchScheduleTab('all')">全部</button>
    </div>
    <div id="scheduleList"></div>
    <div style="padding-top:1rem">
      <button class="btn btn-primary" onclick="openScheduleForm()">+ 新建日程</button>
    </div>
  </div>
</div>

<!-- 日程表单 -->
<div class="modal-overlay" id="scheduleFormModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="scheduleFormTitle">新建日程</span>
      <button class="modal-close" onclick="closeModal('scheduleFormModal')">✕</button>
    </div>
    <input type="hidden" id="scheduleId">

    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('scheduleFormModal')">取消</button>
      <button class="btn btn-danger" id="scheduleDelBtn" style="display:none" onclick="confirmDeleteSchedule()">删除</button>
      <button class="btn btn-primary" onclick="saveSchedule()">保存</button>
    </div>
  </div>
</div>

<!-- 便签模态框 -->
<div class="modal-overlay" id="noteModal">

    <div class="modal-header">
      <span class="modal-title">便签</span>

    </div>
    <div id="noteList"></div>
    <div style="padding-top:1rem">

</div>

<!-- 便签表单 -->

          <svg class="mood-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><path d="M7 8l3 2M17 8l-3 2"/></svg>期待

    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('noteFormModal')">取消</button>
      <button class="btn btn-danger" id="noteDelBtn" style="display:none" onclick="confirmDeleteNote()">删除</button>
      <button class="btn btn-success" id="noteToScheduleBtn" onclick="noteToSchedule()">转为日程</button>
      <button class="btn btn-primary" onclick="saveNote()">保存</button>
    </div>
  </div>
</div>

<!-- 随手记 -->
<div class="modal-overlay center-modal" id="recordModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">随手记</span>
      <button class="modal-close" onclick="closeModal('recordModal')">✕</button>
    </div>
    <div class="form-group"><label>内容</label><textarea id="quickNoteContent" placeholder="记录此刻的想法..." maxlength="1000" style="min-height:140px"></textarea></div>

        <div class="color-option" style="background:#e6f4ff" data-color="#e6f4ff"></div>
        <div class="color-option" style="background:#f0fdf4" data-color="#f0fdf4"></div>
        <div class="color-option" style="background:#fff0f8" data-color="#fff0f8"></div>
        <div class="color-option" style="background:#f5f5f5" data-color="#f5f5f5"></div>
      </div>
    </div>
    <button class="btn btn-primary" onclick="quickSaveNote()" style="width:100%">保存</button>
  </div>
</div>

<!-- 搜索 -->
<div class="modal-overlay center-modal" id="searchModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">搜索</span>
      <button class="modal-close" onclick="closeModal('searchModal')">✕</button>
    </div>
    <div class="search-wrap">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索日程和便签..." oninput="doSearch()">
    </div>
    <div id="searchResults"></div>
  </div>
</div>

<!-- 设置 -->

  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">设置</span>
      <button class="modal-close" onclick="closeModal('settingsModal')">✕</button>

      <div class="settings-item" onclick="openEditName()">

      </div>

<!-- 修改名字 -->

      <button class="btn btn-danger" id="confirmBtn" onclick="doConfirmDelete()">删除</button>

let selectedColor = NOTE_COLORS[0];
let selectedMood = '平静';
let deleteTarget = { type: '', id: '' };
let currentScheduleTab = 'upcoming';

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  checkFirstRun();
  setupColorPicker();
  setupMoodPicker();
  renderNoteBgColorPicker();
});

// 检查首次运行
function checkFirstRun() {
  const config = getData(DB_KEYS.config);
  if (!config) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('setupPage').classList.add('active');
  } else {
    // 已设过密钥，本次浏览器会话内直接进入，无需重复输入
    if (sessionStorage.getItem('niko_logged_in') === '1') {
      document.getElementById('loginPage').style.display = 'none';
      enterApp();
    } else {
      document.getElementById('loginPage').style.display = 'flex';
    }
  }
}

function doSetup() {
  const name = document.getElementById('setupName').value.trim();
  const key = document.getElementById('setupKey').value;
  if (!name || !key) { alert('请填写名字和密钥'); return; }
  saveData(DB_KEYS.config, { name, key, bgIndex: 0, customBg: null, noteBgColor: '#ffffff', noteFont: '默认', pinnedNoteIds: [] });
  enterApp();
}

function doLogin() {
  const key = document.getElementById('loginKey').value;
  const config = getData(DB_KEYS.config);
  if (config && config.key === key) enterApp();
  else {
    const e = document.getElementById('loginError');
    e.style.opacity = '1'; setTimeout(() => e.style.opacity = '0', 2000);
  }
}

function doLogout() {
  sessionStorage.removeItem('niko_logged_in');
  document.getElementById('appPage').classList.remove('active');
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('loginKey').value = '';
}

function enterApp() {
  sessionStorage.setItem('niko_logged_in', '1');
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('setupPage').classList.remove('active');
  document.getElementById('appPage').classList.add('active');

  const config = getData(DB_KEYS.config) || {};
  applyBackground(config.bgIndex || 0, config.customBg);
  
  updateDateTime();
  updateLocation();
  updateWeather();
  updateTilePreviews();
  
  setInterval(updateDateTime, 1000);
}

// 时间
function updateDateTime() {
  const now = new Date();
  document.getElementById('currentTime').textContent = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
  document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
}

// 定位
function updateLocation() {
  document.getElementById('locationText').textContent = '定位中...';
  fetch('https://ipapi.co/json/').then(r => r.json())
    .then(d => document.getElementById('locationText').textContent = d.city || d.country || '未知')
    .catch(() => document.getElementById('locationText').textContent = '未知');
}

// 天气
function updateWeather() {
  const wc = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌧️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',77:'🌨️',80:'🌧️',81:'🌧️',82:'🌧️',85:'🌨️',86:'🌨️',95:'⛈️',96:'⛈️',99:'⛈️'};
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude, longitude } = pos.coords;
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`)
      .then(r => r.json()).then(data => {
        const w = data.current_weather;
        document.getElementById('weatherIcon').textContent = wc[w.weathercode] || '🌤';
        document.getElementById('weatherText').textContent = `${Math.round(w.temperature)}°C`;
      }).catch(() => { document.getElementById('weatherIcon').textContent = '🌤'; document.getElementById('weatherText').textContent = '--°C'; });
  }, () => {
    document.getElementById('locationText').textContent = '未授权';
    document.getElementById('weatherIcon').textContent = '🌤';
    document.getElementById('weatherText').textContent = '--°C';
  });
}

// 更新磁贴预览
function updateTilePreviews() {
  const schedules = getData(DB_KEYS.schedules) || [];
  const notes = getData(DB_KEYS.notes) || [];
  const config = getData(DB_KEYS.config) || {};
  const now = new Date().toISOString().split('T')[0];
  
  // 日程：最近3条未完成
  const upcoming = schedules.filter(s => !s.done && s.date >= now).sort((a,b) => new Date(a.date+a.time) - new Date(b.date+b.time)).slice(0, 3);
  const schedC = document.getElementById('scheduleTileItems');
  if (!upcoming.length) schedC.innerHTML = '<div class="tile-empty">暂无日程</div>';
  else schedC.innerHTML = upcoming.map(s => `
    <div class="tile-item">
      <div class="tile-dot"></div>
      <div>
        <div class="tile-text">${escapeHtml(s.title)}</div>
        <div class="tile-meta">${s.date} ${s.time}</div>
      </div>
    </div>
  `).join('');
  
  // 便签：用户选择的
  const pinned = notes.filter(n => (config.pinnedNoteIds || []).includes(n.id)).slice(0, 3);
  const noteC = document.getElementById('noteTileItems');
  if (!pinned.length) {
    noteC.innerHTML = '<div class="tile-empty">暂无便签</div>';
  } else {
    noteC.innerHTML = pinned.map(n => `
      <div class="tile-item">
        <div class="tile-dot tile-dot-g"></div>
        <div>
          <div class="tile-text">${escapeHtml(n.content)}</div>
        </div>
      </div>
    `).join('');
  }
}

// 模态框
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// 日程
function openSchedule() { switchScheduleTab('upcoming'); openModal('scheduleModal'); }
function switchScheduleTab(tab) {
  currentScheduleTab = tab;
  document.querySelectorAll('#scheduleModal .list-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderScheduleList();
}
function renderScheduleList() {
  const schedules = getData(DB_KEYS.schedules) || [];
  const now = new Date().toISOString().split('T')[0];
  let f = schedules;
  if (currentScheduleTab === 'upcoming') f = schedules.filter(s => !s.done && s.date >= now);
  else if (currentScheduleTab === 'done') f = schedules.filter(s => s.done);
  f.sort((a,b) => new Date(a.date+' '+a.time) - new Date(b.date+' '+b.time));
  const c = document.getElementById('scheduleList');
  if (!f.length) { c.innerHTML='<div class="list-empty"><div class="icon">📅</div><p>暂无日程</p></div>'; return; }
  c.innerHTML = f.map(s => `
    <div class="list-item" onclick="editSchedule('${s.id}')">
      <div class="list-item-header">
        <span class="list-item-title">${escapeHtml(s.title)}${s.done?' ✓':''}</span>
        <span class="list-item-time">${s.date} ${s.time}</span>
      </div>
      ${s.note?`<div class="list-item-content">${escapeHtml(s.note)}</div>`:''}
      <div class="list-item-actions">
        ${!s.done?`<button class="done-btn" onclick="event.stopPropagation();toggleDone('${s.id}')">✓ 完成</button>`:''}
        <button class="edit-btn" onclick="event.stopPropagation();editSchedule('${s.id}')">编辑</button>
        <button class="del-btn" onclick="event.stopPropagation();confirmDeleteScheduleItem('${s.id}')">删除</button>
      </div>
    </div>
  `).join('');
}
function openScheduleForm(id=null) {
  document.getElementById('scheduleId').value=''; document.getElementById('scheduleTitle').value='';
  document.getElementById('scheduleDate').value=''; document.getElementById('scheduleTime').value='';
  document.getElementById('scheduleNote').value='';
  document.getElementById('scheduleFormTitle').textContent='新建日程';
  document.getElementById('scheduleDelBtn').style.display='none';
  closeModal('scheduleModal'); openModal('scheduleFormModal');
}
function editSchedule(id) {
  const schedules = getData(DB_KEYS.schedules)||[];
  const s = schedules.find(x=>x.id===id); if(!s) return;
  document.getElementById('scheduleId').value=id;
  document.getElementById('scheduleTitle').value=s.title;
  document.getElementById('scheduleDate').value=s.date;
  document.getElementById('scheduleTime').value=s.time;
  document.getElementById('scheduleNote').value=s.note||'';
  document.getElementById('scheduleFormTitle').textContent='编辑日程';
  document.getElementById('scheduleDelBtn').style.display='inline-block';
  closeModal('scheduleModal'); openModal('scheduleFormModal');
}
function saveSchedule() {
  const id=document.getElementById('scheduleId').value;
  const title=document.getElementById('scheduleTitle').value.trim();
  const date=document.getElementById('scheduleDate').value;
  const time=document.getElementById('scheduleTime').value;
  const note=document.getElementById('scheduleNote').value.trim();
  if(!title||!date){alert('请填写标题和日期');return;}
  const schedules=getData(DB_KEYS.schedules)||[];
  if(id){const i=schedules.findIndex(s=>s.id===id);if(i!==-1)schedules[i]={...schedules[i],title,date,time,note};}
  else schedules.push({id:Date.now().toString(),title,date,time,note,done:false,created:new Date().toISOString()});
  saveData(DB_KEYS.schedules,schedules);
  closeModal('scheduleFormModal'); updateTilePreviews();
  if(id) openSchedule();
}
function toggleDone(id){
  const schedules=getData(DB_KEYS.schedules)||[];
  const i=schedules.findIndex(s=>s.id===id);
  if(i!==-1){schedules[i].done=!schedules[i].done;saveData(DB_KEYS.schedules,schedules);renderScheduleList();updateTilePreviews();}
}
function confirmDeleteScheduleItem(id){deleteTarget={type:'schedule',id};document.getElementById('confirmText').textContent='确定要删除这个日程吗？';document.getElementById('confirmDialog').classList.add('active');}
function confirmDeleteSchedule(){const id=document.getElementById('scheduleId').value;if(id){confirmDeleteScheduleItem(id);closeModal('scheduleFormModal');}}

// 便签
function openNotes(){renderNoteList();openModal('noteModal');}
function renderNoteList(){
  const notes=getData(DB_KEYS.notes)||[];
  notes.sort((a,b)=>new Date(b.created)-new Date(a.created));
  const c=document.getElementById('noteList');
  if(!notes.length){c.innerHTML='<div class="list-empty"><div class="icon">📝</div><p>暂无便签</p></div>';return;}
  const config=getData(DB_KEYS.config)||{};
  const pinned=(config.pinnedNoteIds||[]);
  c.innerHTML=notes.map(n=>`
    <div class="note-card" style="background:${n.color}" onclick="editNote('${n.id}')">
      <div class="note-card-actions">
        <button class="${pinned.includes(n.id)?'del':''}" onclick="event.stopPropagation();togglePinNote('${n.id}')" title="${pinned.includes(n.id)?'取消显示':'显示到首页'}">${pinned.includes(n.id)?'★':'☆'}</button>
        <button class="del" onclick="event.stopPropagation();confirmDeleteNoteItem('${n.id}')">✕</button>
      </div>
      <div class="note-card-content">${escapeHtml(n.content)}</div>
      <div class="note-card-footer">

        <span class="note-card-time">${formatDate(n.created)}</span>
      </div>
    </div>
  `).join('');
}
function togglePinNote(id){
  const config=getData(DB_KEYS.config)||{};
  const arr=config.pinnedNoteIds||[];
  const i=arr.indexOf(id);
  if(i>-1)arr.splice(i,1); else arr.push(id);
  config.pinnedNoteIds=arr;
  saveData(DB_KEYS.config,config);
  renderNoteList(); updateTilePreviews();
}
function openNoteForm(){
  document.getElementById('noteId').value=''; document.getElementById('noteContent').value='';
  document.getElementById('noteFormTitle').textContent='新建便签';
  document.getElementById('noteDelBtn').style.display='none';
  document.getElementById('noteToScheduleBtn').style.display='inline-block';
  selectedColor=NOTE_COLORS[0]; selectedMood='平静';
  document.querySelectorAll('#noteFormModal .color-option').forEach((el,i)=>el.classList.toggle('selected',i===0));
  document.querySelectorAll('#noteFormModal .mood-option').forEach(el=>el.classList.toggle('selected',el.dataset.mood==='平静'));
  document.getElementById('notePinCheckbox').checked=false;
  closeModal('noteModal'); openModal('noteFormModal');
}
function editNote(id){
  const notes=getData(DB_KEYS.notes)||[]; const n=notes.find(x=>x.id===id); if(!n)return;
  document.getElementById('noteId').value=id; document.getElementById('noteContent').value=n.content;
  document.getElementById('noteFormTitle').textContent='编辑便签';
  document.getElementById('noteDelBtn').style.display='inline-block';
  document.getElementById('noteToScheduleBtn').style.display='inline-block';
  selectedColor=n.color; selectedMood=n.mood;
  document.querySelectorAll('#noteFormModal .color-option').forEach(el=>el.classList.toggle('selected',el.dataset.color===n.color));
  document.querySelectorAll('#noteFormModal .mood-option').forEach(el=>el.classList.toggle('selected',el.dataset.mood===n.mood));
  const config=getData(DB_KEYS.config)||{}; const pinned=(config.pinnedNoteIds||[]);
  document.getElementById('notePinCheckbox').checked=pinned.includes(id);
  closeModal('noteModal'); openModal('noteFormModal');
}
function saveNote(){
  const id=document.getElementById('noteId').value;
  const content=document.getElementById('noteContent').value.trim();
  if(!content){alert('请填写内容');return;}
  const notes=getData(DB_KEYS.notes)||[];
  if(id){const i=notes.findIndex(n=>n.id===id);if(i!==-1)notes[i]={...notes[i],content,color:selectedColor,mood:selectedMood};}
  else notes.push({id:Date.now().toString(),content,color:selectedColor,mood:selectedMood,created:new Date().toISOString()});
  saveData(DB_KEYS.notes,notes);
  // 同步首页展示勾选状态
  const config=getData(DB_KEYS.config)||{}; let pinned=config.pinnedNoteIds||[];
  const wantPin=document.getElementById('notePinCheckbox').checked;
  if(wantPin&&!pinned.includes(id)){pinned.push(id);}
  else if(!wantPin){pinned=pinned.filter(pid=>pid!==id);}
  config.pinnedNoteIds=pinned; saveData(DB_KEYS.config,config);
  closeModal('noteFormModal'); updateTilePreviews();
  if(id)openNotes();
}
function noteToSchedule(){
  const content=document.getElementById('noteContent').value.trim();
  if(!content){alert('请先填写内容');return;}
  closeModal('noteFormModal');
  document.getElementById('scheduleTitle').value=content.substring(0,50);
  document.getElementById('scheduleDate').value=''; document.getElementById('scheduleTime').value='';
  document.getElementById('scheduleNote').value=''; document.getElementById('scheduleId').value='';
  document.getElementById('scheduleFormTitle').textContent='新建日程';
  document.getElementById('scheduleDelBtn').style.display='none';
  openModal('scheduleFormModal');
}
function confirmDeleteNoteItem(id){deleteTarget={type:'note',id};document.getElementById('confirmText').textContent='确定要删除这条便签吗？';document.getElementById('confirmDialog').classList.add('active');}
function confirmDeleteNote(){const id=document.getElementById('noteId').value;if(id){confirmDeleteNoteItem(id);closeModal('noteFormModal');}}

// 搜索
function openSearch(){
  document.getElementById('searchInput').value=''; document.getElementById('searchResults').innerHTML='';
  openModal('searchModal'); setTimeout(()=>document.getElementById('searchInput').focus(),300);
}
function doSearch(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const results=document.getElementById('searchResults');
  if(!q){results.innerHTML='';return;}
  const schedules=getData(DB_KEYS.schedules)||[]; const notes=getData(DB_KEYS.notes)||[];
  const ms=schedules.filter(s=>s.title.toLowerCase().includes(q)||(s.note&&s.note.toLowerCase().includes(q)));
  const mn=notes.filter(n=>n.content.toLowerCase().includes(q));
  let html='';
  if(ms.length){html+='<p style="font-size:0.78rem;color:#999;margin:1rem 0 0.5rem">日程</p>';ms.forEach(s=>{html+=`<div class="list-item" onclick="editSchedule('${s.id}');closeModal('searchModal')"><div class="list-item-header"><span class="list-item-title">${escapeHtml(s.title)}</span><span class="list-item-time">${s.date}</span></div>${s.note?`<div class="list-item-content">${escapeHtml(s.note)}</div>`:''}</div>`;});}
  if(mn.length){html+='<p style="font-size:0.78rem;color:#999;margin:1rem 0 0.5rem">便签</p>';mn.forEach(n=>{html+=`<div class="note-card" style="background:${n.color}" onclick="editNote('${n.id}');closeModal('searchModal')"><div class="note-card-content">${escapeHtml(n.content)}</div><div class="note-card-footer"><span class="note-card-mood">${MOOD_ICONS[n.mood]||''} ${n.mood}</span></div></div>`;});}
  if(!ms.length&&!mn.length)html='<div class="list-empty"><p>没有找到相关结果</p></div>';
  results.innerHTML=html;
}

// 设置
function openSettings(){
  const config=getData(DB_KEYS.config)||{};
  document.getElementById('settingsName').textContent=`${config.name||'---'} →`;
  renderBgPicker(); renderNoteBgColorPicker(); renderNoteFontPicker();
  openModal('settingsModal');
}
function renderBgPicker(){
  const config=getData(DB_KEYS.config)||{}; const idx=config.bgIndex||0;
  const picker=document.getElementById('bgPicker');
  let html=BG_PREVIEWS.map((src,i)=>`<div class="bg-option ${i===idx&&!config.customBg?'selected':''}" style="background-image:url(${src})" onclick="selectBg(${i})"></div>`).join('');
  if(config.customBg)html+=`<div class="bg-option selected" style="background-image:url(${config.customBg});background-size:cover" onclick="selectBg(-1)"></div>`;
  html+=`<label class="bg-upload"><span style="font-size:1.2rem">+</span><span>上传</span><input type="file" accept="image/*" onchange="uploadBg(this)"></label>`;
  picker.innerHTML=html;
}
function selectBg(index){
  const config=getData(DB_KEYS.config)||{};
  if(index===-1)config.bgIndex=-1; else{config.bgIndex=index;config.customBg=null;}
  saveData(DB_KEYS.config,config); applyBackground(config.bgIndex,config.customBg); renderBgPicker();
}
function uploadBg(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{const config=getData(DB_KEYS.config)||{};config.bgIndex=-1;config.customBg=e.target.result;saveData(DB_KEYS.config,config);applyBackground(-1,e.target.result);renderBgPicker();};
  reader.readAsDataURL(file);
}
function applyBackground(index,customBg){
  if(index===-1&&customBg){document.body.style.backgroundImage=`url(${customBg})`;document.body.style.backgroundSize='cover';document.body.style.backgroundPosition='center';}
  else if(index>=0&&index<BG_IMAGES.length){document.body.style.backgroundImage=`url(${BG_IMAGES[index]})`;document.body.style.backgroundSize='cover';document.body.style.backgroundPosition='center';}
  else{document.body.style.backgroundImage=`url(${BG_IMAGES[0]})`;document.body.style.backgroundSize='cover';document.body.style.backgroundPosition='center';}
}

function renderNoteBgColorPicker(){
  const config=getData(DB_KEYS.config)||{};
  const current=config.noteBgColor||'#ffffff';
  const picker=document.getElementById('noteBgColorPicker');
  picker.innerHTML=NOTE_BG_COLORS.map(c=>`<div class="bg-color-option ${c===current?'selected':''}" style="background:${c}" data-color="${c}" onclick="selectNoteBgColor(this)"></div>`).join('');
}
function selectNoteBgColor(el){
  document.querySelectorAll('#noteBgColorPicker .bg-color-option').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  const color=el.dataset.color;
  const config=getData(DB_KEYS.config)||{}; config.noteBgColor=color; saveData(DB_KEYS.config,config);
}
function renderNoteFontPicker(){
  const config=getData(DB_KEYS.config)||{}; const current=config.noteFont||'默认';
  document.querySelectorAll('#settingsModal .font-option').forEach(el=>el.classList.toggle('selected',el.dataset.font===current));
}
function selectNoteFont(el){
  document.querySelectorAll('#settingsModal .font-option').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  const config=getData(DB_KEYS.config)||{}; config.noteFont=el.dataset.font; saveData(DB_KEYS.config,config);
}

function openEditName(){
  const config=getData(DB_KEYS.config)||{};
  document.getElementById('newNameInput').value=config.name||'';
  closeModal('settingsModal'); openModal('editNameModal');
}
function saveName(){
  const name=document.getElementById('newNameInput').value.trim();
  if(!name){alert('请输入名字');return;}
  const config=getData(DB_KEYS.config)||{}; config.name=name; saveData(DB_KEYS.config,config);
  document.getElementById('settingsName').textContent=`${name} →`;
  closeModal('editNameModal'); openModal('settingsModal');
}
function openChangeKey(){
  document.getElementById('currentKeyInput').value=''; document.getElementById('newKeyInput').value='';
  closeModal('settingsModal'); openModal('changeKeyModal');
}
function saveNewKey(){
  const current=document.getElementById('currentKeyInput').value; const newKey=document.getElementById('newKeyInput').value;
  const config=getData(DB_KEYS.config)||{};
  if(current!==config.key){alert('当前密钥错误');return;}
  if(!newKey||newKey.length<4){alert('新密钥至少4位');return;}
  config.key=newKey; saveData(DB_KEYS.config,config); alert('密钥修改成功'); closeModal('changeKeyModal');
}

// 删除确认
function doConfirmDelete(){
  if(deleteTarget.type==='schedule'){let s=getData(DB_KEYS.schedules)||[];s=s.filter(x=>x.id!==deleteTarget.id);saveData(DB_KEYS.schedules,s);closeModal('scheduleModal');}
  else if(deleteTarget.type==='note'){let n=getData(DB_KEYS.notes)||[];n=n.filter(x=>x.id!==deleteTarget.id);saveData(DB_KEYS.notes,n);closeModal('noteModal');}
  closeConfirm(); updateTilePreviews();
}
function closeConfirm(){document.getElementById('confirmDialog').classList.remove('active');deleteTarget={type:'',id:''};}

// 颜色/心情选择
function setupColorPicker(){
  document.querySelectorAll('#noteFormModal .color-option').forEach(el=>{el.addEventListener('click',()=>{document.querySelectorAll('#noteFormModal .color-option').forEach(e=>e.classList.remove('selected'));el.classList.add('selected');selectedColor=el.dataset.color;});});
}
function setupMoodPicker(){
  document.querySelectorAll('#noteFormModal .mood-option').forEach(el=>{el.addEventListener('click',()=>{document.querySelectorAll('#noteFormModal .mood-option').forEach(e=>e.classList.remove('selected'));el.classList.add('selected');selectedMood=el.dataset.mood;});});
}

// 工具
function getData(k){try{return JSON.parse(localStorage.getItem(k));}catch{return null;}}
function saveData(k,d){localStorage.setItem(k,JSON.stringify(d));}
function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function formatDate(iso){return new Date(iso).toLocaleDateString('zh-CN',{month:'short',day:'numeric'});}

// 点击遮罩关闭
document.querySelectorAll('.modal-overlay').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('active');});});
// 回车登录
document.getElementById('loginKey').addEventListener('keypress',e=>{if(e.key==='Enter')doLogin();});
</script>
