<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NikWe|智者，人生</title>
    <!-- 环境加载 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;900&family=Noto+Sans+SC:wght@100;400;900&family=Noto+Serif+SC:wght@400;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&family=Long+Cang&family=JetBrains+Mono&display=swap');
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Inter', 'Noto Sans SC', sans-serif; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        
        #wallpaper-layer { 
            position: fixed; inset: 0; background-size: cover; background-position: center; z-index: 0; 
            transition: background-image 1s ease-in-out;
        }
        #wallpaper-layer::after { content: ""; position: absolute; inset: 0; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }

        .brand-logo-text { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1; pointer-events: none; font-size: 16vw; font-weight: 900; color: rgba(255,255,255,0.06); text-transform: uppercase; letter-spacing: -0.05em; }

        /* 编辑器 28项 物理锁死渲染 */
        .editor-view:empty:before { content: "在此记录思考，输入 @AI 召唤助手..."; color: #94a3b8; pointer-events: none; }
        .editor-view h1 { font-size: 2.2em; font-weight: 900; margin: 0.8em 0 0.4em; color: #000; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }
        .editor-view table { border-collapse: collapse; width: 100%; margin: 1em 0; border: 1.5px solid #e2e8f0; }
        .editor-view td { border: 1px solid #e2e8f0; padding: 10px; min-width: 50px; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        .tool-btn { 
            height: 32px; min-width: 32px; display: flex; align-items: center; justify-content: center; 
            border-radius: 6px; font-size: 10px; font-weight: 900; color: #000; transition: 0.2s;
            cursor: pointer; background: rgba(255,255,255,0.98); border: 1px solid #e2e8f0;
        }
        .tool-btn:hover { background: #000 !important; color: #fff !important; transform: translateY(-1px); }

        .float-dock-btn {
            width: 56px; height: 56px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            color: rgba(0,0,0,0.75); border-radius: 20px; position: relative;
        }
        .float-dock-btn:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(12px); color: #000; }

        .glass-panel { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(50px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 40px 80px rgba(0,0,0,0.12); }
        .tile-widget { flex: 1; min-width: 200px; max-width: 330px; height: 160px; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.5); display: flex; flex-direction: column; padding: 1.5rem; border-radius: 32px; background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(30px); }
        .tile-widget:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.5); }

        .glass-input { background: rgba(0, 0, 0, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(0, 0, 0, 0.08); @apply w-full p-4 rounded-xl outline-none focus:bg-white/40 transition-all text-xs font-black text-slate-800 shadow-inner; }

        .chat-bubble { @apply p-4 rounded-2xl mb-4 max-w-[90%] text-xs font-bold leading-relaxed; }
        .chat-user { @apply bg-black text-white ml-auto rounded-tr-none shadow-lg; }
        .chat-target { @apply bg-white border border-black/5 text-slate-800 mr-auto rounded-tl-none shadow-sm; }

        .file-card { @apply mt-3 p-3 bg-white/50 border border-black/5 rounded-xl flex items-center gap-3 text-[10px] font-black uppercase tracking-tighter hover:bg-white transition-all cursor-pointer shadow-sm; }
        .badge { @apply absolute -top-1 -right-1 bg-red-500 text-white text-[8px] font-black w-4.5 h-4.5 rounded-full flex items-center justify-center border-2 border-white; }

        .plugin-frame { width: 100%; height: 100%; border: none; border-radius: 24px; background: #fff; }

        @media print { .no-print { display: none !important; } body { background: white !important; } .print-area { position: static !important; width: 100% !important; overflow: visible !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const ICONS = {
            plus: "M12 5v14M5 12h14", close: "M18 6L6 18M6 6l12 12", external: "M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6 M15 3h6v6 M10 14L21 3",
            send: "M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z", image: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M17 8l-5-5-5 5 M12 3v12",
            print: "M6 9V2h12v7 M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2",
            link: "M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71", table: "M3 3h18v18H3z M3 9h18 M3 15h18",
            trash: "M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2",
            undo: "M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6", redo: "M21 10H11a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6",
            book: "M4 19.5A2.5 2.5 0 0 1 6.5 17H20 M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15",
            cycle: "M12 2v4 M12 18v4 M12 12m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0",
            eye: "M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0 M12 5c7 0 10 7 10 7s-3 7-10 7s-10-7-10-7s3-7 10-7z",
            engine: "M12 15a3 3 0 100-6 3 3 0 000 6z",
            pin: "M12 2v8m0 0l-4 4m4-4l4 4M5 20h14", upload: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M17 8l-5-5-5 5 M12 3v12",
            bird: "M16 3H8L2 12l6 9h8l6-9-6-9z M2 12h20", mail: "M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6z M20 6l-8 5-8-5",
            clip: "M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19",
            doc: "M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6",
            lab: "M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2z",
            alignLeft: "M21 6H3M15 12H3M17 18H3", alignCenter: "M18 6H6M21 12H3M18 18H6", alignRight: "M21 6H3M21 12H9M21 18H7", alignFull: "M3 3h18v18H3V3zm2 2v14h14V5H5z",
            indent: "M10 12h10M10 18h10M10 6h10M3 12l4 4M3 12l4-4", hr: "M5 12h14",
            check: "M20 6L9 17l-5-5", clock: "M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z", calendar: "M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z",
            list: "M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01", plugin: "M12 2v4 M12 18v4 M4.93 4.93l2.83 2.83 M16.24 16.24l2.83 2.83 M2 12h4 M18 12h4 M4.93 19.07l2.83-2.83 M16.24 7.76l2.83-2.83",
            board: "M3 9h18M9 21V9M15 21V9M21 3H3a2 2 0 00-2 2v14a2 2 0 002 2h18a2 2 0 002-2V5a2 2 0 00-2-2z", scan: "M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9",
            menu: "M3 12h18M3 6h18M3 18h18"
        };

        const PRESET_WALLS = ["https://images.unsplash.com/photo-1506744038136-46273834b3fb", "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b", "https://images.unsplash.com/photo-1501785888041-af3ef285b470", "https://images.unsplash.com/photo-1470770841072-f978cf4d019e"];
        const MOODS = [{ icon: "Focus", color: "#10b981" }, { icon: "Work", color: "#3b82f6" }, { icon: "Creative", color: "#a855f7" }, { icon: "Relax", color: "#f59e0b" }, { icon: "Alert", color: "#ef4444" }];
        const FONTS = [{ label: "思源黑体", value: "Noto Sans SC" }, { label: "思源宋体", value: "Noto Serif SC" }, { label: "马善政楷", value: "Ma Shan Zheng" }, { label: "智莽行书", value: "Zhi Mang Xing" }, { label: "Inter Pro", value: "Inter" }, { label: "JetBrains Mono", value: "JetBrains Mono" }];

        const Icon = ({ name, size = 14, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className={className} strokeLinecap="round" strokeLinejoin="round"><path d={ICONS[name] || ICONS.plus} /></svg>
        );

        const App = () => {
            const [view, setView] = useState('desktop'); 
            const [location, setLocation] = useState('定位中...');
            const [weather, setWeather] = useState('...');
            const [time, setTime] = useState('--:--');
            const [date, setDate] = useState('...');
            const [isAiOpen, setIsAiOpen] = useState(false);
            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [activePlugin, setActivePlugin] = useState(null);
            const [showNoteSidebar, setShowNoteSidebar] = useState(true);
            
            const [config, setConfig] = useState(() => JSON.parse(localStorage.getItem('NikWe_Master_Config_V200_Stable') || JSON.stringify({
                username: "智者", wallpaper: PRESET_WALLS[0],
                aiBaseUrl: "https://api.deepseek.com/v1/chat/completions", aiKey: "", aiModel: "deepseek-chat",
                localBaseUrl: "http://localhost:11434/v1/chat/completions", localModel: "llama3",
                plugins: [{ name: "思维导图", url: "https://boardmix.cn/" }, { name: "协作白板", url: "https://www.excalidraw.com/" }], apps: []
            })));

            const [notes, setNotes] = useState(() => JSON.parse(localStorage.getItem('NikData_Notes_V200_Stable') || '[{"id":1,"title":"智者指南","content":"","pinned":true}]'));
            const [activeNoteId, setActiveNoteId] = useState(notes[0]?.id || 1);
            const [schedules, setSchedules] = useState(() => JSON.parse(localStorage.getItem('NikData_Schedules_V200_Stable') || '[]'));
            const [stickies, setStickies] = useState(() => JSON.parse(localStorage.getItem('NikData_Stickies_V200_Stable') || '[{"id":1,"text":"记录瞬间灵感...","color":"#fef3c7","mood":"Focus","pinned":true,"linkedTaskId":null}]'));
            
            const [commMode, setCommMode] = useState('chat'); 
            const [plannerTab, setPlannerTab] = useState('schedule'); 
            const [activeContactId, setActiveContactId] = useState(1);
            
            const [aiHistory, setAiHistory] = useState([{ role: 'target', text: '我是 NikWe Copilot。我可以访问您的笔记本、日程和便签。我可以帮您填写表格、安排计划。只需下达指令。', time: '--:--' }]);
            const [isAiScanning, setIsAiScanning] = useState(false);

            const emails = useMemo(() => [
                { id: 1, from: "系统管家", subject: "系统物理状态就绪", content: "智者，核心工具栏 28 项已锁死，Slogan 还原完毕。", time: "NOW" },
                { id: 2, from: "实验室", subject: "外联接口激活", content: "您可以注册外部 protocol:// 调用本地软件。", time: "Yesterday" }
            ], []);

            const [contacts, setContacts] = useState(() => JSON.parse(localStorage.getItem('NikData_Contacts_V200_Stable') || JSON.stringify([
                { id: 1, name: "项目办-老张", avatar: "Z", msgs: [{id:1, role:'target', text:'物理锁死协议已同步。', time:'10:30'}], unread: 1 },
                { id: 2, name: "设计协作组", avatar: "D", msgs: [], unread: 0 }
            ])));

            const editorRef = useRef(null);
            const saveConfig = (next) => { setConfig(next); localStorage.setItem('NikWe_Master_Config_V200_Stable', JSON.stringify(next)); };
            const saveNotes = (n) => { setNotes(n); localStorage.setItem('NikData_Notes_V200_Stable', JSON.stringify(n)); };
            const saveSchedules = (s) => { setSchedules(s); localStorage.setItem('NikData_Schedules_V200_Stable', JSON.stringify(s)); };
            const saveStickies = (st) => { setStickies(st); localStorage.setItem('NikData_Stickies_V200_Stable', JSON.stringify(st)); };

            const displayTasks = useMemo(() => schedules.filter(s => !s.done).slice(0,3), [schedules]);
            const displayStickies = useMemo(() => stickies.filter(s => s.pinned).slice(0,3), [stickies]);
            const displayNotes = useMemo(() => notes.filter(n => n.pinned).slice(0,3), [notes]);
            const totalUnread = useMemo(() => contacts.reduce((a,b)=>a+b.unread, 0), [contacts]);

            // 物理补齐：真实地点与天气获取
            useEffect(() => {
                const fetchEnv = async () => {
                    try {
                        const locRes = await fetch('https://ipapi.co/json/');
                        const locData = await locRes.json();
                        if(locData.city) { 
                            setLocation(locData.city.toUpperCase()); 
                            const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${locData.latitude}&longitude=${locData.longitude}&current_weather=true`); 
                            const wData = await wRes.json(); 
                            setWeather(`${Math.round(wData.current_weather.temperature)}°C`); 
                        }
                    } catch (e) { setLocation('NIKWE HUB'); setWeather('...°C'); }
                };
                fetchEnv();
                const timer = setInterval(() => {
                    const now = new Date();
                    setTime(now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false }));
                    setDate(now.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' }) + ' ' + now.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase());
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const exec = (e, cmd, val = null) => { e.preventDefault(); document.execCommand(cmd, false, val); };

            const handleEditorInput = () => {
                if (!editorRef.current) return;
                const html = editorRef.current.innerHTML;
                if (html.includes('@AI')) { setIsAiOpen(true); editorRef.current.innerHTML = html.replace('@AI', '<span style="color:#2563eb; font-weight:900;">@AI</span>'); }
                saveNotes(notes.map(n => n.id === activeNoteId ? {...n, content:editorRef.current.innerHTML} : n));
            };

            const handleSendMsg = () => {
                const input = document.getElementById('human-msg-input');
                if(!input || !input.value.trim()) return;
                const newMsg = { id: Date.now(), role: 'user', text: input.value, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
                const next = contacts.map(c => c.id === activeContactId ? {...c, msgs: [...c.msgs, newMsg]} : c);
                setContacts(next); localStorage.setItem('NikData_Contacts_V200_Stable', JSON.stringify(next));
                input.value = '';
            };

            const handleWallUpload = (e) => {
                const file = e.target.files[0]; if(!file) return;
                const r = new FileReader(); r.onload = (v) => saveConfig({...config, wallpaper: v.target.result}); r.readAsDataURL(file);
            };

            const handleAiAction = (action) => {
                const { type, payload } = action;
                if (type === 'CREATE_SCHEDULE') saveSchedules([{ id: Date.now(), text: payload.text, date: payload.date, time: payload.time, done: false, pinned: false }, ...schedules]);
                else if (type === 'CREATE_NOTE') { const nid = Date.now(); saveNotes([{ id: nid, title: payload.title, content: payload.content, pinned: false }, ...notes]); setActiveNoteId(nid); setView('note'); }
                else if (type === 'CREATE_STICKY') saveStickies([{ id: Date.now(), text: payload.text, color: payload.color || '#fef3c7', mood: 'Work', pinned: false }, ...stickies]);
                else if (type === 'INSERT_EDITOR' && editorRef.current) { editorRef.current.focus(); document.execCommand('insertHTML', false, payload.html); handleEditorInput(); }
                setIsAiOpen(false);
            };

            const callAiApi = async (userInput) => {
                if (!userInput.trim()) return;
                setAiHistory(prev => [...prev, { role: 'user', text: userInput, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) }]);
                const context = isAiScanning ? JSON.stringify({ notes, schedules, stickies }) : "No context";
                
                // 联网大模型 API 调用代码实现
                try {
                    const response = await fetch(config.aiBaseUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.aiKey}` },
                        body: JSON.stringify({ 
                            model: config.aiModel, 
                            messages: [
                                { role: 'system', content: `You are NikWe Copilot. Use JSON ACTION for any writing tasks. Context: ${context}. Location: ${location}. Weather: ${weather}.` }, 
                                ...aiHistory.map(h=>({role:h.role==='user'?'user':'assistant',content:h.text})), 
                                { role: 'user', content: userInput }
                            ] 
                        })
                    });
                    const data = await response.json();
                    const text = data.choices[0].message.content;
                    const actionMatch = text.match(/ACTION:\s*({.*})/);
                    let action = null; if (actionMatch) { try { action = JSON.parse(actionMatch[1]); } catch(e) {} }
                    setAiHistory(prev => [...prev, { role: 'target', text: text.replace(/ACTION:\s*({.*})/, ''), time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), action }]);
                } catch (e) { setAiHistory(prev => [...prev, { role: 'target', text: '通信失败，请检查配置。', time: '--:--' }]); }
            };

            return (
                <div className="relative h-full w-full overflow-hidden select-none">
                    <div id="wallpaper-layer" style={{backgroundImage: `url(${config.wallpaper})`}}></div>
                    <div className="brand-logo-text">NikWe</div>

                    {/* Slogan 物理还原 & 真实天气位置 */}
                    <header className={`fixed top-0 w-full p-6 md:p-10 flex justify-between items-start z-[100] no-print ${view!=='desktop'?'pointer-events-none':''}`}>
                        <div className="flex flex-col gap-1 pointer-events-auto bg-white/40 backdrop-blur-2xl px-5 py-2.5 rounded-3xl border border-white shadow-sm font-black text-black">
                            <div className="flex items-center gap-2 text-xs md:text-sm"><div className="w-1.5 h-1.5 bg-black rounded-full animate-pulse"></div><span>{location}</span></div>
                            <div className="text-[9px] opacity-30 tracking-widest uppercase font-black">{weather} | Realtime</div>
                        </div>
                        <div className="text-right pointer-events-auto bg-white/40 backdrop-blur-2xl px-6 py-2.5 rounded-3xl border border-white shadow-sm text-black">
                            <div className="text-xs md:text-sm font-bold tracking-widest font-black">{config.username}，人生</div>
                            <div className="text-[9px] opacity-40 uppercase italic tracking-widest font-black text-black">Nik Master Unit</div>
                        </div>
                    </header>

                    {/* 全域搜索遮罩 */}
                    {isSearchOpen && (
                        <div className="fixed inset-0 z-[12000] bg-white/95 flex flex-col items-center justify-start pt-40 animate-in fade-in duration-300">
                            <button onClick={()=>setIsSearchOpen(false)} className="absolute top-10 right-10 w-12 h-12 rounded-full bg-black/5 flex items-center justify-center hover:bg-black/10"><Icon name="close" size={24}/></button>
                            <div className="w-full max-w-2xl px-8"><input autoFocus className="w-full bg-transparent border-b-4 border-black/20 outline-none text-5xl font-black placeholder-black/10 pb-4 font-black" placeholder="搜索文档或协作指令..." /></div>
                        </div>
                    )}

                    {view === 'desktop' && (
                        <div className="relative z-20 h-screen w-full flex flex-col items-center justify-between py-12 md:py-24">
                            <div className="flex-1 flex flex-col items-center justify-center w-full">
                                <div className="text-center mb-10 md:mb-12">
                                    <div className="clock-display font-thin text-[22vw] md:text-[7.5rem] tracking-tighter leading-none text-black drop-shadow-sm">{time}</div>
                                    <div className="date-display text-[10px] md:text-[13px] text-black/40 tracking-[0.4em] uppercase font-black mt-3">{date}</div>
                                </div>
                                <div className="w-full max-w-6xl px-6 md:px-8 flex flex-wrap justify-center gap-6 md:gap-8 animate-in fade-in slide-in-from-bottom-5 duration-700">
                                    <div onClick={()=>setView('planner')} className="tile-widget"><div className="flex justify-between items-start mb-2"><span className="text-[9px] font-black uppercase opacity-20 tracking-widest font-black">Plans</span><Icon name="pin" size={10} className="opacity-10"/></div><div className="space-y-2 flex-1 overflow-hidden font-black text-black">{displayTasks.map(t => (<div key={t.id} className="truncate font-bold text-[11px] flex items-center gap-2"><div className="w-1 h-1 bg-black rounded-full shrink-0"></div>{t.text}</div>))}</div></div>

                                </div>
                            ))}
                        </div>
                        <div className="p-4 border-t flex flex-col gap-3 bg-white pb-[calc(1rem+env(safe-area-inset-bottom))] font-black">
                            <div className="flex justify-between items-center"><button onClick={()=>setIsAiScanning(!isAiScanning)} className={`flex items-center gap-2 px-3 py-1.5 rounded-full transition-all border ${isAiScanning ? 'bg-black text-white border-black shadow-lg font-black' : 'opacity-50 font-black'}`}><Icon name="scan" size={10} /><span className="text-[9px] uppercase font-black">Context Injected</span></button></div>
                            <div className="flex gap-2 font-black"><input id="ai-input" className="flex-1 bg-slate-100 p-3 rounded-xl outline-none text-xs font-bold font-black" placeholder="下达分析或填充指令..." onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){callAiApi(e.target.value); e.target.value=''}}} /><button onClick={()=>{const i=document.getElementById('ai-input'); if(i){callAiApi(i.value); i.value=''}}} className="bg-black text-white p-3 rounded-xl shadow-lg active:scale-95 font-black"><Icon name="send" size={16}/></button></div>
                        </div>
                    </div>

                    {/* 配置中心 */}
                    {view === 'settings' && (
                        <div className="fixed inset-0 md:m-auto glass-panel z-[5000] flex flex-col overflow-hidden shadow-2xl md:w-[90vw] md:max-w-[650px] md:h-[80vh] md:rounded-[35px]">
                            <div className="p-8 border-b border-black/5 flex justify-between items-center bg-white/50 shrink-0 font-black"><span className="text-xs uppercase tracking-widest text-black font-black font-black">Master Configuration Hub</span><div onClick={()=>setView('desktop')} className="cursor-pointer text-black/30 hover:text-red-500 transition-colors font-black"><Icon name="close" size={20} /></div></div>
                            <div className="flex-1 overflow-y-auto p-8 md:p-10 space-y-10 custom-scrollbar font-black text-black">
                                <section className="grid grid-cols-1 sm:grid-cols-[120px_1fr] gap-6 items-center font-black text-black"><label className="text-[10px] uppercase opacity-30 font-black text-black">Identity</label><input className="glass-input font-black" value={config.username} onChange={e=>saveConfig({...config, username:e.target.value})} /></section>
                                
                                <section><label className="text-[10px] font-black uppercase opacity-30 tracking-widest block mb-4">Environment</label><div className="grid grid-cols-5 gap-3">{PRESET_WALLS.map(w => (<div key={w} onClick={()=>saveConfig({...config, wallpaper:w})} className={`aspect-video rounded-xl border-2 transition-all cursor-pointer bg-cover bg-center ${config.wallpaper===w?'border-black scale-95 shadow-lg':'border-transparent opacity-60'}`} style={{backgroundImage:`url(${w})`}}></div>))}<label className="aspect-video rounded-xl border-2 border-dashed border-black/10 flex items-center justify-center cursor-pointer hover:bg-black/5 transition-all"><Icon name="upload" size={16} className="opacity-20" /><input type="file" hidden accept="image/*" onChange={handleWallUpload} /></label></div></section>

                                <section className="space-y-4 font-black">
                                    <label className="text-[10px] uppercase opacity-30 font-black font-black">Intelligence API Stack</label>
                                    {['aiBaseUrl', 'aiKey', 'aiModel', 'localBaseUrl', 'localModel'].map(k => (
                                        <div key={k} className="grid grid-cols-1 sm:grid-cols-[120px_1fr] gap-4 items-center font-black"><span className="text-[10px] opacity-20 uppercase font-black">{k}</span><input className="glass-input font-black" value={config[k]} onChange={e=>saveConfig({...config, [k]:e.target.value})} /></div>
                                    ))}
                                </section>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
