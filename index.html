<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NikO · 随心而记 随知而行</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
 --text-primary: #1a1a1a;
 --text-secondary: #555;
 --text-muted: #999;
 --accent: #8b7355;
 --border: rgba(0,0,0,0.06);
 --shadow-sm: 0 2px 12px rgba(0,0,0,0.04);
 --shadow-md: 0 8px 32px rgba(0,0,0,0.08);
 --radius-sm: 12px;
 --radius-md: 20px;
 --radius-lg: 28px;
 --font-display: 'Cormorant Garamond', 'Noto Serif SC', serif;
 --font-zh: 'Noto Serif SC', serif;
 --font-body: 'Noto Sans SC', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
 font-family: var(--font-body);
 min-height: 100%;
 background-size: cover;
 background-position: center;
 background-attachment: fixed;
 color: var(--text-primary);
 overflow-x: hidden;
}

/* 登录页 */
.login-page {
 position: fixed;
 inset: 0;
 display: flex;
 align-items: center;
 justify-content: center;
 z-index: 1000;
 background: rgba(248,246,243,0.95);
 backdrop-filter: blur(20px);
}
.login-card {
 background: rgba(255,255,255,0.85);
 backdrop-filter: blur(20px);
 border-radius: var(--radius-lg);
 padding: 2.5rem 2rem;
 width: 320px;
 text-align: center;
}
.login-logo { font-family: var(--font-display); font-size: 2.8rem; font-weight: 600; letter-spacing: 0.1em; margin-bottom: 0.3rem; }
.login-slogan { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.3em; margin-bottom: 2rem; }
.login-input { width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 0.9rem; outline: none; background: rgba(255,255,255,0.9); text-align: center; transition: all 0.3s; }
.login-input:focus { border-color: var(--accent); background: white; }
.login-btn { width: 100%; padding: 0.8rem; margin-top: 1rem; border: none; border-radius: var(--radius-sm); background: #1a1a1a; color: white; font-size: 0.85rem; cursor: pointer; transition: all 0.3s; }
.login-btn:hover { transform: translateY(-2px); opacity: 0.9; }
.login-error { color: #c44; font-size: 0.75rem; margin-top: 0.75rem; }

/* 首次设置页 */
.setup-page { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 1000; background: rgba(248,246,243,0.95); backdrop-filter: blur(20px); }
.setup-page.active { display: flex; }
.setup-card { background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-radius: var(--radius-lg); padding: 2rem; width: 340px; }
.setup-card h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 1.5rem; text-align: center; }
.field-group { margin-bottom: 1rem; }
.field-group label { display: block; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.3rem; }
.field-group input { width: 100%; padding: 0.7rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 0.9rem; outline: none; background: rgba(255,255,255,0.9); }
.field-group input:focus { border-color: var(--accent); background: white; }
.setup-btn { width: 100%; padding: 0.8rem; margin-top: 1rem; border: none; border-radius: var(--radius-sm); background: #1a1a1a; color: white; cursor: pointer; }

/* 主应用 */
.app-page { display: none; min-height: 100vh; }
.app-page.active { display: block; }
.main-content { max-width: 800px; margin: 0 auto; padding: 1rem 1rem 4rem; }

/* 顶栏 */
.app-topbar { display: flex; justify-content: space-between; align-items: flex-start; padding: 0.5rem 0 1rem; }
.topbar-left { display: flex; flex-direction: column; gap: 0.2rem; }
.topbar-location { font-size: 0.7rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.2rem; }
.topbar-weather { font-size: 0.7rem; color: var(--text-secondary); display: flex; align-items: center; gap: 0.3rem; }
.topbar-right { text-align: right; }
.topbar-logo { font-family: var(--font-display); font-size: 1.6rem; font-weight: 600; letter-spacing: 0.08em; line-height: 1; }
.topbar-slogan { font-size: 0.6rem; color: var(--text-muted); letter-spacing: 0.3em; margin-top: 0.2rem; }

/* 时间区 */
.app-datetime { text-align: center; padding: 0.8rem 0; }
.datetime-time { font-family: var(--font-display); font-size: 3.2rem; font-weight: 400; letter-spacing: -0.02em; line-height: 1; margin-bottom: 0.2rem; }
.datetime-date { font-size: 0.75rem; color: var(--text-muted); }

/* 磁贴 - 透明度提高（比半透明再透明） */
.tiles-grid { 
  display: grid; 
  grid-template-columns: repeat(3, 1fr); 
  gap: 1rem; 
  margin: 1rem 0; 
}
.tile-card { 
  background: rgba(255, 255, 255, 0.48); 
  backdrop-filter: blur(20px);
  border-radius: var(--radius-md); 
  border: 1px solid rgba(255,255,255,0.4);
  padding: 1rem; 
  cursor: pointer; 
  transition: all 0.25s ease;
}
.tile-card:active { transform: scale(0.97); }
.tile-sym { font-size: 1.5rem; margin-bottom: 0.4rem; opacity: 0.7; filter: grayscale(1); }
.tile-title { font-weight: 500; font-size: 0.8rem; margin-bottom: 0.4rem; color: #333; }
.tile-items { display: flex; flex-direction: column; gap: 0.25rem; }
.tile-item { display: flex; align-items: center; gap: 0.35rem; padding: 0.15rem 0; }
.tile-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.tile-text { font-size: 0.7rem; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.tile-meta { font-size: 0.55rem; color: var(--text-muted); }
.tile-empty { font-size: 0.7rem; color: var(--text-muted); }

/* 滚动新闻 - 所有端纯透明，字体加深加粗 */
.news-scroll { 
 background: transparent !important;
 backdrop-filter: none !important;
 border-radius: 0; 
 padding: 0.4rem 0.5rem; 
 margin: 0.3rem 0; 
 overflow: hidden; 
 white-space: nowrap;
 border: none;
 cursor: pointer;
}
.news-content { 
 display: inline-block; 
 animation: scrollNews 30s linear infinite; 
 font-size: 0.75rem; 
 color: #1a1a1a !important; 
 font-weight: 600 !important;
}
.news-content span { margin: 0 1rem; }
@keyframes scrollNews { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

/* 生存时间 + 提醒 - 所有端纯透明，字体加深加粗 */
.life-stats { 
 background: transparent !important;
 backdrop-filter: none !important;
 border-radius: 0; 
 padding: 0.4rem 0.5rem; 
 margin: 0.2rem 0; 
 display: flex; 
 justify-content: space-between; 
 align-items: center;
 border: none;
}
.life-label { 
 font-size: 0.7rem; 
 color: #1a1a1a !important; 
 font-weight: 600 !important;
 display: flex; 
 align-items: center; 
 gap: 0.2rem; 
}
.life-value { 
 font-size: 0.75rem; 
 font-weight: 700 !important; 
 color: #1a1a1a !important; 
}

/* 操作按钮行 - 底部不超出屏幕 */
.actions-row { 
  display: flex; 
  gap: 1rem; 
  justify-content: center; 
  margin: 1.5rem 0 0.5rem;
  padding-bottom: 0.5rem;
}
.action-btn { 
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.3rem;
  padding: 0.6rem 1rem;
  border: 1px solid rgba(255,255,255,0.5);
  border-radius: var(--radius-md);
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(20px);
  cursor: pointer;
  transition: all 0.2s;
  min-width: 70px;
}
.action-btn:active { transform: scale(0.95); }
.action-btn .icon { font-size: 1.2rem; line-height: 1; opacity: 0.7; filter: grayscale(1); }
.action-btn .label { font-size: 0.7rem; color: var(--text-secondary); font-weight: 500; }

.logout-btn { position: fixed; top: 1rem; right: 1rem; padding: 0.35rem 0.8rem; background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.05); border-radius: 20px; cursor: pointer; font-size: 0.65rem; color: var(--text-muted); z-index: 100; }

/* ========== 手机端专属优化 ========== */
@media (max-width: 599px) {
  /* 顶栏纯透明 + 深色字 */
  .app-topbar {
    background: transparent !important;
    backdrop-filter: none !important;
    padding: 0.3rem 0 0.5rem;
  }
  .topbar-logo { font-size: 1.4rem; }
  .topbar-slogan { font-size: 0.55rem; }
  .topbar-location, .topbar-weather { font-size: 0.6rem; }
  
  /* 时间区 */
  .app-datetime {
    padding: 0.4rem 0;
  }
  .datetime-time {
    font-size: 2.6rem;
    color: #1a1a1a;
  }
  .datetime-date {
    font-size: 0.7rem;
    color: #3a3a3a;
  }
  
  /* 磁贴：适当缩小（不过度缩小），改为竖向列表但保持舒适尺寸 */
  .tiles-grid { 
    grid-template-columns: 1fr; 
    gap: 0.7rem; 
    margin: 0.7rem 0;
  }
  .tile-card { 
    padding: 0.85rem;
    background: rgba(255,255,255,0.5);
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .tile-card .tile-sym { 
    font-size: 1.5rem; 
    margin-bottom: 0;
    flex-shrink: 0;
  }
  .tile-card .tile-info { flex: 1; }
  .tile-title { font-size: 0.8rem; margin-bottom: 0.3rem; }
  .tile-items { gap: 0.2rem; }
  .tile-text { font-size: 0.68rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tile-empty { font-size: 0.68rem; }
  
  /* 新闻和生存区 */
  .news-scroll { padding: 0.3rem 0.4rem; }
  .news-content { font-size: 0.68rem; animation: scrollNews 25s linear infinite; font-weight: 600; }
  .life-stats { padding: 0.3rem 0.4rem; }
  .life-label { font-size: 0.65rem; font-weight: 600; }
  .life-value { font-size: 0.7rem; font-weight: 700; }
  
  .main-content { padding: 0.6rem 0.8rem 4rem; }
  .logout-btn { display: none; }
  
  /* 底部操作行 */
  .actions-row { 
    margin: 1rem 0 0.3rem;
    gap: 0.8rem;
  }
  .action-btn { 
    padding: 0.5rem 0.7rem;
    min-width: 60px;
  }
  .action-btn .icon { font-size: 1rem; }
  .action-btn .label { font-size: 0.6rem; }
  
  .mobile-settings-fab {
    display: flex; position: fixed; bottom: 20px; right: 16px; width: 48px; height: 48px;
    background: rgba(30,30,40,0.85); backdrop-filter: blur(12px); border-radius: 28px;
    align-items: center; justify-content: center; color: white; font-size: 1.3rem;
    cursor: pointer; z-index: 100; border: 1px solid rgba(255,255,255,0.3);
  }
  .floating-ai-ball { bottom: 80px; width: 46px; height: 46px; font-size: 1.1rem; right: 16px; }
  .ai-chat-panel { bottom: 135px; width: 290px; height: 420px; right: 16px; }
}
@media (min-width: 600px) { 
  .mobile-settings-fab { display: none; }
}

/* 模态框等样式 - 完整保留 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(8px); z-index: 500; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal-overlay.center-modal { align-items: center; }
.modal { background: white; width: 100%; max-width: 560px; max-height: 85vh; border-radius: 24px 24px 0 0; padding: 1.5rem; overflow-y: auto; }
.modal-overlay.center-modal .modal { border-radius: 24px; max-height: 85vh; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; padding-bottom: 0.8rem; border-bottom: 1px solid var(--border); }
.modal-title { font-weight: 600; font-size: 1.1rem; }
.modal-close { width: 32px; height: 32px; border: none; background: #f5f5f5; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.3rem; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.7rem 1rem; border: 1px solid var(--border); border-radius: 12px; font-size: 0.85rem; outline: none; background: #fafaf8; }
.form-group textarea { resize: none; min-height: 80px; }
.form-actions { display: flex; gap: 0.5rem; margin-top: 1.2rem; }
.btn { flex: 1; padding: 0.7rem; border: none; border-radius: 12px; font-size: 0.8rem; cursor: pointer; text-align: center; }
.btn-primary { background: #1a1a1a; color: white; }
.btn-secondary { background: #f0f0f0; color: #666; }
.btn-danger { background: #fff0f0; color: #c44; }
.list-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
.list-tab { padding: 0.4rem 1rem; border: none; background: #f0f0f0; border-radius: 20px; font-size: 0.75rem; cursor: pointer; }
.list-tab.active { background: #1a1a1a; color: white; }
.list-item { background: #fafaf8; border-radius: 16px; padding: 0.8rem 1rem; margin-bottom: 0.5rem; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
.list-item:hover { background: white; border-color: var(--border); }
.list-item-header { display: flex; justify-content: space-between; margin-bottom: 0.3rem; }
.list-item-title { font-weight: 500; font-size: 0.85rem; }
.list-item-time { font-size: 0.7rem; color: var(--text-muted); }
.list-item-content { font-size: 0.75rem; color: var(--text-secondary); }
.list-item-actions { display: flex; gap: 0.3rem; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--border); }
.list-item-actions button { padding: 0.3rem 0.6rem; border: none; border-radius: 8px; font-size: 0.65rem; cursor: pointer; background: #f0f0f0; }
.note-card { border-radius: 16px; padding: 0.8rem; margin-bottom: 0.5rem; cursor: pointer; transition: all 0.2s; position: relative; background: rgba(255,249,230,0.8); }
.note-card:active { transform: scale(0.98); }
.note-card-content { font-size: 0.8rem; line-height: 1.4; margin-bottom: 0.4rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.note-card-footer { display: flex; justify-content: space-between; align-items: center; }
.note-card-mood { font-size: 0.65rem; padding: 0.15rem 0.4rem; border-radius: 10px; background: rgba(0,0,0,0.05); display: flex; align-items: center; gap: 0.2rem; }
.note-card-time { font-size: 0.6rem; color: var(--text-muted); }
.note-card-actions { position: absolute; top: 0.4rem; right: 0.4rem; display: flex; gap: 0.2rem; opacity: 0; transition: opacity 0.2s; }
.note-card:hover .note-card-actions { opacity: 1; }
.note-card-actions button { width: 24px; height: 24px; border: none; border-radius: 6px; cursor: pointer; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
.color-picker, .mood-picker { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.color-option { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
.color-option.selected { border-color: #1a1a1a; transform: scale(1.1); }
.mood-option { padding: 0.3rem 0.7rem; border-radius: 20px; cursor: pointer; border: 1px solid var(--border); font-size: 0.7rem; display: flex; align-items: center; gap: 0.2rem; background: #fafaf8; }
.mood-option.selected { background: #1a1a1a; color: white; border-color: #1a1a1a; }
.toggle-switch { position: relative; display: inline-block; width: 40px; height: 20px; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 20px; transition: 0.2s; }
.toggle-slider::before { position: absolute; content: ''; height: 16px; width: 16px; left: 2px; bottom: 2px; background: white; border-radius: 50%; transition: 0.2s; }
.toggle-switch input:checked + .toggle-slider { background: #555; }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }

.floating-ai-ball {
    position: fixed;
    bottom: 100px;
    right: 20px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: rgba(26,26,46,0.9);
    backdrop-filter: blur(20px);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    z-index: 200;
    font-size: 1.3rem;
    transition: transform 0.2s;
}
.floating-ai-ball:active { transform: scale(0.95); }
.ai-chat-panel {
    position: fixed;
    bottom: 165px;
    right: 20px;
    width: 320px;
    height: 480px;
    background: white;
    border-radius: 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    z-index: 201;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.ai-chat-panel.hidden { display: none; }
.ai-chat-header { padding: 14px 16px; background: #1a1a2e; color: white; display: flex; justify-content: space-between; font-weight: 500; font-size: 0.9rem; }
.ai-chat-messages { flex: 1; overflow-y: auto; padding: 12px; background: #fafafa; }
.ai-chat-input { padding: 10px; display: flex; gap: 8px; border-top: 1px solid #eee; background: white; }
.ai-chat-input input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 30px; outline: none; font-size: 0.8rem; }
.ai-chat-input button { width: 38px; height: 38px; border-radius: 50%; background: #1a1a2e; color: white; border: none; cursor: pointer; }
.ai-msg { margin-bottom: 10px; display: flex; }
.ai-msg.user { justify-content: flex-end; }
.ai-msg.user .bubble { background: #1a1a2e; color: white; padding: 6px 12px; border-radius: 18px 18px 4px 18px; max-width: 80%; font-size: 0.75rem; }
.ai-msg.ai .bubble { background: white; border: 1px solid #ddd; padding: 6px 12px; border-radius: 18px 18px 18px 4px; max-width: 80%; font-size: 0.75rem; }
.reminder-toast { position: fixed; bottom: 180px; left: 20px; right: 20px; max-width: 280px; background: white; border-radius: 16px; padding: 0.8rem; box-shadow: 0 8px 24px rgba(0,0,0,0.15); z-index: 300; border-left: 3px solid var(--accent); }
.reminder-toast.hidden { display: none; }
.confirm-dialog { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 600; display: none; align-items: center; justify-content: center; }
.confirm-dialog.active { display: flex; }
.confirm-box { background: white; border-radius: 20px; padding: 1.5rem; max-width: 280px; text-align: center; }
.confirm-actions { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: center; }

/* 设置页面样式 */
.settings-section { margin-bottom: 1.5rem; }
.settings-section-title { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
.settings-item { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1rem; background: #fafaf8; border-radius: 12px; margin-bottom: 0.4rem; cursor: pointer; }
.settings-item-label { font-size: 0.85rem; }
.settings-item-value { font-size: 0.8rem; color: var(--text-muted); }
.bg-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-top: 0.5rem; }
.bg-option { aspect-ratio: 16/10; border-radius: 12px; cursor: pointer; border: 2px solid transparent; background-size: cover; background-position: center; }
.bg-option.selected { border-color: var(--accent); }
.bg-upload { aspect-ratio: 16/10; border-radius: 12px; border: 1.5px dashed var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 0.7rem; gap: 0.2rem; }
.bg-upload input { display: none; }
.btn-sm { padding: 0.4rem 0.8rem; font-size: 0.7rem; border-radius: 20px; background: #1a1a1a; color: white; border: none; cursor: pointer; }
.list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
</style>
</head>
<body>

<!-- 登录页 -->
<div class="login-page" id="loginPage">
 <div class="login-card">
 <div class="login-logo">NikO</div>
 <div class="login-slogan">随心而记 随知而行</div>
 <input type="password" class="login-input" id="loginKey" placeholder="密钥" maxlength="20">
 <button class="login-btn" onclick="doLogin()">进入</button>
 <div class="login-error" id="loginError">密钥错误</div>
 </div>
</div>

<!-- 首次设置页 -->
<div class="setup-page" id="setupPage">
 <div class="setup-card">
 <h2>欢迎使用 NikO</h2>
 <div class="field-group"><label>你的名字</label><input type="text" id="setupName" placeholder="你的名字" maxlength="10"></div>
 <div class="field-group"><label>设置密钥</label><input type="password" id="setupKey" placeholder="密钥" maxlength="20"></div>
 <div class="field-group"><label>出生日期</label><input type="date" id="setupBirthday"></div>
 <button class="setup-btn" onclick="doSetup()">开始使用</button>
 </div>
</div>

<!-- 主应用 -->
<div class="app-page" id="appPage">
 <button class="logout-btn" onclick="doLogout()">安全退出</button>
 <div class="main-content">
  <div class="app-topbar">

 <div class="settings-section"><div class="settings-section-title">基本信息</div>

 </div>

<div class="confirm-dialog" id="confirmDialog"><div class="confirm-box"><h3>确认删除</h3><p id="confirmText">确定要删除吗？</p><div class="confirm-actions"><button class="btn btn-secondary" onclick="closeConfirm()">取消</button><button class="btn btn-danger" id="confirmBtn" onclick="doConfirmDelete()">删除</button></div></div></div>
<div id="reminderToast" class="reminder-toast hidden"><div class="title">⏰ 提醒</div><div class="content" id="reminderToastContent"></div><button onclick="closeReminderToast()">知道了</button></div>

<script>
// ========== 完整数据存储 ==========
const DB_KEYS = { config: 'niko_config', schedules: 'niko_schedules', notes: 'niko_notes', quickNotes: 'niko_quick_notes', aiHistory: 'niko_ai_history', reminder: 'niko_reminder', aiConfig: 'niko_ai_config' };
const NOTE_COLORS = ['#fff9e6','#e6f4ff','#f0fdf4','#fff0f8','#f5f5f5'];
const BG_IMAGES = ['https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80','https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=800&q=80','https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=800&q=80','https://images.unsplash.com/photo-1501854140801-50d01698950b?w=800&q=80','https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800&q=80'];
const BG_PREVIEWS = ['https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&q=60','https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400&q=60','https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=400&q=60','https://images.unsplash.com/photo-1501854140801-50d01698950b?w=400&q=60','https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=400&q=60'];

let selectedColor = NOTE_COLORS[0];
let selectedMood = '平静';
let deleteTarget = { type: '', id: '' };
let currentScheduleTab = 'upcoming';
let reminderInterval = null;

function getData(k){try{return JSON.parse(localStorage.getItem(k));}catch{return null;}}
function saveData(k,d){localStorage.setItem(k,JSON.stringify(d));}
function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function formatDate(iso){return new Date(iso).toLocaleDateString('zh-CN',{month:'short',day:'numeric'});}
function openModal(id){document.getElementById(id).classList.add('active');}
function closeModal(id){document.getElementById(id).classList.remove('active');}
function showToast(msg){const t=document.createElement('div');t.style.cssText='position:fixed; bottom:150px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:6px 14px; border-radius:20px; font-size:0.7rem; z-index:1000';t.innerText=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}

// 更新磁贴预览
function updateTilePreviews() {
 const schedules = getData(DB_KEYS.schedules) || [];
 const notes = getData(DB_KEYS.notes) || [];
 const quickNotes = getData(DB_KEYS.quickNotes) || [];
 const nowDate = new Date().toISOString().split('T')[0];
 const upcoming = schedules.filter(s => !s.done && s.date >= nowDate).sort((a,b)=>new Date(a.date+' '+a.time)-new Date(b.date+' '+b.time)).slice(0,2);
 document.getElementById('scheduleTileItems').innerHTML = upcoming.length ? upcoming.map(s=>`<div class="tile-item"><div class="tile-dot"></div><div class="tile-text">${escapeHtml(s.title)}</div><div class="tile-meta">${s.date}</div></div>`).join('') : '<div class="tile-empty">暂无日程</div>';
 const config = getData(DB_KEYS.config) || {};
 const pinnedIds = config.pinnedNoteIds || [];
 const pinnedNotes = notes.filter(n=>pinnedIds.includes(n.id)).slice(0,2);
 document.getElementById('noteTileItems').innerHTML = pinnedNotes.length ? pinnedNotes.map(n=>`<div class="tile-item"><div class="tile-dot"></div><div class="tile-text">${escapeHtml(n.content.substring(0,18))}</div></div>`).join('') : '<div class="tile-empty">暂无便签</div>';
 const recentQuick = quickNotes.sort((a,b)=>new Date(b.created)-new Date(a.created)).slice(0,2);
 document.getElementById('quickTileItems').innerHTML = recentQuick.length ? recentQuick.map(q=>`<div class="tile-item"><div class="tile-dot"></div><div class="tile-text">${escapeHtml(q.content.substring(0,20))}</div></div>`).join('') : '<div class="tile-empty">点击随手记</div>';
}

// 新闻抓取
async function fetchRealNews() {
 try {
  const res = await fetch('https://api.51vstan.com/api/news?page=1&limit=8');
  if(res.ok) { const data=await res.json(); if(data.data && data.data.length) { const newsList=data.data.slice(0,8).map(item=>`📰 ${item.title}`); document.getElementById('newsContent').innerHTML=newsList.map(n=>`<span>${n}</span>`).join('')+'<span>✨ NikO</span>'; return; } }
  throw new Error();
 } catch(e) { document.getElementById('newsContent').innerHTML='<span>📰 暂无滚动新闻，静享此刻</span><span>✨ 随心而记</span>'; }
}
function openNewsModal(){ alert('📌 新闻摘要：' + document.getElementById('newsContent').innerText); }

// 背景壁纸
function renderBgPicker(){ const config=getData(DB_KEYS.config)||{}; const idx=config.bgIndex||0; let html=BG_PREVIEWS.map((src,i)=>`<div class="bg-option ${i===idx&&config.customBg===null?'selected':''}" style="background-image:url(${src})" onclick="selectBg(${i})"></div>`).join(''); if(config.customBg)html+=`<div class="bg-option selected" style="background-image:url(${config.customBg});background-size:cover" onclick="selectBg(-1)"></div>`; html+=`<label class="bg-upload"><span>+</span><span>上传</span><input type="file" accept="image/*" onchange="uploadBg(this)"></label>`; document.getElementById('bgPicker').innerHTML=html; }
function selectBg(index){ const config=getData(DB_KEYS.config)||{}; if(index!==-1){ config.bgIndex=index; config.customBg=null; saveData(DB_KEYS.config,config); } applyBackground(config.bgIndex,config.customBg); renderBgPicker(); }
function uploadBg(input){ const file=input.files[0]; if(!file)return; const reader=new FileReader(); reader.onload=e=>{ const config=getData(DB_KEYS.config)||{}; config.bgIndex=-1; config.customBg=e.target.result; saveData(DB_KEYS.config,config); applyBackground(-1,e.target.result); renderBgPicker(); }; reader.readAsDataURL(file); }
function applyBackground(index,customBg){ if(index===-1&&customBg){document.body.style.backgroundImage=`url(${customBg})`;document.body.style.backgroundSize='cover';document.body.style.backgroundPosition='center';} else if(index>=0&&index<BG_IMAGES.length){document.body.style.backgroundImage=`url(${BG_IMAGES[index]})`;document.body.style.backgroundSize='cover';document.body.style.backgroundPosition='center';} else{document.body.style.backgroundImage=`url(${BG_IMAGES[0]})`;} }

// AI配置
function saveAIConfig(){ const aiCfg={ apiKey: document.getElementById('aiApiKey').value, apiBase: document.getElementById('aiApiBase').value, model: document.getElementById('aiModel').value }; saveData(DB_KEYS.aiConfig, aiCfg); showToast('AI配置已保存'); }

// 日程功能
function openSchedule(){ renderScheduleList(); openModal('scheduleModal'); }
function renderScheduleList() {
 const schedules = getData(DB_KEYS.schedules) || [];
 const now = new Date().toISOString().split('T')[0];
 let filtered = schedules;
 if(currentScheduleTab === 'upcoming') filtered = schedules.filter(s => !s.done && s.date >= now);
 else if(currentScheduleTab === 'done') filtered = schedules.filter(s => s.done);
 filtered.sort((a,b)=>new Date(a.date+' '+a.time)-new Date(b.date+' '+b.time));
 document.getElementById('scheduleList').innerHTML = filtered.length ? filtered.map(s=>`<div class="list-item" onclick="editSchedule('${s.id}')"><div class="list-item-header"><span class="list-item-title">${escapeHtml(s.title)}${s.done?' ✓':''}</span><span class="list-item-time">${s.date} ${s.time||''}</span></div>${s.note?`<div class="list-item-content">${escapeHtml(s.note)}</div>`:''}<div class="list-item-actions">${!s.done?`<button onclick="event.stopPropagation();toggleDone('${s.id}')">✓ 完成</button>`:''}<button onclick="event.stopPropagation();editSchedule('${s.id}')">编辑</button><button onclick="event.stopPropagation();confirmDeleteScheduleItem('${s.id}')">删除</button></div></div>`).join('') : '<div class="list-empty">暂无日程</div>';
}
function switchScheduleTab(tab){ currentScheduleTab=tab; document.querySelectorAll('#scheduleModal .list-tab').forEach(t=>t.classList.remove('active')); event.target.classList.add('active'); renderScheduleList(); }
function openScheduleForm(id=null){ document.getElementById('scheduleId').value=''; document.getElementById('scheduleTitle').value=''; document.getElementById('scheduleDate').value=''; document.getElementById('scheduleTime').value=''; document.getElementById('scheduleNote').value=''; document.getElementById('scheduleFormTitle').textContent='新建日程'; document.getElementById('scheduleDelBtn').style.display='none'; closeModal('scheduleModal'); openModal('scheduleFormModal'); }
function editSchedule(id){ const s=getData(DB_KEYS.schedules)?.find(x=>x.id===id); if(!s)return; document.getElementById('scheduleId').value=id; document.getElementById('scheduleTitle').value=s.title; document.getElementById('scheduleDate').value=s.date; document.getElementById('scheduleTime').value=s.time||''; document.getElementById('scheduleNote').value=s.note||''; document.getElementById('scheduleFormTitle').textContent='编辑日程'; document.getElementById('scheduleDelBtn').style.display='inline-block'; closeModal('scheduleModal'); openModal('scheduleFormModal'); }
function saveSchedule(){ const id=document.getElementById('scheduleId').value; const title=document.getElementById('scheduleTitle').value.trim(); const date=document.getElementById('scheduleDate').value; const time=document.getElementById('scheduleTime').value; const note=document.getElementById('scheduleNote').value.trim(); if(!title||!date){alert('请填写标题和日期');return;} const schedules=getData(DB_KEYS.schedules)||[]; if(id){const i=schedules.findIndex(s=>s.id===id);if(i!==-1)schedules[i]={...schedules[i],title,date,time,note};} else schedules.push({id:Date.now().toString(),title,date,time,note,done:false,created:new Date().toISOString()}); saveData(DB_KEYS.schedules,schedules); closeModal('scheduleFormModal'); updateTilePreviews(); openSchedule(); }
function toggleDone(id){ const schedules=getData(DB_KEYS.schedules)||[]; const i=schedules.findIndex(s=>s.id===id); if(i!==-1){schedules[i].done=!schedules[i].done;saveData(DB_KEYS.schedules,schedules);renderScheduleList();updateTilePreviews();} }
function confirmDeleteScheduleItem(id){deleteTarget={type:'schedule',id};document.getElementById('confirmText').textContent='确定删除这个日程？';document.getElementById('confirmDialog').classList.add('active');}
function confirmDeleteSchedule(){ const id=document.getElementById('scheduleId').value; if(id){confirmDeleteScheduleItem(id);closeModal('scheduleFormModal');} }

// 便签功能
function openNotes(){renderNoteList();openModal('noteModal');}
function renderNoteList(){ const notes=getData(DB_KEYS.notes)||[]; notes.sort((a,b)=>new Date(b.created)-new Date(a.created)); const config=getData(DB_KEYS.config)||{}; const pinned=config.pinnedNoteIds||[]; document.getElementById('noteList').innerHTML=notes.length?notes.map(n=>`<div class="note-card" style="background:${n.color}" onclick="editNote('${n.id}')"><div class="note-card-actions"><button onclick="event.stopPropagation();togglePinNote('${n.id}')" title="${pinned.includes(n.id)?'取消显示':'显示到首页'}">${pinned.includes(n.id)?'★':'☆'}</button><button onclick="event.stopPropagation();confirmDeleteNoteItem('${n.id}')">✕</button></div><div class="note-card-content">${escapeHtml(n.content)}</div><div class="note-card-footer"><span class="note-card-mood">${n.mood||'平静'}</span><span class="note-card-time">${formatDate(n.created)}</span></div></div>`).join(''):'<div class="list-empty">暂无便签</div>'; }
function togglePinNote(id){ const config=getData(DB_KEYS.config)||{}; const arr=config.pinnedNoteIds||[]; const i=arr.indexOf(id); if(i>-1)arr.splice(i,1); else arr.push(id); config.pinnedNoteIds=arr; saveData(DB_KEYS.config,config); renderNoteList(); updateTilePreviews(); }
function openNoteForm(){ document.getElementById('noteId').value=''; document.getElementById('noteContent').value=''; document.getElementById('noteFormTitle').textContent='新建便签'; document.getElementById('noteDelBtn').style.display='none'; selectedColor=NOTE_COLORS[0]; selectedMood='平静'; renderColorPicker('noteColorPicker',selectedColor,(c)=>selectedColor=c); renderMoodPicker('noteMoodPicker',selectedMood,(m)=>selectedMood=m); document.getElementById('notePinCheckbox').checked=false; closeModal('noteModal'); openModal('noteFormModal'); }
function editNote(id){ const notes=getData(DB_KEYS.notes)||[]; const n=notes.find(x=>x.id===id); if(!n)return; document.getElementById('noteId').value=id; document.getElementById('noteContent').value=n.content; document.getElementById('noteFormTitle').textContent='编辑便签'; document.getElementById('noteDelBtn').style.display='inline-block'; selectedColor=n.color; selectedMood=n.mood; renderColorPicker('noteColorPicker',selectedColor,(c)=>selectedColor=c); renderMoodPicker('noteMoodPicker',selectedMood,(m)=>selectedMood=m); const config=getData(DB_KEYS.config)||{}; const pinned=config.pinnedNoteIds||[]; document.getElementById('notePinCheckbox').checked=pinned.includes(id); closeModal('noteModal'); openModal('noteFormModal'); }
function saveNote(){ const id=document.getElementById('noteId').value; const content=document.getElementById('noteContent').value.trim(); if(!content){alert('请填写内容');return;} const notes=getData(DB_KEYS.notes)||[]; if(id){const i=notes.findIndex(n=>n.id===id);if(i!==-1)notes[i]={...notes[i],content,color:selectedColor,mood:selectedMood};} else notes.push({id:Date.now().toString(),content,color:selectedColor,mood:selectedMood,created:new Date().toISOString()}); saveData(DB_KEYS.notes,notes); const config=getData(DB_KEYS.config)||{}; let pinned=config.pinnedNoteIds||[]; const wantPin=document.getElementById('notePinCheckbox').checked; if(wantPin&&!pinned.includes(id)){pinned.push(id);} else if(!wantPin){pinned=pinned.filter(pid=>pid!==id);} config.pinnedNoteIds=pinned; saveData(DB_KEYS.config,config); closeModal('noteFormModal'); updateTilePreviews(); openNotes(); }
function confirmDeleteNoteItem(id){deleteTarget={type:'note',id};document.getElementById('confirmText').textContent='确定删除这条便签？';document.getElementById('confirmDialog').classList.add('active');}
function confirmDeleteNote(){ const id=document.getElementById('noteId').value; if(id){confirmDeleteNoteItem(id);closeModal('noteFormModal');} }

// 随手记功能
function openRecord(){renderQuickNoteList();openModal('recordModal');}
function renderQuickNoteList(){ const qn=getData(DB_KEYS.quickNotes)||[]; qn.sort((a,b)=>new Date(b.created)-new Date(a.created)); document.getElementById('quickNoteList').innerHTML=qn.length?qn.map(n=>`<div class="note-card" style="background:${n.color}" onclick="editQuickNote('${n.id}')"><div class="note-card-actions"><button onclick="event.stopPropagation();confirmDeleteQuickNoteItem('${n.id}')">✕</button></div><div class="note-card-content">${escapeHtml(n.content)}</div><div class="note-card-footer"><span class="note-card-time">${formatDate(n.created)}</span></div></div>`).join(''):'<div class="list-empty">暂无随手记</div>'; }
function openQuickNoteForm(){ document.getElementById('quickNoteId').value=''; document.getElementById('quickNoteContent').value=''; document.getElementById('quickNoteFormTitle').textContent='新建随手记'; document.getElementById('quickNoteDelBtn').style.display='none'; selectedColor=NOTE_COLORS[0]; renderColorPicker('quickColorPicker',selectedColor,(c)=>selectedColor=c); closeModal('recordModal'); openModal('quickNoteFormModal'); }
function editQuickNote(id){ const qn=getData(DB_KEYS.quickNotes)||[]; const n=qn.find(x=>x.id===id); if(!n)return; document.getElementById('quickNoteId').value=id; document.getElementById('quickNoteContent').value=n.content; document.getElementById('quickNoteFormTitle').textContent='编辑随手记'; document.getElementById('quickNoteDelBtn').style.display='inline-block'; selectedColor=n.color; renderColorPicker('quickColorPicker',selectedColor,(c)=>selectedColor=c); closeModal('recordModal'); openModal('quickNoteFormModal'); }
function saveQuickNote(){ const id=document.getElementById('quickNoteId').value; const content=document.getElementById('quickNoteContent').value.trim(); if(!content){alert('请输入内容');return;} const qn=getData(DB_KEYS.quickNotes)||[]; if(id){const i=qn.findIndex(n=>n.id===id);if(i!==-1)qn[i]={...qn[i],content,color:selectedColor};} else qn.push({id:Date.now().toString(),content,color:selectedColor,created:new Date().toISOString()}); saveData(DB_KEYS.quickNotes,qn); closeModal('quickNoteFormModal'); updateTilePreviews(); openRecord(); }
function confirmDeleteQuickNoteItem(id){deleteTarget={type:'quickNote',id};document.getElementById('confirmText').textContent='确定删除这条随手记？';document.getElementById('confirmDialog').classList.add('active');}
function confirmDeleteQuickNote(){ const id=document.getElementById('quickNoteId').value; if(id){confirmDeleteQuickNoteItem(id);closeModal('quickNoteFormModal');} }

// 颜色/心情选择器
function renderColorPicker(containerId, current, onChange){ const container=document.getElementById(containerId); if(!container)return; container.innerHTML=NOTE_COLORS.map(c=>`<div class="color-option ${c===current?'selected':''}" style="background:${c}" data-color="${c}"></div>`).join(''); container.querySelectorAll('.color-option').forEach(el=>{el.addEventListener('click',()=>{container.querySelectorAll('.color-option').forEach(e=>e.classList.remove('selected'));el.classList.add('selected');onChange(el.dataset.color);});}); }
function renderMoodPicker(containerId, current, onChange){ const moods=['平静','开心','难过','期待','疲惫']; const container=document.getElementById(containerId); if(!container)return; container.innerHTML=moods.map(m=>`<div class="mood-option ${m===current?'selected':''}" data-mood="${m}">${m}</div>`).join(''); container.querySelectorAll('.mood-option').forEach(el=>{el.addEventListener('click',()=>{container.querySelectorAll('.mood-option').forEach(e=>e.classList.remove('selected'));el.classList.add('selected');onChange(el.dataset.mood);});}); }

// 搜索
function doSearch(){ const kw=document.getElementById('searchInput').value.toLowerCase(); if(!kw){document.getElementById('searchResults').innerHTML='';return;} const schedules=getData(DB_KEYS.schedules)||[]; const notes=getData(DB_KEYS.notes)||[]; const quick=getData(DB_KEYS.quickNotes)||[]; const all=[...schedules.map(s=>({type:'日程',title:s.title,note:s.note})),...notes.map(n=>({type:'便签',title:n.content})),...quick.map(q=>({type:'随手记',title:q.content}))]; const filtered=all.filter(i=>i.title.toLowerCase().includes(kw)||(i.note&&i.note.toLowerCase().includes(kw))); document.getElementById('searchResults').innerHTML=filtered.length?filtered.map(r=>`<div class="list-item">📌 ${r.type}: ${escapeHtml(r.title)}</div>`).join(''):'<div>无结果</div>'; }
function openSearch(){ document.getElementById('searchInput').value=''; document.getElementById('searchResults').innerHTML=''; openModal('searchModal'); }

// 提醒功能
function openReminderSettings(){ const r=getData(DB_KEYS.reminder)||{text:'喝水',interval:60,enabled:false}; document.getElementById('reminderText').value=r.text; document.getElementById('reminderInterval').value=r.interval; document.getElementById('reminderEnabled').checked=r.enabled; openModal('reminderModal'); updateReminderStatus(); }
function closeReminderSettings(){ closeModal('reminderModal'); }
function saveReminder(){ const text=document.getElementById('reminderText').value.trim(); const interval=parseInt(document.getElementById('reminderInterval').value); const enabled=document.getElementById('reminderEnabled').checked; if(!text){alert('请输入提醒事项');return;} const reminder={text,interval,enabled,nextNotify:enabled?Date.now()+interval*60*1000:null}; saveData(DB_KEYS.reminder,reminder); updateReminderStatus(); closeModal('reminderModal'); if(reminderInterval) clearInterval(reminderInterval); startReminderCheck(); showToast('提醒设置已保存'); }
function updateReminderStatus(){ const r=getData(DB_KEYS.reminder)||{}; const status=r.enabled?`${r.text} / ${r.interval}分钟`:'未开启'; document.getElementById('reminderStatus').textContent=status; document.getElementById('reminderStatusText').innerHTML=r.enabled?`当前提醒：${r.text}，每${r.interval}分钟`:'提醒未开启'; }
function startReminderCheck(){ const r=getData(DB_KEYS.reminder); if(r&&r.enabled){ reminderInterval=setInterval(()=>{ const now=Date.now(); if(r.nextNotify&&now>=r.nextNotify){ const toast=document.getElementById('reminderToast'); document.getElementById('reminderToastContent').innerHTML=`该${r.text}了~`; toast.classList.remove('hidden'); setTimeout(()=>toast.classList.add('hidden'),5000); r.nextNotify=now+r.interval*60*1000; saveData(DB_KEYS.reminder,r); } },10000); } }
function closeReminderToast(){ document.getElementById('reminderToast').classList.add('hidden'); }

// 设置
function openSettings(){ const cfg=getData(DB_KEYS.config)||{}; document.getElementById('settingsName').innerHTML=(cfg.name||'---')+' →'; document.getElementById('settingsBirthday').innerHTML=(cfg.birthday||'未设置')+' →'; const aiCfg=getData(DB_KEYS.aiConfig)||{}; document.getElementById('aiApiKey').value=aiCfg.apiKey||''; document.getElementById('aiApiBase').value=aiCfg.apiBase||'https://api.siliconflow.cn/v1'; document.getElementById('aiModel').value=aiCfg.model||'deepseek-ai/DeepSeek-V3'; renderBgPicker(); openModal('settingsModal'); }
function openEditName(){ const cfg=getData(DB_KEYS.config)||{}; const newName=prompt('请输入新名字',cfg.name||''); if(newName){cfg.name=newName;saveData(DB_KEYS.config,cfg);document.getElementById('settingsName').innerHTML=newName+' →';showToast('名字已修改');} }
function openChangeKey(){ const cfg=getData(DB_KEYS.config); if(!cfg)return; const old=prompt('请输入当前密钥'); if(old!==cfg.key){alert('当前密钥错误');return;} const newKey=prompt('请输入新密钥（至少4位）'); if(newKey&&newKey.length>=4){cfg.key=newKey;saveData(DB_KEYS.config,cfg);alert('密钥修改成功');} else alert('密钥无效'); }
function openEditBirthday(){ const cfg=getData(DB_KEYS.config)||{}; const newBd=prompt('请输入出生日期 (YYYY-MM-DD)',cfg.birthday||''); if(newBd){cfg.birthday=newBd;saveData(DB_KEYS.config,cfg);document.getElementById('settingsBirthday').innerHTML=newBd+' →';updateLifeDays();} }
function updateLifeDays(){ const cfg=getData(DB_KEYS.config)||{}; if(cfg.birthday){ const days=Math.floor((new Date()-new Date(cfg.birthday))/86400000); document.getElementById('lifeDays').innerHTML=days+' 天'; } else document.getElementById('lifeDays').innerHTML='未设置'; }

// AI对话
function sendAIMessage(){ const input=document.getElementById('aiChatInput'); const msg=input.value.trim(); if(!msg)return; const container=document.getElementById('aiChatMessages'); container.insertAdjacentHTML('beforeend',`<div class="ai-msg user"><div class="bubble">${escapeHtml(msg)}</div></div>`); setTimeout(()=>{ container.insertAdjacentHTML('beforeend',`<div class="ai-msg ai"><div class="bubble">✨ NikO 收到：「${escapeHtml(msg)}」<br>（请先在设置中配置 API Key 获取智能回复）</div></div>`); container.scrollTop=container.scrollHeight; },500); input.value=''; container.scrollTop=container.scrollHeight; }
function closeAIChat(){ document.getElementById('aiChatPanel').classList.add('hidden'); }
document.getElementById('aiFloatingBall').onclick=()=>document.getElementById('aiChatPanel').classList.toggle('hidden');

// 确认删除统一处理
function doConfirmDelete(){ if(deleteTarget.type==='schedule'){let s=getData(DB_KEYS.schedules)||[];s=s.filter(x=>x.id!==deleteTarget.id);saveData(DB_KEYS.schedules,s);renderScheduleList();} else if(deleteTarget.type==='note'){let n=getData(DB_KEYS.notes)||[];n=n.filter(x=>x.id!==deleteTarget.id);saveData(DB_KEYS.notes,n);renderNoteList();} else if(deleteTarget.type==='quickNote'){let q=getData(DB_KEYS.quickNotes)||[];q=q.filter(x=>x.id!==deleteTarget.id);saveData(DB_KEYS.quickNotes,q);renderQuickNoteList();} closeConfirm(); updateTilePreviews(); }
function closeConfirm(){ document.getElementById('confirmDialog').classList.remove('active'); deleteTarget={type:'',id:''}; }

// 时间更新
function updateDateTime(){ const now=new Date(); document.getElementById('currentTime').innerHTML=now.toLocaleTimeString('zh-CN',{hour12:false}); document.getElementById('currentDate').innerHTML=now.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'}); }
setInterval(updateDateTime,1000); updateDateTime();

function updateLocation(){ fetch('https://ipapi.co/json/').then(r=>r.json()).then(d=>document.getElementById('locationText').innerHTML=d.city||d.country||'未知').catch(()=>document.getElementById('locationText').innerHTML='未知'); }
function updateWeather(){ navigator.geolocation.getCurrentPosition(p=>{ fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.coords.latitude}&longitude=${p.coords.longitude}&current_weather=true`).then(r=>r.json()).then(d=>{ const w=d.current_weather; const wc={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌧️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',77:'🌨️',80:'🌧️',81:'🌧️',82:'🌧️',85:'🌨️',86:'🌨️',95:'⛈️',96:'⛈️',99:'⛈️'}; document.getElementById('weatherIcon').innerHTML=wc[w.weathercode]||'🌤️'; document.getElementById('weatherText').innerHTML=`${Math.round(w.temperature)}°C`; }).catch(()=>{}); },()=>{}); }
updateLocation(); updateWeather();

// 登录流程
function doLogin(){ const key=document.getElementById('loginKey').value; const cfg=getData(DB_KEYS.config); if(cfg&&cfg.key===key){ sessionStorage.setItem('niko_logged','1'); document.getElementById('loginPage').style.display='none'; document.getElementById('appPage').classList.add('active'); updateTilePreviews(); fetchRealNews(); updateLifeDays(); startReminderCheck(); const bgCfg=getData(DB_KEYS.config)||{}; applyBackground(bgCfg.bgIndex,bgCfg.customBg); } else { document.getElementById('loginError').innerText='密钥错误'; } }
