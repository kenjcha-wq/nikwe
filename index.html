<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NikWe - Open Source Kernel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-base: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #3b82f6;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background: var(--bg-base);
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--text-main);
        }

        /* 1. 品牌背景层 (NikWe) - 强制可见 */
        #branding-layer {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 1; pointer-events: none; user-select: none;
        }
        .brand-logo-text {
            font-size: 22vw; font-weight: 800;
            color: #f1f3f6; /* 确定的浅灰底色 */
            letter-spacing: -0.06em; text-transform: uppercase;
            line-height: 1;
        }

        /* 2. 状态栏 - 极致微调 */
        #top-bar { position: fixed; top: 0; width: 100%; padding: 45px 60px; z-index: 100; pointer-events: none; }
        .top-bar-content { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: auto; }
        .slogan-box { display: flex; flex-direction: column; align-items: flex-end; }
        .slogan-cn { font-size: 15px; font-weight: 700; color: var(--text-main); letter-spacing: 0.15em; }
        .slogan-en { font-size: 8px; font-weight: 400; color: var(--text-muted); letter-spacing: 0.5em; text-transform: uppercase; margin-top: 5px; }

        /* 3. 中心时间区 */
        #center-hub {
            position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 10; transition: opacity 0.5s ease;
        }
        .clock-display { font-size: 11rem; font-weight: 100; letter-spacing: -0.05em; color: var(--text-main); line-height: 1; }
        .date-display { margin-top: 10px; font-size: 0.9rem; color: var(--text-muted); letter-spacing: 0.3em; text-transform: uppercase; }

        /* 4. 底部交互阵列 (Search + Dock) */
        #bottom-hub {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            z-index: 2000; transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #bottom-hub.hidden { transform: translate(-50%, 250px); opacity: 0; pointer-events: none; }

        .search-input-pill {
            width: 380px; padding: 12px 24px; border-radius: 20px;
            background: rgba(255,255,255,0.7); backdrop-filter: blur(20px);
            border: 1px solid white; text-align: center; outline: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02); font-size: 0.9rem;
        }

        #dock-bar {
            background: rgba(255,255,255,0.7); padding: 8px 12px; border-radius: 24px;
            display: flex; gap: 6px; border: 1px solid white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
        }
        .dock-item {
            width: 50px; height: 50px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.25s; color: var(--text-muted);
        }
        .dock-item:hover { background: white; color: var(--accent); transform: translateY(-10px); }

        /* 5. AI 悬浮核心 (nikai) - 极简深色球 */
        #ai-core {
            position: fixed; right: 50px; bottom: 50px;
            width: 48px; height: 48px; border-radius: 50%;
            background: #1e293b; /* 深色更有核心感 */
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 2500;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: all 0.4s ease;
        }
        #ai-core:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(59,130,246,0.3); }
        .ai-pulse-dot {
            width: 4px; height: 4px; background: white; border-radius: 50%;
            animation: ai-pulse 2.5s infinite;
        }
        @keyframes ai-pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
            50% { transform: scale(1.5); opacity: 1; box-shadow: 0 0 0 8px rgba(255,255,255,0); }
        }

        /* 6. 应用窗口容器 */
        #app-window {
            position: fixed; inset: 0; margin: auto;
            width: 780px; height: 82vh; border-radius: 40px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(60px); -webkit-backdrop-filter: blur(60px);
            border: 1px solid white; box-shadow: 0 100px 200px rgba(0,0,0,0.1);
            z-index: 1500; opacity: 0; transform: scale(0.97) translateY(40px);
            pointer-events: none; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #app-window.active { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
        #app-window.fs { width: 100vw; height: 100vh; border-radius: 0; }

        .win-bar { padding: 24px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; }
        .win-close { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: 0.2s; color: #cbd5e1; }
        .win-close:hover { background: #fee2e2; color: #ef4444; }
    </style>
</head>
<body>

    <!-- 1. 品牌水印 -->
    <div id="branding-layer">
        <div class="brand-logo-text">NikWe</div>
    </div>

    <!-- 2. 状态栏 -->
    <header id="top-bar">
        <div class="top-bar-content">
            <div class="flex flex-col gap-1">
                <div class="flex items-center gap-2 text-slate-800 font-bold">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    <span id="loc-text" class="text-[11px] uppercase tracking-tighter">Connecting</span>
                </div>
                <div id="weather-text" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Update...</div>
            </div>
            <div class="slogan-box">
                <div class="slogan-cn">智者，人生</div>
                <div class="slogan-en">Wise, Life</div>
            </div>
        </div>
    </header>

    <!-- 3. 中央枢纽 -->
    <div id="center-hub">
        <div class="clock-display" id="clock">00:00</div>
        <div class="date-display">
            <span id="date-text">...</span>
            <span class="ml-6 font-bold text-blue-500" id="event-count">0 EVENTS</span>
        </div>
    </div>

    <!-- 4. AI 悬浮核心 -->
    <div id="ai-core" onclick="openApp('terminal.html', 'Nik Terminal')">
        <div class="ai-pulse-dot"></div>
    </div>

    <!-- 5. 底部交互底座 -->
    <div id="bottom-hub">
        <input type="text" class="search-input-pill" placeholder="Ask Nik anything..." spellcheck="false">
        <nav id="dock-bar"></nav>
    </div>

    <!-- 6. 全局窗口 -->
    <div id="app-window">
        <div class="win-bar">
            <span id="app-title" class="text-[10px] font-bold uppercase tracking-[0.3em] text-slate-400">Terminal</span>
            <div class="flex gap-4 items-center">
                <div onclick="toggleFs()" class="cursor-pointer text-slate-300 hover:text-blue-500 transition-colors">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                </div>
                <div onclick="closeApp()" class="win-close">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </div>
            </div>
        </div>
        <div class="h-[calc(100%-80px)] px-6 pb-6">
            <iframe id="app-iframe" src="about:blank" class="w-full h-full rounded-[30px] border-0 bg-slate-50"></iframe>
        </div>
    </div>

    <script>
        const appConfigs = [
            { id: 'note', title: 'Note', url: 'smart_note.html', icon: '<path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.375 2.625a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z"/>' },
            { id: 'im', title: 'IM', url: 'im.html', icon: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>' },
            { id: 'mail', title: 'Mail', url: 'mail.html', icon: '<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>' },
            { id: 'cal', title: 'Plan', url: 'calendar.html', icon: '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>' },
            { id: 'cloud', title: 'Drive', url: 'cloud.html', icon: '<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>' },
            { id: 'term', title: 'Terminal', url: 'terminal.html', icon: '<polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>' },
            { id: 'plus', title: 'Market', url: 'plus.html', icon: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>' },
            { id: 'set', title: 'Settings', url: 'settings.html', icon: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>' }
        ];

        const win = document.getElementById('app-window');
        const iframe = document.getElementById('app-iframe');
        const bottomHub = document.getElementById('bottom-hub');
        const centerHub = document.getElementById('center-hub');

        function openApp(url, title) {
            document.getElementById('app-title').innerText = title;
            if (iframe.src.indexOf(url) === -1) iframe.src = url;
            win.classList.add('active');
            bottomHub.classList.add('hidden');
            centerHub.style.opacity = "0.05";
        }

        function closeApp() {
            win.classList.remove('active'); win.classList.remove('fs');
            bottomHub.classList.remove('hidden'); centerHub.style.opacity = "1";
            setTimeout(() => { if(!win.classList.contains('active')) iframe.src = "about:blank"; }, 500);
        }

        function toggleFs() { win.classList.toggle('fs'); }

        window.onload = () => {
            const dock = document.getElementById('dock-bar');
            dock.innerHTML = appConfigs.map(a => `<div class="dock-item" onclick="openApp('${a.url}','${a.title}')"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${a.icon}</svg></div>`).join('');
            
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
                document.getElementById('date-text').innerText = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            }, 1000);
        };
    </script>
</body>
</html>
