<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NikWe|智者，人生</title>
    <!-- 环境加载 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK 引入 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { initializeFirestore, collection, addDoc, onSnapshot, query, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        window.FB = { 
            initializeApp, initializeFirestore, collection, addDoc, onSnapshot, 
            query, doc, setDoc, getAuth, signInAnonymously, 
            signInWithCustomToken, onAuthStateChanged 
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;900&family=Noto+Sans+SC:wght@100;400;900&family=Noto+Serif+SC:wght@400;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&family=Long+Cang&family=JetBrains+Mono&display=swap');
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #0f172a; font-family: 'Inter', 'Noto Sans SC', sans-serif; color: #334155; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        
        #wallpaper-layer { position: fixed; inset: 0; background-size: cover; background-position: center; z-index: 0; transition: background-image 1s ease-in-out; }
        #wallpaper-layer::after { content: ""; position: absolute; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(25px); }

        .brand-logo-text { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1; pointer-events: none; font-size: 8vw; font-weight: 900; color: rgba(255,255,255,0.02); text-transform: uppercase; letter-spacing: -0.02em; text-align: center; }

        .top-info-bar { position: fixed; top: 40px; left: 0; right: 0; padding: 12px 24px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 40; pointer-events: none; }
        .top-info-text { font-size: 10px; font-weight: 900; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.2em; }
        
        /* 新闻滚动磁贴 */
        .news-ticker { position: fixed; top: 0; left: 0; right: 0; height: 32px; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); z-index: 100000; overflow: hidden; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .news-wrapper { display: flex; flex-direction: column; animation: ticker-scroll-vertical 60s linear infinite; }
        .news-ticker:hover .news-wrapper { animation-play-state: paused; }
        .news-item { height: 32px; min-height: 32px; color: rgba(255,255,255,0.6); font-size: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center; white-space: nowrap; }
        @keyframes ticker-scroll-vertical { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }

        .editor-view:empty:before { content: "在此记录思考..."; color: #94a3b8; pointer-events: none; }
        .editor-view h1 { font-size: 2.2em; font-weight: 900; margin: 0.8em 0 0.4em; color: #1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }
        .editor-view table { border-collapse: collapse; width: 100%; margin: 1em 0; border: 1.5px solid #e2e8f0; }
        .editor-view td { border: 1px solid #e2e8f0; padding: 10px; min-width: 50px; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

        /* 工具栏两行平铺 */
        .tool-bar-wrap { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px; background: #fff; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .tool-btn { height: 32px; min-width: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 10px; font-weight: 900; color: #475569; transition: 0.2s; cursor: pointer; background: rgba(255,255,255,0.98); border: 1px solid #e2e8f0; flex-shrink: 0; padding: 0 4px; }
        .tool-btn:hover { background: #1e293b !important; color: #fff !important; }

        .float-dock-btn { width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); color: rgba(255,255,255,0.6); border-radius: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(12px); position: relative; }
        .float-dock-btn:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.12); color: #fff; }

        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(60px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 40px 100px rgba(15, 23, 42, 0.3); }
        .tile-widget { flex: 1; min-width: 250px; max-width: 320px; height: 160px; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.08); display: flex; flex-direction: column; padding: 1.5rem; border-radius: 32px; background: rgba(255, 255, 255, 0.04); color: white; }
        
        .badge { @apply absolute -top-1 -right-1 bg-red-500 text-white text-[8px] font-black w-4 h-4 rounded-full flex items-center justify-center border border-slate-900/50; }

        .chat-bubble { @apply p-4 rounded-2xl max-w-[85%] text-xs font-bold leading-relaxed mb-4; }
        .chat-user { @apply self-end bg-slate-800 text-white ml-auto; }
        .chat-target { @apply self-start bg-white border border-slate-900/5 text-slate-800; }

        @media (max-width: 768px) {
            .glass-panel:not(.login-panel) { width: 100vw !important; height: calc(100vh - 32px) !important; border-radius: 0 !important; margin: 0 !important; inset: 32px 0 0 0 !important; position: fixed !important; }
            .login-panel { width: 85vw !important; max-width: 320px !important; border-radius: 40px !important; position: relative !important; margin: auto !important; }
            .search-box-panel { width: 90vw !important; position: fixed !important; top: 70px !important; bottom: auto !important; left: 50% !important; transform: translateX(-50%) !important; border-radius: 18px !important; z-index: 1000000 !important; background: rgba(15, 23, 42, 0.9) !important; backdrop-filter: blur(20px) !important; border: 1px solid rgba(255,255,255,0.1) !important; padding: 8px !important; }
            .tile-widget { max-width: 100%; min-width: 100%; height: 130px; }
            .mobile-sidebar { position: fixed !important; inset-y: 0 !important; left: 0 !important; width: 85% !important; z-index: 60000 !important; background: #fff !important; }
            .ai-sheet-mobile { height: 50vh !important; top: auto !important; bottom: 0 !important; border-radius: 40px 40px 0 0 !important; z-index: 95000 !important; }
        }

        @media (min-width: 769px) { .search-box-panel { width: 320px !important; position: fixed !important; bottom: 90px !important; left: 50% !important; transform: translateX(-50%) !important; border-radius: 20px !important; z-index: 1000000 !important; background: rgba(15, 23, 42, 0.9) !important; backdrop-filter: blur(20px) !important; border: 1px solid rgba(255,255,255,0.1) !important; padding: 10px !important; } }

        /* 登录页输入框样式复原 */
        .login-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.15); color: #fff; @apply w-full h-12 rounded-2xl outline-none focus:bg-white/10 transition-all text-center placeholder-white/20 font-bold text-sm tracking-wider; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const STICKY_COLORS = [
            { id: 'y', bg: '#fffbeb', border: '#fef3c7' },
            { id: 'b', bg: '#eff6ff', border: '#dbeafe' },
            { id: 'g', bg: '#f0fdf4', border: '#dcfce7' },
            { id: 'p', bg: '#fdf2f8', border: '#fce7f3' },
            { id: 'v', bg: '#faf5ff', border: '#f3e8ff' }
        ];

        const MOODS = [
            { icon: "Focus", emoji: "🎯" }, 
            { icon: "Work", emoji: "💼" }, 
            { icon: "Creative", emoji: "💡" }, 
            { icon: "Relax", emoji: "☕" }, 
            { icon: "Alert", emoji: "⚠️" }
        ];

        const PRESET_WALLS = ["https://images.unsplash.com/photo-1506744038136-46273834b3fb", "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b", "https://images.unsplash.com/photo-1501785888041-af3ef285b470", "https://images.unsplash.com/photo-1470770841072-f978cf4d019e"];
        const FONTS = [{ label: "思源黑体", value: "Noto Sans SC" }, { label: "思源宋体", value: "Noto Serif SC" }, { label: "马善政楷", value: "Ma Shan Zheng" }, { label: "智莽行书", value: "Zhi Mang Xing" }, { label: "Inter Pro", value: "Inter" }, { label: "JetBrains Mono", value: "JetBrains Mono" }];

        const ICONS = {
            plus: "M12 5v14M5 12h14", close: "M18 6L6 18M6 6l12 12", external: "M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6 M15 3h6v6 M10 14L21 3",
            send: "M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z", image: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M17 8l-5-5-5 5 M12 3v12",
            link: "M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71", table: "M3 3h18v18H3z M3 9h18 M3 15h18",
            trash: "M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 1 2-2h4a2 2 0 0 1 2 2v2",
            undo: "M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6", redo: "M21 10H11a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6",
            book: "M4 19.5A2.5 2.5 0 0 1 6.5 17H20 M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15",
            eye: "M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0 M12 5c7 0 10 7 10 7s-3 7-10 7s-10-7-10-7s3-7 10-7z",
            engine: "M12 15a3 3 0 100-6 3 3 0 000 6z", lab: "M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2z",
            pin: "M12 2v8m0 0l-4 4m4-4l4 4M5 20h14", bird: "M16 3H8L2 12l6 9h8l6-9-6-9z M2 12h20",
            menu: "M3 12h18M3 6h18M3 18h18", back: "M19 12H5M12 19l-7-7 7-7", lock: "M7 11V7a5 5 0 0110 0v4M5 11h14a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2z",
            calendar: "M19 4H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z M16 2v4 M8 2v4 M3 10h18",
            indent: "M10 12h10M10 18h10M10 6h10M3 12l4 4M3 12l4-4", list: "M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01",
            check: "M20 6L9 17l-5-5", upload: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12", alignLeft: "M17 10H3M21 6H3M17 14H3M21 18H3", alignCenter: "M18 10H6M21 6H3M18 14H6M21 18H3", alignRight: "M21 10H7M21 6H3M21 14H7M21 18H3", alignFull: "M21 10H3M21 6H3M21 14H3M21 18H3",
            mail: "M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1-.9-2 2-2z M22 6l-10 7L2 6", sparkles: "M12 3v3m0 12v3m9-9h-3M6 12H3m15.364-6.364l-2.121 2.121M7.757 16.243l-2.121 2.121m12.728 0l-2.121-2.121M7.757 7.757L5.636 5.636",
            volume2: "M11 5L6 9H2v6h4l5 4V5z M19.07 4.93a10 10 0 0 1 0 14.14 M15.54 8.46a5 5 0 0 1 0 7.07",
            mic: "M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z M19 10v1a7 7 0 0 1-14 0v-1 M12 18v4 M8 22h8"
        };

        const Icon = ({ name, size = 14, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className={className} strokeLinecap="round" strokeLinejoin="round"><path d={ICONS[name] || ICONS.plus} /></svg>
        );

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(() => !!localStorage.getItem('NikAuth_V200'));
            const [view, setView] = useState(isLoggedIn ? 'desktop' : 'login'); 
            const [time, setTime] = useState('--:--');
            const [date, setDate] = useState('...');
            const [location, setLocation] = useState('定位中...');
            const [weather, setWeather] = useState('...');
            const [isAiOpen, setIsAiOpen] = useState(false);
            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");
            const [toast, setToast] = useState("");
            const [activePlugin, setActivePlugin] = useState({ name: 'Nik 互通', type: 'mail' });
            const [showNoteSidebar, setShowNoteSidebar] = useState(window.innerWidth > 768);
            const [showLabSidebar, setShowLabSidebar] = useState(window.innerWidth > 768);
            const [mobileChatActive, setMobileChatActive] = useState(false);
            const [commUnlocked, setCommUnlocked] = useState(false);
            const [commType, setCommType] = useState('personal');
            const [activeStickySchedulePicker, setActiveStickySchedulePicker] = useState(null);
            const [news, setNews] = useState(["正在同步全球简报...", "NIKWE SYSTEM ONLINE"]);

            const [config, setConfig] = useState(() => JSON.parse(localStorage.getItem('NikWe_Master_Config_V200_Stable') || JSON.stringify({
                username: "智者", wallpaper: PRESET_WALLS[0],
                aiBaseUrl: "https://api.deepseek.com/v1/chat/completions", aiKey: "", aiModel: "deepseek-chat",
                localBaseUrl: "http://localhost:11434/v1/chat/completions", localModel: "llama3",
                mailApi: "", plugins: [], apps: [],
                webdavUrl: "https://dav.jianguoyun.com/dav/", webdavUser: "", webdavPass: ""
            })));

            const [notes, setNotes] = useState(() => JSON.parse(localStorage.getItem('NikData_Notes_V200_Stable') || '[{"id":1,"title":"智者指南","content":"","pinned":true}]'));
            const [activeNoteId, setActiveNoteId] = useState(notes[0]?.id || 1);
            const [schedules, setSchedules] = useState(() => JSON.parse(localStorage.getItem('NikData_Schedules_V200_Stable') || '[]'));
            const [stickies, setStickies] = useState(() => JSON.parse(localStorage.getItem('NikData_Stickies_V200_Stable') || '[{"id":1,"text":"记录瞬间灵感...","mood":"Focus","color":"y","onTile":true}]'));
            const [contacts, setContacts] = useState(() => JSON.parse(localStorage.getItem('NikData_Contacts_V200_Stable') || JSON.stringify([{ id: 'p1', name: "老张", avatar: "Z", msgs: [], unread: 0 }])));
            const [groups, setGroups] = useState(() => JSON.parse(localStorage.getItem('NikData_Groups_V200_Stable') || JSON.stringify([{ id: 'g1', name: "决策群", avatar: "H", msgs: [] }])));
            const [activeTargetId, setActiveTargetId] = useState('p1');
            const [nikEmails, setNikEmails] = useState([]);
            const [aiHistory, setAiHistory] = useState(() => JSON.parse(localStorage.getItem('NikData_AiHistory_V200') || '[]'));
            const [mailCompose, setMailCompose] = useState(false);
            const [mailForm, setMailForm] = useState({ to: "", subject: "", body: "", attachments: [] });

            const [selectedRef, setSelectedRef] = useState(null); 
            const [showRefPicker, setShowRefPicker] = useState(false);
            const [isListening, setIsListening] = useState(false);

            const editorRef = useRef(null);
            const totalUnread = useMemo(() => contacts.reduce((a,b)=>a+(b.unread||0), 0), [contacts]);
            const [user, setUser] = useState(null);
            const dbRef = useRef(null);
            const syncTimer = useRef(null);

            const upcomingSchedules = useMemo(() => {
                return [...schedules].filter(s => !s.done).sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time)).slice(0, 3);
            }, [schedules]);

            const localSearchResults = useMemo(() => {
                if (!searchTerm.trim()) return [];
                const term = searchTerm.toLowerCase();
                const results = [];
                notes.forEach(n => { if (n.title.toLowerCase().includes(term) || n.content.toLowerCase().includes(term)) results.push({ type: 'DOC', label: n.title, action: () => { setView('note'); setActiveNoteId(n.id); }}); });
                stickies.forEach(s => { if (s.text.toLowerCase().includes(term)) results.push({ type: 'STICKY', label: s.text, action: () => setView('sticky') }); });
                schedules.forEach(sc => { if (sc.text.toLowerCase().includes(term)) results.push({ type: 'PLAN', label: sc.text, action: () => setView('schedule') }); });
                aiHistory.forEach(h => { if (h.text.toLowerCase().includes(term)) results.push({ type: 'AI', label: h.text, action: () => setIsAiOpen(true) }); });
                return results;
            }, [searchTerm, notes, stickies, schedules, aiHistory]);

            const webdavAction = async (method, path = "nikwe_notes.json", body = null) => {
                if (!config.webdavUser || !config.webdavPass) return null;
                const url = config.webdavUrl.endsWith('/') ? config.webdavUrl + path : config.webdavUrl + '/' + path;
                const auth = btoa(`${config.webdavUser}:${config.webdavPass}`);
                try {
                    const res = await fetch(url, {
                        method,
                        headers: { 'Authorization': `Basic ${auth}`, 'Content-Type': 'application/json' },
                        body: body ? JSON.stringify(body) : null
                    });
                    if (method === 'GET') return res.ok ? await res.json() : null;
                    return res.ok;
                } catch (e) { return null; }
            };

            const pullFromCloud = async () => {
                const cloudData = await webdavAction('GET');
                if (cloudData && Array.isArray(cloudData)) {
                    setNotes(cloudData);
                    localStorage.setItem('NikData_Notes_V200_Stable', JSON.stringify(cloudData));
                    showFeedback("已同步云端文档");
                }
            };

            const pushToCloud = async (currentNotes) => {
                await webdavAction('PUT', "nikwe_notes.json", currentNotes);
            };

            useEffect(() => {
                if (isLoggedIn) pullFromCloud();
                const fetchNews = async () => {
                    const targetUrl = 'https://news.google.com/rss?hl=zh-CN&gl=CN&ceid=CN:zh-Hans';
                    const proxies = [u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`, u => `https://corsproxy.io/?${encodeURIComponent(u)}` ];
                    for (const p of proxies) {
                        try {
                            const res = await fetch(p(targetUrl));
                            if (!res.ok) continue;
                            const text = await res.text();
                            const doc = new DOMParser().parseFromString(text, "text/xml");
                            const items = Array.from(doc.querySelectorAll("item")).slice(0, 15).map(i => i.querySelector("title")?.textContent).filter(Boolean);
                            if (items.length > 0) { setNews([...items, ...items]); return; }
                        } catch (e) {}
                    }
                };
                fetchNews();
            }, [isLoggedIn]);

            useEffect(() => {
                const initFB = async () => {
                    try {
                        const cfg = JSON.parse(__firebase_config);
                        const app = FB.initializeApp(cfg);
                        dbRef.current = FB.initializeFirestore(app, { experimentalForceLongPolling: true });
                        const auth = FB.getAuth(app);
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await FB.signInWithCustomToken(auth, __initial_auth_token);
                        } else { await FB.signInAnonymously(auth); }
                        FB.onAuthStateChanged(auth, (u) => setUser(u));
                    } catch (err) {}
                };
                initFB();
                const timer = setInterval(() => {
                    const now = new Date(); setTime(now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false })); setDate(now.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' }) + ' ' + now.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase());
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                if (!user || !dbRef.current) return;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'nikwe-default';
                const q = FB.collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'emails');
                const unsubscribe = FB.onSnapshot(q, (snapshot) => {
                    const all = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    setNikEmails(all.filter(m => m.to === config.username || m.from === config.username).sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0)));
                }, (err) => {});
                return () => unsubscribe();
            }, [user, config.username]);

            const showFeedback = (msg = "数据已同步") => { setToast(msg); setTimeout(() => setToast(""), 2000); };
            const saveConfig = (next) => { setConfig(next); localStorage.setItem('NikWe_Master_Config_V200_Stable', JSON.stringify(next)); showFeedback(); };
            const saveNotes = (n) => { setNotes(n); localStorage.setItem('NikData_Notes_V200_Stable', JSON.stringify(n)); showFeedback(); if (syncTimer.current) clearTimeout(syncTimer.current); syncTimer.current = setTimeout(() => pushToCloud(n), 3000); };
            const saveSchedules = (s) => { setSchedules(s); localStorage.setItem('NikData_Schedules_V200_Stable', JSON.stringify(s)); showFeedback(); };
            const saveStickies = (st) => { setStickies(st); localStorage.setItem('NikData_Stickies_V200_Stable', JSON.stringify(st)); showFeedback(); };
            const saveAiHistory = (h) => { setAiHistory(h); localStorage.setItem('NikData_AiHistory_V200', JSON.stringify(h)); };

            const callAiApi = async (userInput, context = "") => {
                if (!userInput.trim()) return;
                const newMessage = { role: 'user', text: userInput, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
                const nextHistory = [...aiHistory, newMessage];
                saveAiHistory(nextHistory);
                if (!config.aiKey) { saveAiHistory([...nextHistory, { role: 'assistant', text: "智者先治己，请配置 AI KEY。", time: newMessage.time }]); return; }

                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.aiKey.trim()}` },
                        body: JSON.stringify({ model: config.aiModel, messages: [{ role: 'user', content: personalityHint + (context ? "上下文："+context : "") + " 指令：" + userInput }] })
                    });

                    const planRegex = /\[PLAN:\s*(.*?),\s*(.*?),\s*(.*?)\]/g;

                    const stickyRegex = /\[STICKY:\s*(.*?)\]/g;
                    let sMatch;
                    while ((sMatch = stickyRegex.exec(aiText)) !== null) { curStickies = [{ id: Date.now()+Math.random(), text: sMatch[1], mood: 'Focus', color: 'y', onTile: true }, ...curStickies]; updated = true; }

                                    <div className="flex items-center gap-4"><button onClick={()=> {if(confirm("清空记录？")) setContacts(contacts.map(c=>c.id===activeTargetId ? {...c, msgs:[]} : c));}} className="text-red-500 font-black"><Icon name="trash" size={16}/></button><button onClick={()=>setView('desktop')} className="w-8 h-8 rounded-full bg-slate-900/5 flex items-center justify-center transition-all font-black"><Icon name="close" size={16}/></button></div>
                                </header>
                                <div className="flex flex-1 overflow-hidden">
                                    <aside className={`${mobileChatActive ? 'hidden' : 'flex'} w-full md:w-72 border-r border-slate-900/5 bg-white/20 flex flex-col p-4 shrink-0 overflow-y-auto`}>
                                        <div className="flex gap-2 mb-6"><div onClick={()=>setCommType('personal')} className={`flex-1 text-center py-2 text-[10px] uppercase cursor-pointer rounded-xl font-black ${commType==='personal'?'bg-slate-800 text-white':'bg-slate-900/5 text-slate-800'}`}>Personal</div><div onClick={()=>setCommType('group')} className={`flex-1 text-center py-2 text-[10px] uppercase cursor-pointer rounded-xl font-black ${commType==='group'?'bg-slate-800 text-white':'bg-slate-900/5 text-slate-800'}`}>Groups</div></div>
                                        {(commType === 'personal' ? contacts : groups).map(item => (<div key={item.id} onClick={()=>{setActiveTargetId(item.id); setMobileChatActive(true);}} className={`p-4 mb-2 rounded-2xl cursor-pointer transition-all ${activeTargetId===item.id?'bg-slate-800 text-white shadow-lg font-black':'hover:bg-white/40 text-slate-800 font-black'}`}>{item.name}</div>))}
                                    </aside>
                                    <main className={`${!mobileChatActive ? 'hidden' : 'flex'} flex-1 md:flex flex-col bg-slate-50/50 overflow-hidden`}>
                                        <div className="flex-1 overflow-y-auto p-6 md:p-10 custom-scrollbar space-y-4">
                                            {(commType==='personal'?contacts:groups).find(x=>x.id===activeTargetId)?.msgs.map(m => (<div key={m.id} className={`chat-bubble font-black ${m.role==='user'?'chat-user shadow-lg':'chat-target shadow-sm'}`}>{m.text}</div>))}
                                        </div>
                                        <div className="p-4 border-t bg-white/80 backdrop-blur-xl flex gap-3 font-black">
                                            <input id="human-msg-input" className="flex-1 bg-slate-100 p-4 rounded-2xl outline-none text-xs font-bold font-black" placeholder="信号内容..." /><button onClick={handleSendMsg} className="bg-slate-800 text-white p-4 rounded-2xl active:scale-95 transition-all"><Icon name="send" size={18}/></button>
                                        </div>
                                    </main>
                                </div>
                            </div>
                        )}

                        {view === 'lab' && (
                            <div className="fixed inset-0 top-[32px] glass-panel z-[1500] flex flex-col overflow-hidden md:m-auto md:w-[96vw] md:h-[90vh] md:rounded-[35px] font-black text-slate-800 animate-in fade-in">
                                <header className="h-14 border-b border-slate-900/5 flex items-center justify-between px-6 bg-white shrink-0">
                                    <div className="flex items-center gap-4"><button onClick={()=>setShowLabSidebar(!showLabSidebar)} className="w-8 h-8 rounded-full hover:bg-slate-900/5 flex items-center justify-center font-black"><Icon name="menu" size={16}/></button><h2 className="text-sm uppercase font-black">Lab Hub</h2></div>
                                    <button onClick={()=>setView('desktop')} className="w-8 h-8 rounded-full bg-slate-900/5 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all font-black"><Icon name="close" size={16}/></button>
                                </header>
                                <div className="flex flex-1 overflow-hidden">
                                    {showLabSidebar && (
                                        <aside className="mobile-sidebar w-64 md:w-80 border-r border-slate-900/5 bg-white/10 flex flex-col p-6 shrink-0 overflow-y-auto">
                                            <div onClick={()=>setActivePlugin({name:'Nik 互通', type:'mail'})} className={`p-4 mb-3 rounded-2xl bg-white border cursor-pointer uppercase transition-all font-black ${activePlugin.type==='mail'?'bg-slate-800 text-white shadow-lg':'hover:bg-slate-50'}`}>Nik 互通</div>
                                            <div onClick={()=>setActivePlugin({name:'协作白板', url:'https://www.excalidraw.com/', type:'plugin'})} className={`p-4 mb-3 rounded-2xl bg-white border cursor-pointer uppercase transition-all font-black ${activePlugin.name==='协作白板'?'bg-slate-800 text-white shadow-lg':'hover:bg-slate-50'}`}>协作白板</div>
                                            {config.plugins.map((p, idx) => <div key={idx} onClick={()=>setActivePlugin(p)} className={`p-4 mb-3 rounded-2xl bg-white border cursor-pointer uppercase ${activePlugin.name===p.name?'bg-slate-800 text-white shadow-lg':'hover:bg-slate-50'}`}>{p.name}</div>)}
                                            <div className="mt-auto border-t border-slate-900/5 pt-6 space-y-3 pb-40 font-black">
                                                <input className="glass-input mb-1 font-black" placeholder="PLUGIN NAME" id="lab-n" /><input className="glass-input mb-1 font-black" placeholder="URL" id="lab-u" />
                                                <button onClick={()=>{const n=document.getElementById('lab-n').value, u=document.getElementById('lab-u').value; if(n&&u) saveConfig({...config, plugins:[...config.plugins, {name:n, url:u, type:'plugin'}]});}} className="w-full py-2 bg-slate-800 text-white rounded-xl text-[9px] font-black uppercase active:scale-95 transition-all">REGISTER</button>
                                            </div>
                                        </aside>
                                    )}
                                    <main className="flex-1 bg-slate-100 relative flex flex-col">
                                        {activePlugin.type === 'mail' ? (
                                            <div className="p-6 md:p-10 overflow-y-auto bg-white h-full pb-40 custom-scrollbar">
                                                <div className="max-w-4xl mx-auto space-y-8">
                                                    <div className="flex justify-between items-center border-b pb-6"><h3 className="text-2xl font-black uppercase flex items-center gap-3 font-black"><Icon name="mail" size={24}/>Intercom Hub</h3><button onClick={()=>setMailCompose(true)} className="bg-slate-800 text-white px-5 py-2 rounded-xl text-[10px] font-black">New Transmit</button></div>
                                                    {nikEmails.map(e => <div key={e.id} className="p-6 hover:bg-slate-50 rounded-3xl transition-all border border-transparent hover:border-slate-900/5 font-black"><div className="flex justify-between text-[8px] opacity-40 mb-2"><span>FROM: {e.from}</span><span>{e.date}</span></div><div className="text-lg mb-2">{e.subject}</div><div className="text-xs text-slate-500">{e.body}</div></div>)}
                                                </div>
                                            </div>
                                        ) : <iframe src={activePlugin.url} className="w-full h-full border-0 rounded-b-[35px]"></iframe>}
                                    </main>
                                </div>
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="fixed inset-0 top-[32px] md:m-auto glass-panel z-[5000] flex flex-col overflow-hidden shadow-2xl md:w-[90vw] md:max-w-[750px] md:h-[80vh] md:rounded-[35px] font-black text-slate-800 animate-in fade-in">
                                <div className="p-8 border-b border-slate-900/5 flex justify-between items-center bg-white shrink-0"><span className="text-xs uppercase tracking-widest font-black">Configuration Hub</span><div onClick={()=>setView('desktop')} className="cursor-pointer text-slate-800/30 hover:text-red-500 font-black"><Icon name="close" size={20} /></div></div>
                                <div className="flex-1 overflow-y-auto p-8 md:p-10 space-y-12 custom-scrollbar font-black">
                                    <section className="grid grid-cols-1 sm:grid-cols-[140px_1fr] gap-6 items-center"><label className="text-[10px] uppercase opacity-40 tracking-widest font-black">Identity</label><input className="glass-input" value={config.username} onChange={e=>saveConfig({...config, username:e.target.value})} /></section>
                                    <section className="space-y-8"><label className="text-[10px] uppercase opacity-40 font-black border-b pb-2 block">Cloud Sync & AI Engine</label>
                                        <div className="grid grid-cols-1 gap-6">
                                            <div className="grid grid-cols-1 sm:grid-cols-[120px_1fr] gap-4 items-center"><span className="text-[10px] opacity-40 uppercase truncate font-black">Server URL</span><input className="glass-input" value={config.webdavUrl} onChange={e=>saveConfig({...config, webdavUrl:e.target.value})} /></div>
                                            <div className="grid grid-cols-1 sm:grid-cols-[120px_1fr] gap-4 items-center"><span className="text-[10px] opacity-40 uppercase truncate font-black">Account</span><input className="glass-input" value={config.webdavUser} onChange={e=>saveConfig({...config, webdavUser:e.target.value})} /></div>
                                            <div className="grid grid-cols-1 sm:grid-cols-[120px_1fr] gap-4 items-center"><span className="text-[10px] opacity-40 uppercase truncate font-black">Password</span><input type="password" className="glass-input" value={config.webdavPass} onChange={e=>saveConfig({...config, webdavPass:e.target.value})} /></div>
                                            <div className="grid grid-cols-1 sm:grid-cols-[120px_1fr] gap-4 items-center"><span className="text-[10px] opacity-40 uppercase font-black">AI BaseURL</span><input className="glass-input" value={config.aiBaseUrl} onChange={e=>saveConfig({...config, aiBaseUrl:e.target.value})} /></div>
                                            <div className="grid grid-cols-1 sm:grid-cols-[120px_1fr] gap-4 items-center"><span className="text-[10px] opacity-40 uppercase font-black">AI Key</span><input className="glass-input" value={config.aiKey} onChange={e=>saveConfig({...config, aiKey:e.target.value})} /></div>
                                            <div className="grid grid-cols-1 sm:grid-cols-[120px_1fr] gap-4 items-center"><span className="text-[10px] opacity-40 uppercase font-black">AI Model</span><input className="glass-input" value={config.aiModel} onChange={e=>saveConfig({...config, aiModel:e.target.value})} /></div>
                                            <div className="grid grid-cols-1 sm:grid-cols-[120px_1fr] gap-4 items-center"><span className="text-[10px] opacity-40 uppercase font-black">Local API</span><input className="glass-input" value={config.localBaseUrl} onChange={e=>saveConfig({...config, localBaseUrl:e.target.value})} /></div>
                                            <div className="grid grid-cols-1 sm:grid-cols-[120px_1fr] gap-4 items-center"><span className="text-[10px] opacity-40 uppercase font-black">Local Model</span><input className="glass-input" value={config.localModel} onChange={e=>saveConfig({...config, localModel:e.target.value})} /></div>
                                        </div>
                                    </section>
                                </div>
                            </div>
                        )}
                    </main>

                    {isAiOpen && (
                        <div className={`ai-panel fixed z-[85000] inset-0 md:inset-auto md:top-10 md:bottom-10 md:right-10 md:w-[420px] md:height-auto md:rounded-[35px] transition-all duration-500 bg-white shadow-2xl overflow-hidden flex flex-col font-black ${window.innerWidth < 768 ? 'ai-sheet-mobile' : ''}`}>
                            <div className="p-6 border-b border-slate-900/5 flex justify-between items-center bg-white shrink-0 font-black text-slate-800 uppercase text-xs"><div>Nik Copilot</div><button onClick={()=>setIsAiOpen(false)} className="w-8 h-8 rounded-full bg-slate-900/5 flex items-center justify-center text-slate-800/30 hover:text-red-500 transition-all font-black"><Icon name="close" size={18}/></button></div>
                            <div className="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar bg-slate-50 font-black">
                                {aiHistory.map((h, i) => (
                                    <div key={i} className={`flex flex-col ${h.role === 'user' ? 'items-end' : 'items-start'}`}>
                                        <div className={`p-4 rounded-2xl max-w-[90%] text-xs font-bold ${h.role === 'user' ? 'bg-slate-800 text-white shadow-lg' : 'bg-white border border-slate-900/5 text-slate-800 shadow-sm'}`}>
                                            {h.text}
                                            {h.role === 'assistant' && (<div className="mt-3 flex gap-4 font-black"><button onClick={() => {const utterance = new SpeechSynthesisUtterance(h.text); utterance.lang='zh-CN'; window.speechSynthesis.speak(utterance);}} className="opacity-30 hover:opacity-100 transition-opacity font-black"><Icon name="volume2" size={12}/></button></div>)}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="p-4 border-t bg-white flex flex-col gap-2 font-black relative">
                                {selectedRef && <div className="bg-slate-800 text-white p-2 rounded-xl text-[8px] flex justify-between animate-in slide-in-from-bottom-2"><span>REF: {selectedRef.label}</span><button onClick={()=>setSelectedRef(null)}><Icon name="close" size={10}/></button></div>}
                                <div className="flex gap-2">
                                    <button onClick={()=>setShowRefPicker(!showRefPicker)} className="tool-btn bg-slate-100 hover:bg-slate-800 hover:text-white"><Icon name="plus" size={16}/></button>
                                    {showRefPicker && <div className="absolute bottom-16 left-4 right-4 bg-white shadow-2xl p-4 rounded-3xl border z-[99999] max-h-40 overflow-y-auto animate-in slide-in-from-bottom-4">
                                        {notes.map(n=> <div key={n.id} onClick={()=> {setSelectedRef({label:n.title, id:n.id}); setShowRefPicker(false);}} className="p-2 border-b text-[10px] truncate cursor-pointer hover:bg-slate-50">{n.title}</div>)}
                                    </div>}
                                    <div className="flex-1 relative">
                                        <input id="ai-input" className="w-full bg-slate-100 p-4 pr-10 rounded-2xl outline-none text-xs font-bold" placeholder="Message Nik..." onKeyDown={e=>{if(e.key==='Enter'){callAiApi(e.target.value, selectedRef?.label); e.target.value=''}}} />
                                        <button onClick={startVoiceInput} className={`absolute right-3 top-1/2 -translate-y-1/2 w-6 h-6 rounded-lg flex items-center justify-center transition-all ${isListening?'bg-red-500 text-white animate-pulse':'text-slate-400 hover:text-slate-800'}`}><Icon name="mic" size={12}/></button>
                                    </div>
                                    <button onClick={()=>{const i=document.getElementById('ai-input'); if(i.value.trim()){callAiApi(i.value, selectedRef?.label); i.value=''}}} className="bg-slate-800 text-white p-4 rounded-2xl shadow-lg active:scale-95"><Icon name="send" size={18}/></button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="fixed right-6 bottom-24 md:right-10 md:bottom-32 w-14 h-14 bg-slate-800 border border-white/20 rounded-full flex items-center justify-center cursor-pointer z-[80000] shadow-2xl active:scale-90 transition-transform no-print" onClick={()=>setIsAiOpen(!isAiOpen)}><div className="w-1.5 h-1.5 bg-white rounded-full animate-pulse"></div></div>

                    <div className="fixed bottom-0 w-full flex justify-center gap-2 md:gap-10 px-4 md:px-8 pb-8 pt-4 no-print z-[200]">
                        <div className="flex items-center justify-center gap-2 md:gap-6 bg-transparent relative font-black">
                            <div onClick={()=>setView('comm')} className="float-dock-btn"><Icon name="bird" size={20} />{totalUnread > 0 && <span className="badge">{totalUnread}</span>}</div>
                            <div onClick={()=>setView('note')} className="float-dock-btn"><Icon name="book" size={20} /></div>
                            <div onClick={()=>setView('schedule')} className="float-dock-btn"><Icon name="calendar" size={20} /></div>
                            <div onClick={()=>setView('sticky')} className="float-dock-btn"><Icon name="pin" size={20} /></div>
                            <div onClick={()=>setView('lab')} className="float-dock-btn"><Icon name="lab" size={20} /></div>
                            <div onClick={()=>setView('settings')} className="float-dock-btn"><Icon name="engine" size={20} /></div>
                            <div className="relative font-black">
                                {isSearchOpen && (
                                    <div className="search-box-panel flex flex-col gap-2 animate-in fade-in slide-in-from-top-4 duration-300">
                                        <div className="flex items-center gap-2 bg-white/10 p-1.5 rounded-xl border border-white/10">
                                            <input autoFocus className="flex-1 bg-transparent border-0 px-2 text-xs text-white font-black outline-none h-8 placeholder-white/30" placeholder="检索..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} onKeyDown={e=>{if(e.key==='Enter') handleGlobalSearch(searchTerm)}} />
                                            <button onClick={()=>handleGlobalSearch(searchTerm)} className="w-8 h-8 rounded-lg bg-white/20 text-white flex items-center justify-center hover:bg-white/40 transition-all font-black"><Icon name="external" size={14}/></button>
                                            <button onClick={()=>setIsSearchOpen(false)} className="w-8 h-8 rounded-lg text-white/40 flex items-center justify-center hover:bg-red-500/20 transition-all font-black"><Icon name="close" size={14}/></button>
                                        </div>
                                        {localSearchResults.length > 0 && (
                                            <div className="bg-slate-900/90 backdrop-blur-2xl border border-white/10 rounded-xl overflow-hidden max-h-40 overflow-y-auto custom-scrollbar shadow-2xl font-black">
                                                {localSearchResults.map((res, i) => (
                                                    <div key={i} onClick={()=>{res.action(); setIsSearchOpen(false); setSearchTerm("");}} className="p-2.5 hover:bg-white/10 flex justify-between items-center cursor-pointer border-b border-white/5 last:border-0 transition-colors">
                                                        <div className="flex items-center gap-2"><Icon name={res.type === 'DOC' ? 'book' : 'sparkles'} size={10} className="text-white/20"/><span className="text-[10px] text-white/70 font-black truncate max-w-[140px]">{res.label}</span></div>
                                                        <span className="text-[7px] text-white/30 font-black uppercase px-1.5 py-0.5 border border-white/5 rounded-md">{res.type}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}
                                <div onClick={()=>setIsSearchOpen(!isSearchOpen)} className={`float-dock-btn ${isSearchOpen?'bg-slate-800 text-white':''}`}><Icon name="eye" size={20} /></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
