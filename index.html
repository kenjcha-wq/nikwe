<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NikWe - 智者，人生</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;800;900&display=swap');
        
        :root {
            --accent: #3b82f6;
            --glass: rgba(255, 255, 255, 0.1);
            --bg-card: rgba(255, 255, 255, 0.98);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background: #000;
            font-family: 'Inter', 'PingFang SC', sans-serif;
            color: #fff;
        }

        /* 动态壁纸层 */
        #wallpaper-layer {
            position: fixed; inset: 0;
            background-size: cover; background-position: center;
            transition: background-image 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }
        #wallpaper-layer::after {
            content: ""; position: absolute; inset: 0;
            background: rgba(0,0,0,0.25);
        }

        /* 品牌标识 */
        #branding-layer {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 1; pointer-events: none; user-select: none;
        }
        .brand-logo-text {
            font-size: 20vw; font-weight: 800; color: rgba(255,255,255,0.05);
            letter-spacing: -0.06em; text-transform: uppercase; line-height: 1;
        }

        /* 顶部状态栏 */
        #top-bar { position: fixed; top: 0; width: 100%; padding: 40px 60px; z-index: 100; pointer-events: none; }
        .top-bar-content { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: auto; }
        .slogan-cn { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 0.15em; }
        .slogan-en { font-size: 8px; font-weight: 400; color: rgba(255,255,255,0.5); letter-spacing: 0.5em; text-transform: uppercase; margin-top: 4px; }

        /* 中心时间 */
        #center-hub {
            position: fixed; top: 32%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 10; transition: opacity 0.5s ease;
        }
        .clock-display { font-size: 11rem; font-weight: 100; letter-spacing: -0.05em; color: #fff; line-height: 1; }
        .date-display { margin-top: 10px; font-size: 0.95rem; color: rgba(255,255,255,0.7); letter-spacing: 0.3em; text-transform: uppercase; }

        /* 底部枢纽 */
        #bottom-hub {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 24px;
            z-index: 2000; transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #bottom-hub.hidden { transform: translate(-50%, 300px); opacity: 0; pointer-events: none; }

        .search-pill-box {
            width: 440px; background: rgba(255,255,255,0.12); backdrop-filter: blur(30px);
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.2);
            padding: 14px 28px; box-shadow: 0 15px 45px rgba(0,0,0,0.2);
        }
        .search-input { background: transparent; border: none; outline: none; width: 100%; color: white; text-align: center; font-size: 0.95rem; }

        #dock-bar {
            background: rgba(255,255,255,0.12); padding: 12px 16px; border-radius: 30px;
            display: flex; gap: 10px; border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(40px); box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }
        .dock-item {
            position: relative; width: 56px; height: 56px; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: #fff;
        }
        .dock-item:hover { background: rgba(255,255,255,0.2); transform: translateY(-18px) scale(1.15); }
        
        .badge {
            position: absolute; top: -6px; right: -6px; min-width: 20px; height: 20px; 
            background: #ef4444; color: white; font-size: 9px; font-weight: 900;
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            border: 2px solid #111; box-shadow: 0 4px 10px rgba(239,68,68,0.4);
        }

        /* AI 对话面板 (抽屉样式) */
        #ai-chat-panel {
            position: fixed; top: 20px; bottom: 20px; right: 20px;
            width: 440px; border-radius: 40px;
            background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(50px);
            border: 1px solid white; box-shadow: -20px 0 100px rgba(0,0,0,0.2);
            z-index: 3500; transform: translateX(120%);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; overflow: hidden; color: #1e293b;
        }
        #ai-chat-panel.active { transform: translateX(0); }
        .ai-chat-header { padding: 30px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; }
        .ai-msg-list { flex-grow: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .ai-bubble { padding: 12px 18px; border-radius: 20px; max-width: 85%; font-size: 14px; line-height: 1.5; }
        .ai-bubble.user { align-self: flex-end; background: #1e293b; color: white; border-bottom-right-radius: 4px; }
        .ai-bubble.bot { align-self: flex-start; background: #f1f5f9; color: #334155; border-bottom-left-radius: 4px; }
        .ai-input-area { padding: 25px 30px; border-top: 1px solid #f1f5f9; background: #fff; display: flex; gap: 12px; }
        .ai-chat-input { flex-grow: 1; padding: 12px 20px; border-radius: 14px; background: #f8fafc; border: 1px solid #eef2f6; outline: none; font-size: 14px; }

        /* AI 悬浮球 */
        #ai-core {
            position: fixed; right: 50px; bottom: 50px;
            width: 60px; height: 60px; border-radius: 50%;
            background: #000; border: 1px solid rgba(255,255,255,0.25);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 2500;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6); transition: all 0.5s ease;
        }
        #ai-core:hover { transform: scale(1.1) rotate(180deg); border-color: var(--accent); }
        .ai-pulse { width: 10px; height: 10px; background: #fff; border-radius: 50%; animation: core-pulse 2s infinite; }
        @keyframes core-pulse {
            0% { transform: scale(1); opacity: 0.4; box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
            70% { transform: scale(1.3); opacity: 1; box-shadow: 0 0 0 20px rgba(255,255,255,0); }
            100% { transform: scale(1); opacity: 0.4; }
        }

        /* 窗口容器 */
        #app-window {
            position: fixed; inset: 0; margin: auto;
            width: 1100px; height: 88vh; border-radius: 40px;
            background: var(--bg-card); backdrop-filter: blur(60px); border: 1px solid white;
            z-index: 1500; opacity: 0; transform: scale(0.95) translateY(50px);
            pointer-events: none; transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #app-window.active { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
        #app-window.fs { width: 100vw; height: 100vh; border-radius: 0; }

        .win-bar { padding: 26px 45px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; }
        .win-close { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: 0.25s; color: #cbd5e1; }
        .win-close:hover { background: #fee2e2; color: #ef4444; }

        /* 设置面板 UI 规范化 */
        #settings-modal {
            position: fixed; inset: 0; z-index: 4000;
            display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(25px);
        }
        #settings-modal.active { display: flex; }
        .settings-card { width: 680px; max-height: 85vh; background: #fff; border-radius: 45px; padding: 50px; overflow-y: auto; color: #1e293b; }

        .config-section { margin-bottom: 30px; padding: 30px; background: #f8fafc; border-radius: 35px; border: 1.5px solid #edf2f7; }
        .section-title { font-size: 12px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-item { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-left: 5px; }
        
        input { 
            width: 100%; padding: 14px 18px; border-radius: 16px; border: 1.5px solid #eef2f6; 
            outline: none; font-size: 14px; color: #334155; transition: all 0.2s; background: #fff; 
            box-sizing: border-box;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 5px rgba(59,130,246,0.1); }
        
        .bg-thumb { width: 95px; height: 95px; border-radius: 20px; cursor: pointer; border: 4px solid transparent; transition: 0.3s; background-size: cover; background-position: center; }
        .bg-thumb.active { border-color: var(--accent); transform: scale(1.05); }

        .btn-submit { background: #111; color: #fff; padding: 20px; border-radius: 24px; font-weight: 800; font-size: 15px; cursor: pointer; width: 100%; border: none; transition: 0.3s; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        .app-item-card { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: #fff; border-radius: 20px; border: 1.5px solid #edf2f7; margin-bottom: 10px; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="wallpaper-layer"></div>
    <div id="branding-layer"><div class="brand-logo-text">NikWe</div></div>

    <header id="top-bar">
        <div class="top-bar-content">
            <div class="flex flex-col gap-1">
                <div class="flex items-center gap-2 text-white font-bold">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    <span id="loc-display" class="text-[16px] uppercase tracking-tighter">定位检索中...</span>
                </div>
                <div id="weather-display" class="text-[11px] text-white/50 font-black uppercase tracking-widest">同步实时天气...</div>
            </div>
            <div class="slogan-box text-right">
                <div class="slogan-cn">智者，人生</div>
                <div class="slogan-en">Wise, Life</div>
            </div>
        </div>
    </header>

    <div id="center-hub">
        <div class="clock-display" id="clock">00:00</div>
        <div class="date-display" id="date-text">...</div>
    </div>

    <!-- AI 悬浮智脑 -->
    <div id="ai-core" title="唤起 Nik AI 对话" onclick="toggleAiChat()">
        <div class="ai-pulse"></div>
    </div>

    <!-- AI 对话面板 (内置) -->
    <div id="ai-chat-panel">
        <div class="ai-chat-header">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-blue-500 rounded-full"></div>
                <span class="text-[11px] font-black uppercase tracking-[0.4em] text-slate-400">Nik AI Assistant</span>
            </div>
            <div onclick="toggleAiChat()" class="win-close !w-10 !h-10 text-slate-400"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>
        </div>
        <div id="ai-messages" class="ai-msg-list custom-scrollbar">
            <!-- 不再模拟欢迎语，由用户接入 API 后控制显示 -->
        </div>
        <div class="ai-input-area">
            <input type="text" id="ai-user-input" class="ai-chat-input" placeholder="键入问题..." onkeydown="if(event.key==='Enter') sendAiMessage()">
            <button onclick="sendAiMessage()" class="p-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-colors"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
        </div>
    </div>

    <div id="bottom-hub">
        <div class="search-pill-box">
            <input type="text" class="search-input" placeholder="输入想法，或者询问 Nik..." spellcheck="false">
        </div>
        <nav id="dock-bar"></nav>
    </div>

    <!-- 矩阵核心配置面板 -->
    <div id="settings-modal">
        <div class="settings-card flex flex-col custom-scrollbar">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black italic tracking-tighter text-slate-800">NikWe 矩阵设置</h2>
                <div onclick="toggleSettings()" class="win-close"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>
            </div>

            <!-- 背景选择 -->
            <div class="config-section">
                <div class="section-title">环境视觉控制</div>
                <div class="flex gap-4 mb-6" id="wallpaper-grid"></div>
                <div class="form-item">
                    <label>自定义壁纸 URL</label>
                    <input type="text" id="custom-bg-url" placeholder="粘贴图片直链并保存">
                </div>
            </div>

            <!-- AI 连接 -->
            <div class="config-section">
                <div class="section-title">Nik AI 智脑协议 (DeepSeek)</div>
                <div class="form-item mb-5">
                    <label>API Key</label>
                    <input type="password" id="api-key" placeholder="在此填入 sk- 密钥">
                </div>
                <div class="form-row">
                    <div class="form-item">
                        <label>接口地址 (Base URL)</label>
                        <input type="text" id="base-url" value="https://api.deepseek.com/chat/completions">
                    </div>
                    <div class="form-item">
                        <label>模型名称 (Model)</label>
                        <input type="text" id="model-name" value="deepseek-chat">
                    </div>
                </div>
            </div>

            <!-- 矩阵单元管理 -->
            <div class="config-section">
                <div class="section-title">矩阵单元管理 (扩展接口)</div>
                <div id="app-manager-list" class="flex flex-col mb-6"></div>
                
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-inner">
                    <label class="!text-slate-400 mb-4 block text-[10px] font-black italic">DEPLOY NEW UNIT</label>
                    <div class="form-row">
                        <div class="form-item"><label>应用名称</label><input type="text" id="new-app-name" placeholder="例: 邮件"></div>
                        <div class="form-item"><label>文件名</label><input type="text" id="new-app-url" placeholder="mail.html"></div>
                    </div>
                    <div class="form-item mb-4">
                        <label>SVG 图标路径 (PATH)</label>
                        <input type="text" id="new-app-icon" placeholder="粘贴 M 起始的 Path 数据">
                    </div>
                    <button onclick="addApp()" class="btn-submit !bg-blue-500 !py-3 !text-sm">确认注入矩阵</button>
                </div>
            </div>

            <button onclick="saveAllSettings()" class="btn-submit py-5 text-lg !bg-blue-600 shadow-xl shadow-blue-100">保存并提交系统更改</button>
        </div>
    </div>

    <!-- 应用窗口系统 -->
    <div id="app-window">
        <div class="win-bar">
            <span id="app-title" class="text-[13px] font-black uppercase tracking-[0.6em] text-slate-400">UNIT</span>
            <div class="flex gap-6 items-center">
                <div onclick="toggleFs()" class="cursor-pointer text-slate-300 hover:text-blue-500 transition-all"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></div>
                <div onclick="closeApp()" class="win-close"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>
            </div>
        </div>
        <div class="h-[calc(100%-88px)] px-10 pb-10">
            <iframe id="app-iframe" src="about:blank" class="w-full h-full rounded-[42px] border-0 bg-white"></iframe>
        </div>
    </div>

    <script>
        let sysSettings = JSON.parse(localStorage.getItem('NikWe_Core_V5')) || {
            apiKey: '', baseUrl: 'https://api.deepseek.com/chat/completions', modelName: 'deepseek-chat',
            currentWallpaper: 0,
            wallpapers: [
                'https://images.unsplash.com/photo-1477346611705-65d1883cee1e?auto=format&fit=crop&q=80&w=2000',
                'https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&q=80&w=2000',
                'https://images.unsplash.com/photo-1506318137071-a8e063b4b4bf?auto=format&fit=crop&q=80&w=2000',
                'https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&q=80&w=2000',
                'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2000'
            ],
            apps: [
                { id: 'note', title: '笔记本', url: 'smart_note.html', icon: 'M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7 M18.375 2.625a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z' },
                { id: 'im', title: '通讯', url: 'im.html', icon: 'M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z' },
                { id: 'cal', title: '日程', url: 'calendar.html', icon: 'M3 4h18v18H3z M16 2v4 M8 2v4 M3 10h18' },
                { id: 'cloud', title: '云盘', url: 'cloud.html', icon: 'M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z' }
            ]
        };

        // 真实定位与天气 (无硬编码)
        async function updateWeather() {
            try {
                const locRes = await fetch('https://ipapi.co/json/');
                const locData = await locRes.json();
                document.getElementById('loc-display').innerText = `${locData.city || '未知城市'} • 中国`;
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${locData.latitude}&longitude=${locData.longitude}&current_weather=true`);
                const weatherData = await weatherRes.json();
                const map = { 0: "晴朗", 1: "少云", 2: "多云", 3: "阴天", 45: "雾气", 61: "微雨" };
                document.getElementById('weather-display').innerText = `${map[weatherData.current_weather.weathercode] || "多云"} ${Math.round(weatherData.current_weather.temperature)}°C SYNC ACTIVE`;
            } catch (e) { document.getElementById('loc-display').innerText = "定位失效"; }
        }

        // AI 对话
        function appendAiMsg(text, type) {
            const list = document.getElementById('ai-messages');
            const b = document.createElement('div');
            b.className = `ai-bubble ${type}`;
            b.innerText = text;
            list.appendChild(b);
            list.scrollTop = list.scrollHeight;
        }

        function sendAiMessage() {
            const input = document.getElementById('ai-user-input');
            const prompt = input.value.trim();
            if(!prompt) return;
            appendAiMsg(prompt, "user");
            input.value = '';
            // 不再模拟 bot 回复，留空待以后接入真正的 API 调用
        }

        function toggleAiChat() {
            document.getElementById('ai-chat-panel').classList.toggle('active');
        }

        // 矩阵跨窗口协议
        window.addEventListener('message', async (event) => {
            if (event.data?.type === 'MATRIX_AI_REQUEST') {
                const { requestId, prompt, systemPrompt } = event.data;
                if (!sysSettings.apiKey) { event.source.postMessage({ type: 'MATRIX_AI_RESPONSE', requestId, content: "系统未配置 API Key。" }, event.origin); return; }
                try {
                    const response = await fetch(sysSettings.baseUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sysSettings.apiKey}` },
                        body: JSON.stringify({ model: sysSettings.modelName, messages: [{ role: "system", content: systemPrompt }, { role: "user", content: prompt }] })
                    });
                    const data = await response.json();
                    event.source.postMessage({ type: 'MATRIX_AI_RESPONSE', requestId, content: data.choices[0].message.content }, event.origin);
                } catch (err) { event.source.postMessage({ type: 'MATRIX_AI_RESPONSE', requestId, error: true, content: "智脑响应中断。" }, event.origin); }
            }
        });

        // 界面控制
        function setWallpaper(idx, customUrl = null) {
            const url = customUrl || sysSettings.wallpapers[idx];
            sysSettings.currentWallpaper = idx;
            document.getElementById('wallpaper-layer').style.backgroundImage = `url('${url}')`;
            renderWallpaperGrid();
        }

        function renderWallpaperGrid() {
            const container = document.getElementById('wallpaper-grid');
            container.innerHTML = sysSettings.wallpapers.map((url, i) => `
                <div onclick="setWallpaper(${i})" class="bg-thumb ${sysSettings.currentWallpaper === i ? 'active' : ''}" style="background-image:url('${url}')"></div>
            `).join('');
        }

        function renderDock() {
            const dock = document.getElementById('dock-bar');
            let html = sysSettings.apps.map(a => `
                <div class="dock-item" onclick="openApp('${a.url}','${a.title}')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="${a.icon}"/></svg>
                    ${a.badge ? `<div class="badge">${a.badge}</div>` : ''}
                </div>`).join('');
            html += `<div class="dock-item text-white/30" onclick="toggleSettings()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>`;
            dock.innerHTML = html;
        }

        function toggleSettings() { 
            const m = document.getElementById('settings-modal');
            m.classList.toggle('active');
            if(m.classList.contains('active')) {
                document.getElementById('api-key').value = sysSettings.apiKey;
                document.getElementById('base-url').value = sysSettings.baseUrl;
                document.getElementById('model-name').value = sysSettings.modelName;
                renderAppManager();
            }
        }

        function renderAppManager() {
            const list = document.getElementById('app-manager-list');
            list.innerHTML = sysSettings.apps.map((a, i) => `
                <div class="app-item-card">
                    <span class="text-xs font-black text-slate-700 tracking-tighter uppercase">${a.title}</span>
                    <button onclick="removeApp(${i})" class="text-rose-500 text-[10px] font-black uppercase">移除</button>
                </div>`).join('');
        }

        function addApp() {
            const name = document.getElementById('new-app-name').value;
            const url = document.getElementById('new-app-url').value;
            const icon = document.getElementById('new-app-icon').value || 'M4 4h16v16H4z';
            if (!name || !url) return;
            sysSettings.apps.push({ id: Date.now().toString(), title: name, url: url, icon: icon });
            renderAppManager();
        }

        function removeApp(index) { sysSettings.apps.splice(index, 1); renderAppManager(); }

        function saveAllSettings() {
            sysSettings.apiKey = document.getElementById('api-key').value;
            sysSettings.baseUrl = document.getElementById('base-url').value;
            sysSettings.modelName = document.getElementById('model-name').value;
            const customBg = document.getElementById('custom-bg-url').value;
            if(customBg) { sysSettings.wallpapers.unshift(customBg); setWallpaper(0); }
            localStorage.setItem('NikWe_Core_V5', JSON.stringify(sysSettings));
            renderDock(); toggleSettings();
        }

        const win = document.getElementById('app-window');
        const iframe = document.getElementById('app-iframe');

        function openApp(url, title) {
            document.getElementById('app-title').innerText = title;
            iframe.src = url;
            win.classList.add('active');
            document.getElementById('bottom-hub').classList.add('hidden');
            document.getElementById('center-hub').style.opacity = "0";
        }

        function closeApp() {
            win.classList.remove('active'); win.classList.remove('fs');
            document.getElementById('bottom-hub').classList.remove('hidden');
            document.getElementById('center-hub').style.opacity = "1";
            setTimeout(() => { if(!win.classList.contains('active')) iframe.src = "about:blank"; }, 500);
        }

        function toggleFs() { win.classList.toggle('fs'); }

        window.onload = () => {
            setWallpaper(sysSettings.currentWallpaper); renderDock(); updateWeather();
            setInterval(() => {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
                document.getElementById('date-text').innerText = now.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' }) + ' ' + now.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();
            }, 1000);
        };
    </script>
</body>
</html>
